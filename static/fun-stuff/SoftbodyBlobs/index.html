<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soft-Body Blobs v18 — Modes + Synthograsizer Integration</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: system-ui, sans-serif; padding-top: 1rem; }
  .slider-grid { padding: 0.4rem 1.5rem 1.4rem; max-width: 560px; margin: 0 auto;
                 display: grid; grid-template-columns: 1fr 1fr; gap: 9px 28px; }
  .slider-grid label { font-size: 12px; color: #666; display: block; margin-bottom: 2px; }
  .slider-grid label span.val { font-weight: 500; color: #111; }

    font-family: system-ui, sans-serif; background: #fafafa; margin-left: 2px; }
  .slider-grid input[type=range] { width: 100%; }
  .toolbar { padding: 0.4rem 1.5rem 0.2rem; max-width: 560px; margin: 0 auto;
             display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .toolbar button { font-size: 11px; padding: 3px 10px; border: 0.5px solid #aaa;
                    border-radius: 4px; background: #fff; cursor: pointer; color: #333; }

  .toolbar button.active { background: #333; color: #fff; border-color: #333; }

            border: 1.5px solid rgba(0,0,0,0.15); flex-shrink: 0; }

                         border-radius: 4px; background: #fff; cursor: pointer; color: #555; }

  #masterBtn.active { background: #333; color: #fff; border-color: #333; }

  .pict-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .pict-row .timer { font-size: 20px; font-weight: 700; color: #d63031; font-family: 'Courier New', monospace;
    min-width: 48px; text-align: center; }
  .pict-row .guess-input { font-size: 12px; padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px;
    width: 180px; font-family: system-ui, sans-serif; }
  .pict-row .guess-btn { font-size: 11px; padding: 4px 10px; border: 0.5px solid #aaa; border-radius: 4px;
    background: #fff; cursor: pointer; color: #333; }
  .pict-row .guess-btn:hover { background: #f0f0f0; }
  .pict-row .score { font-size: 12px; font-weight: 600; color: #2d3436; }
  .pict-row .reveal { font-size: 12px; font-weight: 700; color: #6c5ce7; }
  .pict-row .new-round-btn { font-size: 11px; padding: 3px 10px; border: 0.5px solid #aaa; border-radius: 4px;
    background: #fff; cursor: pointer; color: #333; }
  .pict-row .new-round-btn:hover { background: #f0f0f0; }
  #labelInput { font-size: 11px; padding: 2px 8px; border: 1px solid #ccc; border-radius: 4px;
    width: 130px; font-family: system-ui, sans-serif; display: none; }
</style>
</head>
<body>
<canvas id="c" style="display:block;margin:0 auto;background:#f4f4f4;border-radius:8px;border:0.5px solid #e0e0e0;cursor:grab;"></canvas>

<div class="toolbar">
  <button id="resetBtn">&#8634; reset</button>
  <button id="resetAllBtn">&#8634; reset all</button>
  <div class="color-swatch" id="swatchWrap">
    <input type="color" id="colorPicker" value="#1a1a1a" title="Blob color">
  </div>
  <label style="font-size:12px;color:#666;">Blobs <span id="v-count" style="font-weight:500;color:#111;">1</span></label>
  <input type="range" id="count" min="1" max="8" value="1" step="1" style="width:100px;accent-color:#111;">
  <button id="snapBtn" title="Click two blobs to snap them together">&#128279; snap mode</button>
  <button id="unsnapBtn" title="Remove all snap joints">&#10005; unsnap all</button>
  <select id="fpsSelect" style="font-size:11px;padding:3px 6px;border:0.5px solid #aaa;border-radius:4px;background:#fff;color:#333;cursor:pointer;">
    <option value="15">15 fps</option>
    <option value="24">24 fps</option>
    <option value="30" selected>30 fps</option>
  </select>
  <button id="exportBtn" title="Export all settings as JSON">&#128229; export</button>
  <button id="importBtn" title="Import settings from JSON">&#128228; import</button>
  <input type="file" id="importFile" accept=".json" style="display:none;">
  <button id="captureBtn" title="Capture canvas and send to Synthograsizer as reference image">&#128247; capture</button>
  <select id="modeSelect" style="font-size:11px;padding:3px 6px;border:0.5px solid #aaa;border-radius:4px;background:#fff;color:#333;cursor:pointer;" title="Game mode">
    <option value="sandbox">Sandbox</option>
    <option value="terrarium">Terrarium</option>
    <option value="pictionary">Pictionary</option>
  </select>
  <span class="hint" id="hintText"></span>
</div>

<div id="selectionBar">
  <span id="selDot"></span>
  <span id="selLabel">Blob 1 properties</span>
  <button id="randBtn" title="Randomize this blob's properties">&#127922; randomize</button>
  <button id="masterBtn" title="Edit all blobs at once">&#9776; master</button>
  <input id="labelInput" placeholder="Label this blob..." title="Terrarium label">
</div>

<div id="modePanel">
  <div class="panel-content" id="modePanelContent"></div>
</div>

<div id="pictionaryUI">
  <div class="pict-row">
    <span class="timer" id="pictTimer">--</span>
    <input class="guess-input" id="pictGuess" placeholder="What are the blobs making?" disabled>
    <button class="guess-btn" id="pictGuessBtn" disabled>Guess</button>
    <span class="score" id="pictScore"></span>
    <span class="reveal" id="pictReveal"></span>
    <button class="new-round-btn" id="pictNewRound" style="display:none;">New Round</button>
  </div>
</div>

<div class="slider-grid">
  <div><label>Size <input class="val-input" id="v-size" type="number" value="50"></label><input type="range" id="size" min="1" max="125" value="50" step="1"></div>
  <div><label>Inflation <input class="val-input" id="v-pres" type="number" value="50"></label><input type="range" id="pres" min="0" max="125" value="50" step="1"></div>
  <div><label>Rubber tension <input class="val-input" id="v-tens" type="number" value="35"></label><input type="range" id="tens" min="5" max="125" value="35" step="1"></div>
  <div><label>Damping <input class="val-input" id="v-damp" type="number" value="20"></label><input type="range" id="damp" min="1" max="50" value="20" step="1"></div>
  <div><label>Fluid mass <input class="val-input" id="v-mass" type="number" value="5"></label><input type="range" id="mass" min="1" max="15" value="5" step="1"></div>
  <div><label>Gravity <input class="val-input" id="v-grav" type="number" value="5"></label><input type="range" id="grav" min="0" max="50" value="5" step="1"></div>
  <div><label>Bending stiffness <input class="val-input" id="v-bend" type="number" value="8"></label><input type="range" id="bend" min="0" max="38" value="8" step="1"></div>
</div>

<script>
/* ── Soft-Body Blobs v18 — Modes + Synthograsizer Integration ────────────────
   - Each blob has its own physics parameters
   - Click a blob to select it; sliders reflect + control that blob
   - Slider ranges expanded +25% (gravity up to 50)
   - Master mode, randomize, color picker, snap-together
   - Simple vertex-vertex collision (stable & lightweight)
   ─────────────────────────────────────────────────────────────────── */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 520, H = 420;
canvas.width = W; canvas.height = H;

const WALL = 14, FLOOR = H - WALL, CEIL = WALL, BL = WALL, BR = W - WALL;
const N = 32;
const SUBSTEPS = 10;
const GRAB_RADIUS = 6;

// ── Physics Presets (text string → parameter bundle) ────────────────

const PHYSICS_PRESETS = {
  "gelatin":        { size: 80, pres: 40, tens: 25, damp: 35, mass: 8, grav: 12, bend: 15 },
  "rubber ball":    { size: 50, pres: 70, tens: 90, damp: 10, mass: 5, grav: 20, bend: 30 },
  "mercury":        { size: 60, pres: 60, tens: 10, damp: 45, mass: 15, grav: 25, bend: 2 },
  "soap bubble":    { size: 100, pres: 100, tens: 5, damp: 5, mass: 1, grav: 2, bend: 1 },
  "molten lava":    { size: 90, pres: 30, tens: 15, damp: 40, mass: 12, grav: 30, bend: 5 },
  "marshmallow":    { size: 70, pres: 50, tens: 40, damp: 30, mass: 6, grav: 15, bend: 20 },
  "water balloon":  { size: 65, pres: 55, tens: 20, damp: 25, mass: 7, grav: 18, bend: 8 },
  "steel ball":     { size: 40, pres: 85, tens: 120, damp: 5, mass: 14, grav: 35, bend: 35 },
  "slime":          { size: 75, pres: 35, tens: 8, damp: 40, mass: 9, grav: 10, bend: 3 },
  "jelly":          { size: 60, pres: 45, tens: 30, damp: 28, mass: 6, grav: 14, bend: 12 },
  "plasma":         { size: 55, pres: 90, tens: 5, damp: 8, mass: 2, grav: 3, bend: 1 },
  "pudding":        { size: 85, pres: 38, tens: 18, damp: 38, mass: 10, grav: 16, bend: 10 },
  "bouncy ball":    { size: 45, pres: 80, tens: 100, damp: 3, mass: 4, grav: 22, bend: 28 },
  "tar":            { size: 95, pres: 20, tens: 12, damp: 48, mass: 14, grav: 28, bend: 4 },
  "cloud":          { size: 110, pres: 95, tens: 3, damp: 2, mass: 1, grav: 1, bend: 0 },
};

const COLOR_THEMES = {
  "fire":     ['#e74c3c', '#e67e22', '#f1c40f', '#d35400', '#c0392b'],
  "ocean":    ['#2980b9', '#3498db', '#1abc9c', '#2c3e50', '#16a085'],
  "forest":   ['#27ae60', '#2ecc71', '#1abc9c', '#006400', '#228b22'],
  "sunset":   ['#e74c3c', '#e67e22', '#f39c12', '#8e44ad', '#f1c40f'],
  "neon":     ['#ff00ff', '#00ffff', '#ff6600', '#39ff14', '#ff1493'],
  "pastel":   ['#ffb3ba', '#bae1ff', '#baffc9', '#ffffba', '#e8baff'],
  "midnight": ['#2c3e50', '#34495e', '#8e44ad', '#2980b9', '#1a1a2e'],
  "candy":    ['#ff6b6b', '#ffa3d7', '#a29bfe', '#74b9ff', '#ffeaa7'],
  "earth":    ['#8b4513', '#a0522d', '#d2691e', '#cd853f', '#deb887'],
  "arctic":   ['#a8d8ea', '#cce5ff', '#d4f1f4', '#e8f4f8', '#b8d4e3'],
};

// ── Game Mode State ─────────────────────────────────────────────────

let currentMode = 'sandbox';  // 'sandbox' | 'terrarium' | 'pictionary'

// Terrarium state
// blob.label property stores per-blob label text

// Pictionary state
const PICTIONARY_PROMPTS = [
  "a snowman", "a cat", "the letter B", "a house", "a tree",
  "a flower", "a smiley face", "a car", "a robot", "a fish",
  "a pizza", "a rocket", "a heart", "sunglasses", "an ice cream cone",
  "a mushroom", "a cactus", "a ghost", "a crown", "a star",
  "a UFO", "a donut", "a lightning bolt", "a skull", "a butterfly",
  "a diamond", "a sword", "an alien", "a palm tree", "a volcano"
];

let pictState = {
  active: false,
  prompt: '',
  timeLeft: 0,
  timerInterval: null,
  score: 0,
  totalRounds: 0,
  revealed: false,
  roundDuration: 60 // seconds
};

// ── BroadcastChannel Integration ────────────────────────────────────

const blobChannel = new BroadcastChannel('synthograsizer-blob-v1');

blobChannel.onmessage = (e) => {
  const msg = e.data;
  if (!msg || !msg.type) return;

  switch (msg.type) {
    case 'set-mode':
      if (['sandbox', 'terrarium', 'pictionary'].includes(msg.mode)) {
        setGameMode(msg.mode);
        document.getElementById('modeSelect').value = msg.mode;
      }
      break;

    case 'terrarium-spawn':
      // Receives: { type, creatures: [{ label, preset, color }, ...] }
      handleTerrariumSpawn(msg.creatures || []);
      break;

    case 'apply-preset':
      // Receives: { type, preset: "gelatin", blobIndex?: number }
      applyPresetByName(msg.preset, msg.blobIndex);
      break;

    case 'set-labels':
      // Receives: { type, labels: ["cat", "dog", ...] }
      if (Array.isArray(msg.labels)) {
        msg.labels.forEach((lbl, i) => {
          if (i < blobs.length) blobs[i].label = lbl;
        });
      }
      break;

    case 'pictionary-start':
      // Receives: { type, prompt: "a snowman", duration?: 60 }
      startPictionaryRound(msg.prompt, msg.duration || 60);
      break;

    case 'set-colors':
      // Receives: { type, theme: "fire" } or { type, colors: ["#fff", ...] }
      if (msg.theme && COLOR_THEMES[msg.theme]) {
        const theme = COLOR_THEMES[msg.theme];
        blobs.forEach((b, i) => { b.color = theme[i % theme.length]; });
        syncSlidersToBlob(selectedBlobIdx);
      } else if (Array.isArray(msg.colors)) {
        msg.colors.forEach((c, i) => { if (i < blobs.length) blobs[i].color = c; });
        syncSlidersToBlob(selectedBlobIdx);
      }
      break;

    case 'ping':
      blobChannel.postMessage({ type: 'pong', mode: currentMode });
      break;
  }
};

function applyPresetByName(presetName, blobIndex) {
  const key = presetName?.toLowerCase().trim();
  const preset = PHYSICS_PRESETS[key];
  if (!preset) return;

  if (blobIndex !== undefined && blobIndex >= 0 && blobIndex < blobs.length) {
    applyPrToBlob(blobIndex, { ...preset });
  } else {
    // Apply to all blobs
    for (let i = 0; i < blobs.length; i++) applyPrToBlob(i, { ...preset });
  }
  syncSlidersToBlob(selectedBlobIdx);
}

function handleTerrariumSpawn(creatures) {
  if (creatures.length === 0) return;
  setGameMode('terrarium');

  // Set blob count to match creatures
  targetCount = Math.min(creatures.length, 8);
  document.getElementById('count').value = targetCount;
  document.getElementById('v-count').textContent = targetCount;

  // Reset blobs
  blobs = [];
  snapJoints.length = 0;
  const positions = spawnPositions(targetCount, 50);

  for (let i = 0; i < targetCount; i++) {
    const c = creatures[i];
    const presetKey = c.preset?.toLowerCase().trim();
    const pr = PHYSICS_PRESETS[presetKey] ? { ...PHYSICS_PRESETS[presetKey] } : defaultPr();
    const r = sliderToRadius(pr.size);
    const color = c.color || palette[i % palette.length];
    const blob = createBlob(positions[i].x, positions[i].y, r, color, pr);
    blob.label = c.label || '';
    blobs.push(blob);
  }
  selectedBlobIdx = 0;
  selectedBlobs.clear();
  selectedBlobs.add(0);
  syncSlidersToBlob(0);
}

// ── Game Mode UI Logic ──────────────────────────────────────────────

function setGameMode(mode) {
  currentMode = mode;
  const modePanel = document.getElementById('modePanel');
  const modePanelContent = document.getElementById('modePanelContent');
  const pictionaryUI = document.getElementById('pictionaryUI');
  const labelInput = document.getElementById('labelInput');

  // Clean up any active pictionary
  if (mode !== 'pictionary' && pictState.timerInterval) {
    clearInterval(pictState.timerInterval);
    pictState.active = false;
  }

  switch (mode) {
    case 'sandbox':
      modePanel.style.display = 'none';
      pictionaryUI.style.display = 'none';
      labelInput.style.display = 'none';
      break;

    case 'terrarium':
      modePanel.style.display = 'block';
      modePanelContent.innerHTML = '<b>Terrarium Mode</b> — Label your blobs! Each blob is a creature with its own name and physics personality. ' +
        'Select a blob and type a name below, or receive creatures from the Synthograsizer.';
      pictionaryUI.style.display = 'none';
      labelInput.style.display = 'inline-block';
      // Ensure all blobs have a label property
      blobs.forEach(b => { if (!b.label) b.label = ''; });
      updateLabelInput();
      break;

    case 'pictionary':
      modePanel.style.display = 'block';
      modePanelContent.innerHTML = '<b>Pictionary Mode</b> — Arrange the blobs to match the secret prompt! ' +
        'Drag, resize, and color them. When time runs out, guess what was being depicted. ' +
        'Or receive prompts from the Synthograsizer.';
      pictionaryUI.style.display = 'block';
      labelInput.style.display = 'none';
      // Clear labels in pictionary mode
      blobs.forEach(b => { b.label = ''; });
      break;
  }

  // Broadcast mode change
  blobChannel.postMessage({ type: 'mode-changed', mode: currentMode });
}

function updateLabelInput() {
  const labelInput = document.getElementById('labelInput');
  if (currentMode !== 'terrarium') return;
  if (selectedBlobIdx >= 0 && selectedBlobIdx < blobs.length) {
    labelInput.value = blobs[selectedBlobIdx].label || '';
    labelInput.placeholder = `Label blob ${selectedBlobIdx + 1}...`;
  }
}

document.getElementById('modeSelect').addEventListener('change', e => {
  setGameMode(e.target.value);
});

document.getElementById('labelInput').addEventListener('input', e => {
  if (currentMode === 'terrarium' && selectedBlobIdx >= 0 && selectedBlobIdx < blobs.length) {
    blobs[selectedBlobIdx].label = e.target.value;
  }
});

// ── Pictionary Game Logic ───────────────────────────────────────────

function startPictionaryRound(prompt, duration) {
  setGameMode('pictionary');
  document.getElementById('modeSelect').value = 'pictionary';

  pictState.prompt = prompt || PICTIONARY_PROMPTS[Math.floor(Math.random() * PICTIONARY_PROMPTS.length)];
  pictState.roundDuration = duration || 60;
  pictState.timeLeft = pictState.roundDuration;
  pictState.active = true;
  pictState.revealed = false;
  pictState.totalRounds++;

  // Reset UI
  const timerEl = document.getElementById('pictTimer');
  const guessInput = document.getElementById('pictGuess');
  const guessBtn = document.getElementById('pictGuessBtn');
  const revealEl = document.getElementById('pictReveal');
  const newRoundBtn = document.getElementById('pictNewRound');
  const scoreEl = document.getElementById('pictScore');

  timerEl.textContent = pictState.timeLeft;
  timerEl.style.color = '#d63031';
  guessInput.value = '';
  guessInput.disabled = false;
  guessBtn.disabled = false;
  revealEl.textContent = '';
  newRoundBtn.style.display = 'none';
  scoreEl.textContent = pictState.totalRounds > 1 ? `Score: ${pictState.score}/${pictState.totalRounds - 1}` : '';

  // Start countdown
  if (pictState.timerInterval) clearInterval(pictState.timerInterval);
  pictState.timerInterval = setInterval(() => {
    pictState.timeLeft--;
    timerEl.textContent = Math.max(0, pictState.timeLeft);
    if (pictState.timeLeft <= 10) timerEl.style.color = '#e74c3c';
    if (pictState.timeLeft <= 0) {
      endPictionaryRound(false);
    }
  }, 1000);
}

function endPictionaryRound(guessedCorrectly) {
  if (pictState.timerInterval) clearInterval(pictState.timerInterval);
  pictState.active = false;

  const guessInput = document.getElementById('pictGuess');
  const guessBtn = document.getElementById('pictGuessBtn');
  const revealEl = document.getElementById('pictReveal');
  const newRoundBtn = document.getElementById('pictNewRound');
  const scoreEl = document.getElementById('pictScore');
  const timerEl = document.getElementById('pictTimer');

  guessInput.disabled = true;
  guessBtn.disabled = true;
  newRoundBtn.style.display = 'inline-block';

  if (guessedCorrectly) {
    pictState.score++;
    revealEl.textContent = `Correct! It was "${pictState.prompt}"`;
    revealEl.style.color = '#00b894';
    timerEl.style.color = '#00b894';
  } else {
    pictState.revealed = true;
    revealEl.textContent = `It was "${pictState.prompt}"`;
    revealEl.style.color = '#d63031';
  }
  scoreEl.textContent = `Score: ${pictState.score}/${pictState.totalRounds}`;

  blobChannel.postMessage({
    type: 'pictionary-result',
    correct: guessedCorrectly,
    prompt: pictState.prompt,
    score: pictState.score,
    total: pictState.totalRounds
  });
}

function checkPictionaryGuess() {
  const guessInput = document.getElementById('pictGuess');
  const guess = guessInput.value.trim().toLowerCase();
  if (!guess) return;

  const target = pictState.prompt.toLowerCase();
  // Fuzzy match: remove articles and check inclusion
  const cleanGuess = guess.replace(/^(a |an |the )/i, '').trim();
  const cleanTarget = target.replace(/^(a |an |the )/i, '').trim();

  const correct = cleanGuess === cleanTarget ||
                  cleanTarget.includes(cleanGuess) ||
                  cleanGuess.includes(cleanTarget);

  endPictionaryRound(correct);
}

document.getElementById('pictGuessBtn').addEventListener('click', checkPictionaryGuess);
document.getElementById('pictGuess').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPictionaryGuess();
});
document.getElementById('pictNewRound').addEventListener('click', () => {
  startPictionaryRound(null, pictState.roundDuration);
});

// ── Canvas Capture → Synthograsizer Reference Image ─────────────────

function captureCanvas() {
  // Re-render current state without advancing physics
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#222';
  ctx.fillRect(0, 0, WALL, H);
  ctx.fillRect(W - WALL, 0, WALL, H);
  ctx.fillRect(0, FLOOR, W, WALL);
  ctx.fillStyle = '#ccc';
  ctx.fillRect(WALL, CEIL, W - WALL * 2, 1);
  for (let i = 0; i < blobs.length; i++) drawBlob(blobs[i], false);
  drawSnapLines();

  const imageData = canvas.toDataURL('image/png');

  // Build context metadata for the Synthograsizer prompt
  const labels = blobs.map(b => b.label).filter(Boolean);
  const presetNames = [...new Set(blobs.map(b => {
    for (const [name, pr] of Object.entries(PHYSICS_PRESETS)) {
      if (pr.pres === b.pr.pres && pr.tens === b.pr.tens) return name;
    }
    return null;
  }).filter(Boolean))];

  const captureMsg = {
    type: 'canvas-capture',
    imageData,
    mode: currentMode,
    blobCount: blobs.length,
    labels: labels.length > 0 ? labels : null,
    prompt: currentMode === 'pictionary' && pictState.prompt ? pictState.prompt : null,
    presets: presetNames.length > 0 ? presetNames : null,
    timestamp: Date.now()
  };

  blobChannel.postMessage(captureMsg);

  hintText.textContent = '📷 Sent to Synthograsizer!';
  setTimeout(() => { hintText.textContent = ''; }, 2000);

// ── Default physics params ───────────────────────────────────────────

const DEFAULTS = { size: 50, pres: 50, tens: 35, damp: 20, mass: 5, grav: 5, bend: 8 };
function defaultPr() { return { ...DEFAULTS }; }

// ── Selected blob + multi-select + master mode ─────────────────────

let selectedBlobIdx = 0;       // "primary" selection — drives slider display
let selectedBlobs = new Set([0]); // all currently selected blobs
let masterMode = false;
const SLIDER_IDS = Object.keys(DEFAULTS);

/** Returns the array of blob objects that controls should target */
function getTargetBlobs() {
  if (masterMode) return blobs;
  if (selectedBlobs.size > 1) return [...selectedBlobs].filter(i => i < blobs.length).map(i => blobs[i]);
  if (selectedBlobIdx >= 0 && selectedBlobIdx < blobs.length) return [blobs[selectedBlobIdx]];
  return [];
}

/** Returns the set of selected indices (for rendering glow) */
function isSelected(bi) {
  if (masterMode) return true;
  return selectedBlobs.has(bi);
}

/** Set a single blob as the only selection */
function selectSingle(bi) {
  selectedBlobs.clear();
  selectedBlobs.add(bi);
  selectedBlobIdx = bi;
  masterMode = false;
  document.getElementById('masterBtn').classList.remove('active');
  syncSlidersToBlob(bi);
}

/** Toggle a blob in/out of multi-selection (Ctrl-click) */
function toggleMultiSelect(bi) {
  if (masterMode) {
    // Exit master mode into just this blob
    masterMode = false;
    document.getElementById('masterBtn').classList.remove('active');
    selectedBlobs.clear();
    selectedBlobs.add(bi);
    selectedBlobIdx = bi;
  } else if (selectedBlobs.has(bi)) {
    // Deselect it (unless it's the only one)
    if (selectedBlobs.size > 1) {
      selectedBlobs.delete(bi);
      // If we removed the primary, pick the first remaining
      if (selectedBlobIdx === bi) {
        selectedBlobIdx = [...selectedBlobs][0];
      }
    }
  } else {
    // Add to selection
    selectedBlobs.add(bi);
    selectedBlobIdx = bi; // make the newly-added one the primary
  }
  syncSlidersToBlob(selectedBlobIdx);
}

function syncSlidersToBlob(bi) {
  if (bi < 0 || bi >= blobs.length) return;
  const p = blobs[bi].pr;
  for (const id of SLIDER_IDS) {
    document.getElementById(id).value = p[id];
    document.getElementById('v-' + id).value = p[id];
  }
  const col = blobs[bi].color;
  document.querySelectorAll('.slider-grid input[type=range]').forEach(el => {
    el.style.accentColor = col;
  });
  // Selection label
  let selText, dotBg, dotBorder;
  if (masterMode) {
    selText = 'All blobs (master)';
    dotBg = 'transparent';
    dotBorder = '1.5px dashed #888';
  } else if (selectedBlobs.size > 1) {
    const nums = [...selectedBlobs].sort((a, b) => a - b).map(i => i + 1).join(', ');
    selText = `Blobs ${nums} selected`;
    dotBg = col;
    dotBorder = '2px solid rgba(0,0,0,0.25)';
  } else {
    selText = `Blob ${bi + 1} properties`;
    dotBg = col;
    dotBorder = '1.5px solid rgba(0,0,0,0.15)';
  }
  document.getElementById('selLabel').textContent = selText;
  document.getElementById('selDot').style.background = dotBg;
  document.getElementById('selDot').style.border = dotBorder;
  currentColor = col;
  colorPicker.value = /^#[0-9a-f]{6}$/i.test(col) ? col : '#1a1a1a';
  swatchWrap.style.background = col;
  updateLabelInput();
}

function setMasterMode(on) {
  masterMode = on;
  document.getElementById('masterBtn').classList.toggle('active', on);
  if (on) {
    // Master mode: clear multi-select, show all
    selectedBlobs.clear();
    selectedBlobs.add(selectedBlobIdx);
  }
  document.querySelectorAll('.slider-grid input[type=range]').forEach(el => {
    el.style.accentColor = on ? '#555' : (blobs[selectedBlobIdx]?.color ?? '#111');
  });
  if (on) {
    document.getElementById('selLabel').textContent = 'All blobs (master)';
    document.getElementById('selDot').style.background = 'transparent';
    document.getElementById('selDot').style.border = '1.5px dashed #888';
  } else {
    syncSlidersToBlob(selectedBlobIdx);
  }
}

// ── Randomize ────────────────────────────────────────────────────────

const RAND_RANGES = {
  size: [10, 100], pres: [10, 110], tens: [5, 110],
  damp: [1, 45],   mass: [1, 13],   grav: [0, 20], bend: [0, 35]
};

function randomPr() {
  const p = {};
  for (const [id, [lo, hi]] of Object.entries(RAND_RANGES))
    p[id] = Math.round(lo + Math.random() * (hi - lo));
  return p;
}

function applyPrToBlob(bi, p) {
  const sizeChanged = blobs[bi].pr.size !== p.size;
  blobs[bi].pr = { ...p };
  if (sizeChanged) rebuildBlob(bi);
}

function randomizeSelected() {
  if (blobs.length === 0) return;
  const targets = getTargetBlobs();
  const p = randomPr();
  for (const b of targets) {
    applyPrToBlob(blobs.indexOf(b), masterMode ? p : randomPr());
  }
  syncSlidersToBlob(selectedBlobIdx);
}

document.getElementById('randBtn').addEventListener('click', randomizeSelected);
document.getElementById('masterBtn').addEventListener('click', () => setMasterMode(!masterMode));

// ── Sliders ──────────────────────────────────────────────────────────

function applySliderValue(id, val) {
  const targets = getTargetBlobs();
  for (const b of targets) {
    const sizeChanged = id === 'size' && b.pr.size !== val;
    b.pr[id] = val;
    if (sizeChanged) rebuildBlob(blobs.indexOf(b));
  }
}

SLIDER_IDS.forEach(id => {
  // Slider drives number input + physics
  document.getElementById(id).addEventListener('input', e => {
    const val = +e.target.value;
    document.getElementById('v-' + id).value = val;
    applySliderValue(id, val);
  });
  // Number input drives slider + physics (no min/max enforced — type anything)
  document.getElementById('v-' + id).addEventListener('input', e => {
    const val = +e.target.value;
    if (isNaN(val)) return;
    document.getElementById(id).value = val;
    applySliderValue(id, val);
  });
});

// ── Blob data structure ──────────────────────────────────────────────

let blobs = [];
let snapJoints = [];

function createBlob(cx, cy, radius, color, pr) {
  const blob = {
    px: [], py: [], ox: [], oy: [],
    edgeRest: [], bendRest: [],
    restArea: 0, restR: radius,
    color: color,
    pr: pr ? { ...pr } : defaultPr(),
    label: ''
  };
  for (let i = 0; i < N; i++) {
    const a = -(i / N) * Math.PI * 2 + Math.PI / 2;
    blob.px.push(cx + Math.cos(a) * radius);
    blob.py.push(cy + Math.sin(a) * radius);
    blob.ox.push(cx + Math.cos(a) * radius);
    blob.oy.push(cy + Math.sin(a) * radius);
  }
  for (let i = 0; i < N; i++) {
    const j = (i + 1) % N;
    blob.edgeRest.push(dist(blob.px[i], blob.py[i], blob.px[j], blob.py[j]));
  }
  for (let i = 0; i < N; i++) {
    const j = (i + 2) % N;
    blob.bendRest.push(dist(blob.px[i], blob.py[i], blob.px[j], blob.py[j]));
  }
  blob.restArea = blobSignedArea(blob);
  if (blob.restArea < 0) blob.restArea = -blob.restArea;
  return blob;
}

function sliderToRadius(v) { return 25 + (v - 1) / 124 * 75; }

function dist(x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  return Math.sqrt(dx * dx + dy * dy);
}

function blobSignedArea(b) {
  let a = 0;
  for (let i = 0; i < N; i++) {
    const j = (i + 1) % N;
    a += b.px[i] * b.py[j] - b.px[j] * b.py[i];
  }
  return a * 0.5;
}

function blobCentroid(b) {
  let cx = 0, cy = 0;
  for (let i = 0; i < N; i++) { cx += b.px[i]; cy += b.py[i]; }
  return { x: cx / N, y: cy / N };
}

function pointInBlob(b, mx, my) {
  let c = 0;
  for (let i = 0; i < N; i++) {
    const j = (i + 1) % N;
    if (((b.py[i] > my) !== (b.py[j] > my)) &&
        (mx < (b.px[j] - b.px[i]) * (my - b.py[i]) / (b.py[j] - b.py[i]) + b.px[i])) c++;
  }
  return c % 2 === 1;
}

// ── Color utilities ──────────────────────────────────────────────────

function hexToRGB(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return { r, g, b };
}

function lightenColor(hex, factor) {
  const { r, g, b } = hexToRGB(hex);
  return `rgb(${Math.min(255,Math.round(r+(255-r)*factor))},${Math.min(255,Math.round(g+(255-g)*factor))},${Math.min(255,Math.round(b+(255-b)*factor))})`;
}

function darkenColor(hex, factor) {
  const { r, g, b } = hexToRGB(hex);
  return `rgb(${Math.round(r*(1-factor))},${Math.round(g*(1-factor))},${Math.round(b*(1-factor))})`;
}

const palette = ['#1a1a1a','#c0392b','#2980b9','#27ae60','#f39c12','#8e44ad','#e67e22','#16a085'];

// ── Blob management ──────────────────────────────────────────────────

function spawnPositions(total, r) {
  if (total === 1) return [{ x: W / 2, y: (CEIL + FLOOR) / 2 }];
  const innerW = BR - BL, innerH = FLOOR - CEIL;
  const aspect = innerW / innerH;
  const cols = Math.max(1, Math.round(Math.sqrt(total * aspect)));
  const rows = Math.ceil(total / cols);
  const cellW = innerW / cols, cellH = innerH / rows;
  const positions = [];
  for (let i = 0; i < total; i++) {
    const col = i % cols, row = Math.floor(i / cols);
    positions.push({ x: BL + cellW * (col + 0.5), y: CEIL + cellH * (row + 0.5) });
  }
  return positions;
}

function syncBlobCount() {
  while (blobs.length < targetCount) {
    const idx = blobs.length;
    const pr = selectedBlobIdx >= 0 && selectedBlobIdx < blobs.length
      ? { ...blobs[selectedBlobIdx].pr } : defaultPr();
    const r = sliderToRadius(pr.size);
    // Spread new blobs across the top of the canvas so they fall in freely
    // instead of spawning inside existing settled blobs
    const slots = targetCount;
    const x = BL + (BR - BL) * ((idx % slots) + 0.5) / slots;
    const pos = { x, y: CEIL + r + 2 };
    blobs.push(createBlob(pos.x, pos.y, r, palette[idx % palette.length], pr));
  }
  while (blobs.length > targetCount) {
    const removedIdx = blobs.length - 1;
    blobs.pop();
    snapJoints = snapJoints.filter(j => j.a < blobs.length && j.b < blobs.length);
    selectedBlobs.delete(removedIdx);
    if (selectedBlobIdx >= blobs.length) {
      selectedBlobIdx = blobs.length - 1;
      if (selectedBlobs.size === 0) selectedBlobs.add(selectedBlobIdx);
      syncSlidersToBlob(selectedBlobIdx);
    }
  }
}

function rebuildBlob(bi) {
  const b = blobs[bi];
  const cen = blobCentroid(b);
  const r = sliderToRadius(b.pr.size);
  const label = b.label || '';
  blobs[bi] = createBlob(cen.x, Math.min(cen.y, FLOOR - r - 4), r, b.color, b.pr);
  blobs[bi].label = label;
  snapJoints = snapJoints.filter(j => j.a !== bi && j.b !== bi);
}

function hardReset() {
  blobs = [];
  snapJoints.length = 0;
  dragging = false; dragBlobIdx = -1; grabIdx = -1;
  snapFirst = -1; snapMode = false;
  snapBtn.classList.remove('active');
  hintText.textContent = '';
  const pr0 = defaultPr();
  const r0 = sliderToRadius(pr0.size);
  const positions = spawnPositions(targetCount, r0);
  for (let i = 0; i < targetCount; i++) {
    blobs.push(createBlob(positions[i].x, positions[i].y, r0, palette[i % palette.length], defaultPr()));
  }
  selectedBlobIdx = 0;
  selectedBlobs.clear();
  selectedBlobs.add(0);
  syncSlidersToBlob(0);
}

// ── Drag state ───────────────────────────────────────────────────────

let dragging = false;
let dragBlobIdx = -1;
let grabIdx = -1;
let mouseX = 0, mouseY = 0;
let prevMouseX = 0, prevMouseY = 0;
let velSamples = [];

function findBlobAt(mx, my) {
  for (let bi = 0; bi < blobs.length; bi++) {
    if (pointInBlob(blobs[bi], mx, my)) return bi;
  }
  for (let bi = 0; bi < blobs.length; bi++) {
    const cen = blobCentroid(blobs[bi]);
    if (dist(mx, my, cen.x, cen.y) < blobs[bi].restR * 1.3) return bi;
  }
  return -1;
}

function nearestPt(b, mx, my) {
  let best = -1, bestD = 1e9;
  for (let i = 0; i < N; i++) {
    const d = (b.px[i] - mx) ** 2 + (b.py[i] - my) ** 2;
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
}

function startDrag(mx, my, evt) {
  if (snapMode) {
    const bi = findBlobAt(mx, my);
    if (bi < 0) return;
    if (snapFirst < 0) {
      snapFirst = bi;
      hintText.textContent = `Blob ${bi + 1} selected — click second blob...`;
    } else if (bi !== snapFirst) {
      createSnapJoint(snapFirst, bi);
      hintText.textContent = `Snapped blob ${snapFirst + 1} & ${bi + 1}!`;
      snapFirst = -1;
      setTimeout(() => { hintText.textContent = snapMode ? 'Click first blob...' : ''; }, 1200);
    } else {
      snapFirst = -1;
      hintText.textContent = 'Cancelled — click first blob...';
    }
    return;
  }
  const bi = findBlobAt(mx, my);
  const isMultiKey = evt && (evt.ctrlKey || evt.metaKey);

  if (bi < 0) {
    // Clicked empty space — clear multi-select if no modifier
    if (!isMultiKey && selectedBlobs.size > 1) {
      selectSingle(selectedBlobIdx);
    }
    return;
  }

  // Selection logic
  if (isMultiKey) {
    // Ctrl/Cmd-click: toggle this blob in multi-selection
    toggleMultiSelect(bi);
  } else if (!selectedBlobs.has(bi)) {
    // Normal click on unselected blob: single-select it
    selectSingle(bi);
  } else if (selectedBlobs.size === 1 || bi !== selectedBlobIdx) {
    // Normal click on already-selected blob (or switch primary in multi): make it primary
    selectedBlobIdx = bi;
    syncSlidersToBlob(bi);
  }

  // Start dragging
  dragBlobIdx = bi;
  dragging = true;
  grabIdx = nearestPt(blobs[bi], mx, my);
  mouseX = mx; mouseY = my;
  prevMouseX = mx; prevMouseY = my;
  velSamples = [];
  canvas.style.cursor = 'grabbing';
}

function moveDrag(mx, my) {
  if (!dragging) return;
  prevMouseX = mouseX; prevMouseY = mouseY;
  mouseX = mx; mouseY = my;
  velSamples.push({ vx: mouseX - prevMouseX, vy: mouseY - prevMouseY, t: performance.now() });
  if (velSamples.length > 12) velSamples.shift();
}

function endDrag() {
  if (!dragging) return;
  dragging = false;
  canvas.style.cursor = 'grab';
  if (dragBlobIdx >= 0) {
    const b = blobs[dragBlobIdx];
    const now = performance.now();
    const recent = velSamples.filter(v => now - v.t < 80);
    if (recent.length > 0) {
      let vx = 0, vy = 0;
      for (const v of recent) { vx += v.vx; vy += v.vy; }
      vx /= recent.length; vy /= recent.length;
      for (let i = 0; i < N; i++) { b.ox[i] -= vx * 0.65; b.oy[i] -= vy * 0.65; }
    }
  }
  dragBlobIdx = -1; grabIdx = -1; velSamples = [];
}

// ── Snap joints ──────────────────────────────────────────────────────

function createSnapJoint(ai, bi) {
  if (snapJoints.some(j => (j.a === ai && j.b === bi) || (j.a === bi && j.b === ai))) return;
  const bA = blobs[ai], bB = blobs[bi];
  let bestI = 0, bestJ = 0, bestD = 1e9;
  for (let i = 0; i < N; i++) {
    for (let j = 0; j < N; j++) {
      const d = dist(bA.px[i], bA.py[i], bB.px[j], bB.py[j]);
      if (d < bestD) { bestD = d; bestI = i; bestJ = j; }
    }
  }
  for (let off = -4; off <= 4; off++) {
    const vi = (bestI + off + N) % N, vj = (bestJ - off + N) % N;
    snapJoints.push({ a: ai, ai: vi, b: bi, bi: vj,
      rest: dist(bA.px[vi], bA.py[vi], bB.px[vj], bB.py[vj]) * 0.4 });
  }
}

// ── Mouse / Touch events ─────────────────────────────────────────────

canvas.addEventListener('mousedown', e => { const r = canvas.getBoundingClientRect(); startDrag(e.clientX - r.left, e.clientY - r.top, e); });
canvas.addEventListener('mousemove', e => { const r = canvas.getBoundingClientRect(); moveDrag(e.clientX - r.left, e.clientY - r.top); });
canvas.addEventListener('mouseup', endDrag);
canvas.addEventListener('mouseleave', endDrag);
canvas.addEventListener('touchstart', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); const t = e.touches[0]; startDrag(t.clientX - r.left, t.clientY - r.top, e); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); const t = e.touches[0]; moveDrag(t.clientX - r.left, t.clientY - r.top); }, { passive: false });
canvas.addEventListener('touchend', endDrag);
canvas.addEventListener('touchcancel', endDrag);

// ── Physics step ─────────────────────────────────────────────────────

function rescueBlob(bi) {
  // Rebuild blob in place, keeping color + properties + label
  const b = blobs[bi];
  const cen = blobCentroid(b);
  const r = sliderToRadius(b.pr.size);
  const cx = isFinite(cen.x) ? Math.min(Math.max(cen.x, BL + r + 2), BR - r - 2) : W / 2;
  const cy = isFinite(cen.y) ? Math.min(Math.max(cen.y, CEIL + r + 2), FLOOR - r - 2) : (CEIL + FLOOR) / 2;
  const label = b.label || '';
  blobs[bi] = createBlob(cx, cy, r, b.color, b.pr);
  blobs[bi].label = label;
}

function blobNeedsRescue(b) {
  for (let i = 0; i < N; i++) {
    if (!isFinite(b.px[i]) || !isFinite(b.py[i]) ||
        !isFinite(b.ox[i]) || !isFinite(b.oy[i])) return true;
  }
  const area = Math.abs(blobSignedArea(b));
  return area < b.restArea * 0.15;
}

// Per-blob cached values (computed once per substep, reused in collision)
const _cachedCen = [];  // { x, y } per blob
const _cachedR = [];    // average radius per blob

function cachePerBlobState() {
  for (let bi = 0; bi < blobs.length; bi++) {
    const b = blobs[bi];
    let cx = 0, cy = 0;
    for (let i = 0; i < N; i++) { cx += b.px[i]; cy += b.py[i]; }
    cx /= N; cy /= N;
    _cachedCen[bi] = { x: cx, y: cy };
    let r = 0;
    for (let i = 0; i < N; i++) {
      const dx = b.px[i] - cx, dy = b.py[i] - cy;
      r += Math.sqrt(dx * dx + dy * dy);
    }
    _cachedR[bi] = r / N;
  }
}

function step() {
  if (blobs.length === 0) return;

  const subDt = (1 / 60) / SUBSTEPS;

  for (let sub = 0; sub < SUBSTEPS; sub++) {

    // ── Per-blob internal physics ──
    for (let bi = 0; bi < blobs.length; bi++) {
      const b = blobs[bi];
      const p = b.pr;
      const gravity   = (p.grav / 50) * 6000 * (p.mass / 15);
      const dampFactor = 1 - (p.damp / 50) * 0.075;

      // Verlet integration
      for (let i = 0; i < N; i++) {
        let vx = (b.px[i] - b.ox[i]) * dampFactor;
        let vy = (b.py[i] - b.oy[i]) * dampFactor;
        vy += gravity * subDt * subDt;
        b.ox[i] = b.px[i]; b.oy[i] = b.py[i];
        b.px[i] += vx; b.py[i] += vy;
      }

      // Soft drag
      if (dragging && bi === dragBlobIdx && grabIdx >= 0) {
        for (let offset = -GRAB_RADIUS; offset <= GRAB_RADIUS; offset++) {
          const idx = (grabIdx + offset + N) % N;
          const weight = 1 - Math.abs(offset) / (GRAB_RADIUS + 1);
          const strength = weight * 0.55;
          b.px[idx] += (mouseX - b.px[idx]) * strength;
          b.py[idx] += (mouseY - b.py[idx]) * strength;
          b.ox[idx] += (mouseX - b.ox[idx]) * strength * 0.9;
          b.oy[idx] += (mouseY - b.oy[idx]) * strength * 0.9;
        }
      }

      // Edge constraints (2 Gauss-Seidel iterations)
      const edgeStiffness = p.tens / 100;
      for (let iter = 0; iter < 2; iter++) {
        for (let i = 0; i < N; i++) {
          const j = (i + 1) % N;
          const dx = b.px[j] - b.px[i], dy = b.py[j] - b.py[i];
          const d = Math.sqrt(dx * dx + dy * dy) || 0.001;
          const diff = (d - b.edgeRest[i]) / d * edgeStiffness;
          b.px[i] += dx * diff * 0.5; b.py[i] += dy * diff * 0.5;
          b.px[j] -= dx * diff * 0.5; b.py[j] -= dy * diff * 0.5;
        }
      }

      // Bending constraints
      if (p.bend > 0) {
        const bendStiffness = (p.bend / 30) * 0.3;
        for (let i = 0; i < N; i++) {
          const j = (i + 2) % N;
          const dx = b.px[j] - b.px[i], dy = b.py[j] - b.py[i];
          const d = Math.sqrt(dx * dx + dy * dy) || 0.001;
          const diff = (d - b.bendRest[i]) / d * bendStiffness;
          b.px[i] += dx * diff * 0.5; b.py[i] += dy * diff * 0.5;
          b.px[j] -= dx * diff * 0.5; b.py[j] -= dy * diff * 0.5;
        }
      }

      // Pressure — explicit CW outward normals, clamped magnitude
      const currentArea = Math.abs(blobSignedArea(b));
      const targetArea = b.restArea * (0.6 + (p.pres / 100) * 0.9);
      const pressureMag = Math.max(-0.5, Math.min(2.0,
        (targetArea - currentArea) / (b.restArea || 1) * 1.8));
      for (let i = 0; i < N; i++) {
        const j = (i + 1) % N;
        const ex = b.px[j] - b.px[i], ey = b.py[j] - b.py[i];
        const len = Math.sqrt(ex * ex + ey * ey) || 0.001;
        // CW polygon outward normal: (-ey, ex) / len
        const nx = -ey / len, ny = ex / len;
        const force = pressureMag * len * 0.5;
        b.px[i] += nx * force; b.py[i] += ny * force;
        b.px[j] += nx * force; b.py[j] += ny * force;
      }

      // Wall collisions with bounce + friction
      // Capture velocity BEFORE clamping position to avoid stale-reference
      for (let i = 0; i < N; i++) {
        const vx = b.px[i] - b.ox[i], vy = b.py[i] - b.oy[i];
        if (b.px[i] < BL)    { b.px[i] = BL;    b.ox[i] = BL    + vx * 0.2; b.oy[i] = b.py[i] - vy * 0.92; }
        if (b.px[i] > BR)    { b.px[i] = BR;    b.ox[i] = BR    + vx * 0.2; b.oy[i] = b.py[i] - vy * 0.92; }
        if (b.py[i] < CEIL)  { b.py[i] = CEIL;  b.oy[i] = CEIL  + vy * 0.2; b.ox[i] = b.px[i] - vx * 0.92; }
        if (b.py[i] > FLOOR) { b.py[i] = FLOOR; b.oy[i] = FLOOR + vy * 0.2; b.ox[i] = b.px[i] - vx * 0.92; }
      }

      // Per-blob rescue check — catch collapse WITHIN the substep loop
      if (blobNeedsRescue(b)) { rescueBlob(bi); }
    }

    // ── Cache centroid + radius for collision ──
    cachePerBlobState();

    // ── Blob-blob collision (two-layer: centroid safety + vertex-vertex surface) ──
    for (let ai = 0; ai < blobs.length; ai++) {
      for (let bi2 = ai + 1; bi2 < blobs.length; bi2++) {
        const bA = blobs[ai], bB = blobs[bi2];
        const cA = _cachedCen[ai], cB = _cachedCen[bi2];
        const cdx = cB.x - cA.x, cdy = cB.y - cA.y;
        const cenDist = Math.sqrt(cdx * cdx + cdy * cdy) || 0.001;

        // Early-out for distant pairs
        if (cenDist > (bA.restR + bB.restR) * 2.5) continue;

        const rA = _cachedR[ai], rB = _cachedR[bi2];
        const sumR = rA + rB;

        // Layer 1: centroid-based deep-overlap safety net
        // Only activates when blobs are severely overlapping (centroids closer than 65% of sumR)
        // Moves px AND ox together → pure position correction, zero velocity injection
        const deepOverlap = sumR * 0.65 - cenDist;
        if (deepOverlap > 0) {
          const nx = cdx / cenDist, ny = cdy / cenDist;
          const push = deepOverlap * 0.2;
          for (let i = 0; i < N; i++) {
            bA.px[i] -= nx * push * 0.5; bA.py[i] -= ny * push * 0.5;
            bA.ox[i] -= nx * push * 0.5; bA.oy[i] -= ny * push * 0.5;
            bB.px[i] += nx * push * 0.5; bB.py[i] += ny * push * 0.5;
            bB.ox[i] += nx * push * 0.5; bB.oy[i] += ny * push * 0.5;
          }
        }

        // Layer 2: vertex-vertex surface repulsion (creates squishy contact deformation)
        // Collision distance scaled to edge length so vertices can't slip through
        const avgEdgeLen = sumR * Math.PI / N;
        const colDist = Math.max(4, avgEdgeLen * 1.1);
        const colDist2 = colDist * colDist;
        for (let i = 0; i < N; i++) {
          for (let j = 0; j < N; j++) {
            const dx = bB.px[j] - bA.px[i], dy = bB.py[j] - bA.py[i];
            const d2 = dx * dx + dy * dy;
            if (d2 < colDist2) {
              const d = Math.sqrt(d2) || 0.001;
              const push = (colDist - d) / d * 0.25;
              bA.px[i] -= dx * push * 0.5; bA.py[i] -= dy * push * 0.5;
              bB.px[j] += dx * push * 0.5; bB.py[j] += dy * push * 0.5;
            }
          }
        }
      }
    }

    // ── Snap joints ──
    for (const j of snapJoints) {
      if (j.a >= blobs.length || j.b >= blobs.length) continue;
      const bA = blobs[j.a], bB = blobs[j.b];
      const dx = bB.px[j.bi] - bA.px[j.ai], dy = bB.py[j.bi] - bA.py[j.ai];
      const d = Math.sqrt(dx * dx + dy * dy) || 0.001;
      const diff = (d - j.rest) / d * 0.35;
      bA.px[j.ai] += dx * diff * 0.5; bA.py[j.ai] += dy * diff * 0.5;
      bB.px[j.bi] -= dx * diff * 0.5; bB.py[j.bi] -= dy * diff * 0.5;
    }

    // ── Post-collision wall clamp ──
    for (const b of blobs) {
      for (let i = 0; i < N; i++) {
        if (b.px[i] < BL)    { b.px[i] = BL;    b.ox[i] = BL; }
        if (b.px[i] > BR)    { b.px[i] = BR;    b.ox[i] = BR; }
        if (b.py[i] < CEIL)  { b.py[i] = CEIL;  b.oy[i] = CEIL; }
        if (b.py[i] > FLOOR) { b.py[i] = FLOOR; b.oy[i] = FLOOR; }
      }
    }
  }

  // ── End-of-frame velocity clamp ──
  for (const b of blobs) {
    for (let i = 0; i < N; i++) {
      const vx = b.px[i] - b.ox[i], vy = b.py[i] - b.oy[i];
      const spd = Math.sqrt(vx * vx + vy * vy);
      if (spd > 10) {
        b.ox[i] = b.px[i] - vx / spd * 10;
        b.oy[i] = b.py[i] - vy / spd * 10;
      }
    }
  }
}

// ── Rendering ────────────────────────────────────────────────────────

function drawBlob(b, isSelected) {
  const cen = blobCentroid(b);
  let minY = 1e9, maxY = -1e9, minX = 1e9, maxX = -1e9;
  for (let i = 0; i < N; i++) {
    if (b.py[i] < minY) minY = b.py[i];
    if (b.py[i] > maxY) maxY = b.py[i];
    if (b.px[i] < minX) minX = b.px[i];
    if (b.px[i] > maxX) maxX = b.px[i];
  }
  const spanX = Math.max(maxX - minX, 1);
  const spanY = Math.max(maxY - minY, 1);

  // Drop shadow
  const floorDist = Math.max(0, FLOOR - maxY);
  const shadowAlpha = Math.max(0, 0.18 - floorDist * 0.0015);
  if (shadowAlpha > 0.002) {
    const sw = Math.max(spanX * 0.45, 10);
    const sg = ctx.createRadialGradient(cen.x, FLOOR, 0, cen.x, FLOOR, sw);
    sg.addColorStop(0, `rgba(0,0,0,${shadowAlpha})`);
    sg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.ellipse(cen.x, FLOOR, sw, 6 + shadowAlpha * 20, 0, 0, Math.PI * 2);
    ctx.fillStyle = sg; ctx.fill();
  }

  // Smooth path
  ctx.beginPath();
  const midX = i => (b.px[i] + b.px[(i + 1) % N]) * 0.5;
  const midY = i => (b.py[i] + b.py[(i + 1) % N]) * 0.5;
  ctx.moveTo(midX(0), midY(0));
  for (let i = 0; i < N; i++) {
    const ni = (i + 1) % N;
    ctx.quadraticCurveTo(b.px[ni], b.py[ni], midX(ni), midY(ni));
  }
  ctx.closePath();

  // Selection glow
  if (isSelected) {
    ctx.save();
    ctx.strokeStyle = lightenColor(b.color, 0.5);
    ctx.lineWidth = 5;
    ctx.globalAlpha = 0.45;
    ctx.stroke();
    ctx.restore();
  }

  // Gradient fill
  const gx = cen.x - spanX * 0.15, gy = minY + spanY * 0.25;
  const grad = ctx.createRadialGradient(gx, gy, b.restR * 0.05, cen.x, cen.y, b.restR * 1.2);
  grad.addColorStop(0, lightenColor(b.color, 0.35));
  grad.addColorStop(0.6, b.color);
  grad.addColorStop(1, darkenColor(b.color, 0.3));
  ctx.fillStyle = grad; ctx.fill();

  // Outline
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Specular highlight
  const hlX = cen.x - spanX * 0.12, hlY = minY + spanY * 0.2;
  const hlRx = Math.max(spanX * 0.18, 2), hlRy = Math.max(spanY * 0.09, 1);
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(hlX, hlY, hlRx, hlRy, -0.3, 0, Math.PI * 2);
  const hlGrad = ctx.createRadialGradient(hlX, hlY, 0, hlX, hlY, hlRx);
  hlGrad.addColorStop(0, 'rgba(255,255,255,0.22)');
  hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hlGrad; ctx.fill();
  ctx.restore();

  // Label rendering (Terrarium mode)
  if (b.label && currentMode === 'terrarium') {
    ctx.save();
    const fontSize = Math.max(9, Math.min(13, b.restR * 0.28));
    ctx.font = `600 ${fontSize}px system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    const labelY = maxY + 4;
    // Background pill
    const textW = ctx.measureText(b.label).width;
    const pillW = textW + 10, pillH = fontSize + 6;
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath();
    ctx.roundRect(cen.x - pillW / 2, labelY, pillW, pillH, 3);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    // Text
    ctx.fillStyle = darkenColor(b.color, 0.2);
    ctx.fillText(b.label, cen.x, labelY + 3);
    ctx.restore();
  }
}

function drawSnapLines() {
  if (snapJoints.length === 0) return;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,200,50,0.35)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([3, 3]);
  const drawn = new Set();
  for (const j of snapJoints) {
    if (j.a >= blobs.length || j.b >= blobs.length) continue;
    const key = j.a < j.b ? `${j.a}-${j.b}` : `${j.b}-${j.a}`;
    if (drawn.has(key)) continue;
    drawn.add(key);
    const cA = blobCentroid(blobs[j.a]), cB = blobCentroid(blobs[j.b]);
    ctx.beginPath(); ctx.moveTo(cA.x, cA.y); ctx.lineTo(cB.x, cB.y); ctx.stroke();
  }
  ctx.restore();
}

let targetFPS = 30;
let lastFrameTime = 0;
let physicsAccumulator = 0;
const PHYSICS_DT = 1000 / 60; // Physics always runs at 60Hz internally
const MAX_ACCUMULATED = PHYSICS_DT * 4; // Cap to prevent spiral of death

document.getElementById('fpsSelect').addEventListener('change', e => {
  targetFPS = +e.target.value;
});

function draw(timestamp) {
  requestAnimationFrame(draw);
  const minInterval = 1000 / targetFPS;
  if (timestamp - lastFrameTime < minInterval) return;

  // Accumulate real elapsed time, capped to prevent death spiral
  const elapsed = Math.min(timestamp - lastFrameTime, MAX_ACCUMULATED);
  lastFrameTime = timestamp;

  // Step physics at fixed 60Hz regardless of render FPS
  physicsAccumulator += elapsed;
  while (physicsAccumulator >= PHYSICS_DT) {
    step();
    physicsAccumulator -= PHYSICS_DT;
  }

  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = '#222';
  ctx.fillRect(0, 0, WALL, H);
  ctx.fillRect(W - WALL, 0, WALL, H);
  ctx.fillRect(0, FLOOR, W, WALL);
  ctx.fillStyle = '#ccc';
  ctx.fillRect(WALL, CEIL, W - WALL * 2, 1);

  for (let i = 0; i < blobs.length; i++) drawBlob(blobs[i], isSelected(i));
  drawSnapLines();
}

// ── Go ───────────────────────────────────────────────────────────────
hardReset();
requestAnimationFrame(draw);
</script>
