// ── Blob data structure ──────────────────────────────────────────────

let blobs = [];
let snapJoints = [];

function createBlob(cx, cy, radius, color, pr) {
  const blob = {
    px: [], py: [], ox: [], oy: [],
    edgeRest: [], bendRest: [],
    restArea: 0, restR: radius,
    color: color,
    pr: pr ? { ...pr } : defaultPr(),
    label: '',
    pattern: null,  // null|'spots'|'stripes'|'dots'
    _breathPhase: Math.random() * Math.PI * 2,  // random start so blobs don't breathe in unison
    _blinkTimer:    Math.random() * 4000,        // ms offset so blobs don't blink in unison
    _nextBlink:     2000 + Math.random() * 4000, // ms until first blink
    _blinkProgress: -1,                          // -1=idle, 0..1=blink animation
    // ── Face state (terrarium mode) ────────────────────────────────
    _faceExpr:  'auto',   // 'auto'|'happy'|'sad'|'neutral'|'surprised'|'angry'|'sleepy'|'excited'
    _eyeStyle:  'normal', // 'normal'|'wide'|'sleepy'|'wink'
    _showEyes:  true,
    _showBrows: true,
    _showMouth: true,
    _showBlush: false
  };
  for (let i = 0; i < N; i++) {
    const a = -(i / N) * Math.PI * 2 + Math.PI / 2;
    blob.px.push(cx + Math.cos(a) * radius);
    blob.py.push(cy + Math.sin(a) * radius);
    blob.ox.push(cx + Math.cos(a) * radius);
    blob.oy.push(cy + Math.sin(a) * radius);
  }
  for (let i = 0; i < N; i++) {
    const j = (i + 1) % N;
    blob.edgeRest.push(dist(blob.px[i], blob.py[i], blob.px[j], blob.py[j]));
  }
  for (let i = 0; i < N; i++) {
    const j = (i + 2) % N;
    blob.bendRest.push(dist(blob.px[i], blob.py[i], blob.px[j], blob.py[j]));
  }
  blob.restArea = blobSignedArea(blob);
  if (blob.restArea < 0) blob.restArea = -blob.restArea;
  return blob;
}

function sliderToRadius(v) { return 25 + (v - 1) / 124 * 75; }

function dist(x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  return Math.sqrt(dx * dx + dy * dy);
}

function blobSignedArea(b) {
  let a = 0;
  for (let i = 0; i < N; i++) {
    const j = (i + 1) % N;
    a += b.px[i] * b.py[j] - b.px[j] * b.py[i];
  }
  return a * 0.5;
}

function blobCentroid(b) {
  let cx = 0, cy = 0;
  for (let i = 0; i < N; i++) { cx += b.px[i]; cy += b.py[i]; }
  return { x: cx / N, y: cy / N };
}

function pointInBlob(b, mx, my) {
  let c = 0;
  for (let i = 0; i < N; i++) {
    const j = (i + 1) % N;
    if (((b.py[i] > my) !== (b.py[j] > my)) &&
        (mx < (b.px[j] - b.px[i]) * (my - b.py[i]) / (b.py[j] - b.py[i]) + b.px[i])) c++;
  }
  return c % 2 === 1;
}

// ── Color utilities ──────────────────────────────────────────────────

function hexToRGB(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return { r, g, b };
}

function lightenColor(hex, factor) {
  const { r, g, b } = hexToRGB(hex);
  return `rgb(${Math.min(255,Math.round(r+(255-r)*factor))},${Math.min(255,Math.round(g+(255-g)*factor))},${Math.min(255,Math.round(b+(255-b)*factor))})`;
}

function darkenColor(hex, factor) {
  const { r, g, b } = hexToRGB(hex);
  return `rgb(${Math.round(r*(1-factor))},${Math.round(g*(1-factor))},${Math.round(b*(1-factor))})`;
}

const palette = ['#1a1a1a','#c0392b','#2980b9','#27ae60','#f39c12','#8e44ad','#e67e22','#16a085'];

// ── Blob management ──────────────────────────────────────────────────

function spawnPositions(total, r) {
  if (total === 1) return [{ x: W / 2, y: (CEIL + FLOOR) / 2 }];
  const innerW = BR - BL, innerH = FLOOR - CEIL;
  const aspect = innerW / innerH;
  const cols = Math.max(1, Math.round(Math.sqrt(total * aspect)));
  const rows = Math.ceil(total / cols);
  const cellW = innerW / cols, cellH = innerH / rows;
  const positions = [];
  for (let i = 0; i < total; i++) {
    const col = i % cols, row = Math.floor(i / cols);
    positions.push({ x: BL + cellW * (col + 0.5), y: CEIL + cellH * (row + 0.5) });
  }
  return positions;
}

function syncBlobCount() {
  while (blobs.length < targetCount) {
    const idx = blobs.length;
    const pr = selectedBlobIdx >= 0 && selectedBlobIdx < blobs.length
      ? { ...blobs[selectedBlobIdx].pr } : defaultPr();
    const r = sliderToRadius(pr.size);
    // Spread new blobs across the top of the canvas so they fall in freely
    // instead of spawning inside existing settled blobs
    const slots = targetCount;
    const x = BL + (BR - BL) * ((idx % slots) + 0.5) / slots;
    const pos = { x, y: CEIL + r + 2 };
    blobs.push(createBlob(pos.x, pos.y, r, palette[idx % palette.length], pr));
  }
  while (blobs.length > targetCount) {
    const removedIdx = blobs.length - 1;
    blobs.pop();
    snapJoints = snapJoints.filter(j => j.a < blobs.length && j.b < blobs.length);
    selectedBlobs.delete(removedIdx);
    if (selectedBlobIdx >= blobs.length) {
      selectedBlobIdx = blobs.length - 1;
      if (selectedBlobs.size === 0) selectedBlobs.add(selectedBlobIdx);
      syncSlidersToBlob(selectedBlobIdx);
    }
  }
}

function copyBlobIdentity(src, dst) {
  dst.label       = src.label   || '';
  dst.pattern     = src.pattern || null;
  dst._faceExpr   = src._faceExpr   || 'auto';
  dst._eyeStyle   = src._eyeStyle   || 'normal';
  dst._showEyes   = src._showEyes   !== false;
  dst._showBrows  = src._showBrows  !== false;
  dst._showMouth  = src._showMouth  !== false;
  dst._showBlush  = !!src._showBlush;
}

function rebuildBlob(bi) {
  const b = blobs[bi];
  const cen = blobCentroid(b);
  const r = sliderToRadius(b.pr.size);
  blobs[bi] = createBlob(cen.x, Math.min(cen.y, FLOOR - r - 4), r, b.color, b.pr);
  copyBlobIdentity(b, blobs[bi]);
  snapJoints = snapJoints.filter(j => j.a !== bi && j.b !== bi);
}

function hardReset() {
  blobs = [];
  snapJoints.length = 0;
  dragging = false; dragBlobIdx = -1; grabIdx = -1;
  snapFirst = -1; snapMode = false;
  snapBtn.classList.remove('active');
  hintText.textContent = '';
  const pr0 = defaultPr();
  const r0 = sliderToRadius(pr0.size);
  const positions = spawnPositions(targetCount, r0);
  for (let i = 0; i < targetCount; i++) {
    blobs.push(createBlob(positions[i].x, positions[i].y, r0, palette[i % palette.length], defaultPr()));
  }
  selectedBlobIdx = 0;
  selectedBlobs.clear();
  selectedBlobs.add(0);
  syncSlidersToBlob(0);
}

// ── Drag state ───────────────────────────────────────────────────────

let dragging = false;
let dragBlobIdx = -1;
let grabIdx = -1;
let mouseX = 0, mouseY = 0;
let prevMouseX = 0, prevMouseY = 0;
let velSamples = [];

function findBlobAt(mx, my) {
  for (let bi = 0; bi < blobs.length; bi++) {
    if (pointInBlob(blobs[bi], mx, my)) return bi;
  }
  for (let bi = 0; bi < blobs.length; bi++) {
    const cen = blobCentroid(blobs[bi]);
    if (dist(mx, my, cen.x, cen.y) < blobs[bi].restR * 1.3) return bi;
  }
  return -1;
}

function nearestPt(b, mx, my) {
  let best = -1, bestD = 1e9;
  for (let i = 0; i < N; i++) {
    const d = (b.px[i] - mx) ** 2 + (b.py[i] - my) ** 2;
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
}

function startDrag(mx, my, evt) {
  if (snapMode) {
    const bi = findBlobAt(mx, my);
    if (bi < 0) return;
    if (snapFirst < 0) {
      snapFirst = bi;
      hintText.textContent = `Blob ${bi + 1} selected — click second blob...`;
    } else if (bi !== snapFirst) {
      createSnapJoint(snapFirst, bi);
      hintText.textContent = `Snapped blob ${snapFirst + 1} & ${bi + 1}!`;
      snapFirst = -1;
      setTimeout(() => { hintText.textContent = snapMode ? 'Click first blob...' : ''; }, 1200);
    } else {
      snapFirst = -1;
      hintText.textContent = 'Cancelled — click first blob...';
    }
    return;
  }
  const bi = findBlobAt(mx, my);
  const isMultiKey = evt && (evt.ctrlKey || evt.metaKey);

  if (bi < 0) {
    // Clicked empty space — clear multi-select if no modifier
    if (!isMultiKey && selectedBlobs.size > 1) {
      selectSingle(selectedBlobIdx);
    }
    return;
  }

  // Selection logic
  if (isMultiKey) {
    // Ctrl/Cmd-click: toggle this blob in multi-selection
    toggleMultiSelect(bi);
  } else if (!selectedBlobs.has(bi)) {
    // Normal click on unselected blob: single-select it
    selectSingle(bi);
  } else if (selectedBlobs.size === 1 || bi !== selectedBlobIdx) {
    // Normal click on already-selected blob (or switch primary in multi): make it primary
    selectedBlobIdx = bi;
    syncSlidersToBlob(bi);
  }

  // Start dragging
  dragBlobIdx = bi;
  dragging = true;
  grabIdx = nearestPt(blobs[bi], mx, my);
  mouseX = mx; mouseY = my;
  prevMouseX = mx; prevMouseY = my;
  velSamples = [];
  canvas.style.cursor = 'grabbing';
}

function moveDrag(mx, my) {
  if (!dragging) return;
  prevMouseX = mouseX; prevMouseY = mouseY;
  mouseX = mx; mouseY = my;
  velSamples.push({ vx: mouseX - prevMouseX, vy: mouseY - prevMouseY, t: performance.now() });
  if (velSamples.length > 12) velSamples.shift();
}

function endDrag() {
  if (!dragging) return;
  dragging = false;
  canvas.style.cursor = 'grab';
  if (dragBlobIdx >= 0) {
    const b = blobs[dragBlobIdx];
    const now = performance.now();
    const recent = velSamples.filter(v => now - v.t < 80);
    if (recent.length > 0) {
      let vx = 0, vy = 0;
      for (const v of recent) { vx += v.vx; vy += v.vy; }
      vx /= recent.length; vy /= recent.length;
      for (let i = 0; i < N; i++) { b.ox[i] -= vx * 0.65; b.oy[i] -= vy * 0.65; }
    }
  }
  dragBlobIdx = -1; grabIdx = -1; velSamples = [];
}

// ── Snap joints ──────────────────────────────────────────────────────

function createSnapJoint(ai, bi) {
  if (snapJoints.some(j => (j.a === ai && j.b === bi) || (j.a === bi && j.b === ai))) return;
  const bA = blobs[ai], bB = blobs[bi];
  let bestI = 0, bestJ = 0, bestD = 1e9;
  for (let i = 0; i < N; i++) {
    for (let j = 0; j < N; j++) {
      const d = dist(bA.px[i], bA.py[i], bB.px[j], bB.py[j]);
      if (d < bestD) { bestD = d; bestI = i; bestJ = j; }
    }
  }
  for (let off = -4; off <= 4; off++) {
    const vi = (bestI + off + N) % N, vj = (bestJ - off + N) % N;
    snapJoints.push({ a: ai, ai: vi, b: bi, bi: vj,
      rest: dist(bA.px[vi], bA.py[vi], bB.px[vj], bB.py[vj]) * 0.4 });
  }
}

// ── Mouse / Touch events ─────────────────────────────────────────────

canvas.addEventListener('mousedown', e => { const r = canvas.getBoundingClientRect(); startDrag(e.clientX - r.left, e.clientY - r.top, e); });
canvas.addEventListener('mousemove', e => { const r = canvas.getBoundingClientRect(); moveDrag(e.clientX - r.left, e.clientY - r.top); });
canvas.addEventListener('mouseup', endDrag);
canvas.addEventListener('mouseleave', endDrag);
canvas.addEventListener('touchstart', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); const t = e.touches[0]; startDrag(t.clientX - r.left, t.clientY - r.top, e); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); const t = e.touches[0]; moveDrag(t.clientX - r.left, t.clientY - r.top); }, { passive: false });
canvas.addEventListener('touchend', endDrag);
canvas.addEventListener('touchcancel', endDrag);

// ── Physics step ─────────────────────────────────────────────────────

function rescueBlob(bi) {
  // Rebuild blob in place, keeping color + properties + label + face state
  const b = blobs[bi];
  const cen = blobCentroid(b);
  const r = sliderToRadius(b.pr.size);
  const cx = isFinite(cen.x) ? Math.min(Math.max(cen.x, BL + r + 2), BR - r - 2) : W / 2;
  const cy = isFinite(cen.y) ? Math.min(Math.max(cen.y, CEIL + r + 2), FLOOR - r - 2) : (CEIL + FLOOR) / 2;
  blobs[bi] = createBlob(cx, cy, r, b.color, b.pr);
  copyBlobIdentity(b, blobs[bi]);
}

function blobNeedsRescue(b) {
  for (let i = 0; i < N; i++) {
    if (!isFinite(b.px[i]) || !isFinite(b.py[i]) ||
        !isFinite(b.ox[i]) || !isFinite(b.oy[i])) return true;
  }
  const area = Math.abs(blobSignedArea(b));
  return area < b.restArea * 0.15;
}

// Per-blob cached values (computed once per substep, reused in collision)
const _cachedCen = [];  // { x, y } per blob
const _cachedR = [];    // average radius per blob

function cachePerBlobState() {
  for (let bi = 0; bi < blobs.length; bi++) {
    const b = blobs[bi];
    let cx = 0, cy = 0;
    for (let i = 0; i < N; i++) { cx += b.px[i]; cy += b.py[i]; }
    cx /= N; cy /= N;
    _cachedCen[bi] = { x: cx, y: cy };
    let r = 0;
    for (let i = 0; i < N; i++) {
      const dx = b.px[i] - cx, dy = b.py[i] - cy;
      r += Math.sqrt(dx * dx + dy * dy);
    }
    _cachedR[bi] = r / N;
  }
}

function step() {
  if (blobs.length === 0) return;

  const subDt = (1 / 60) / SUBSTEPS;

  for (let sub = 0; sub < SUBSTEPS; sub++) {

    // ── Per-blob internal physics ──
    for (let bi = 0; bi < blobs.length; bi++) {
      const b = blobs[bi];
      const p = b.pr;
      const gravity   = (p.grav / 50) * 6000 * (p.mass / 15);
      const dampFactor = 1 - (p.damp / 50) * 0.075;

      // Verlet integration
      for (let i = 0; i < N; i++) {
        let vx = (b.px[i] - b.ox[i]) * dampFactor;
        let vy = (b.py[i] - b.oy[i]) * dampFactor;
        vy += gravity * subDt * subDt;
        b.ox[i] = b.px[i]; b.oy[i] = b.py[i];
        b.px[i] += vx; b.py[i] += vy;
      }

      // Soft drag
      if (dragging && bi === dragBlobIdx && grabIdx >= 0) {
        for (let offset = -GRAB_RADIUS; offset <= GRAB_RADIUS; offset++) {
          const idx = (grabIdx + offset + N) % N;
          const weight = 1 - Math.abs(offset) / (GRAB_RADIUS + 1);
          const strength = weight * 0.55;
          b.px[idx] += (mouseX - b.px[idx]) * strength;
          b.py[idx] += (mouseY - b.py[idx]) * strength;
          b.ox[idx] += (mouseX - b.ox[idx]) * strength * 0.9;
          b.oy[idx] += (mouseY - b.oy[idx]) * strength * 0.9;
        }
      }

      // Edge constraints (2 Gauss-Seidel iterations)
      const edgeStiffness = p.tens / 100;
      for (let iter = 0; iter < 2; iter++) {
        for (let i = 0; i < N; i++) {
          const j = (i + 1) % N;
          const dx = b.px[j] - b.px[i], dy = b.py[j] - b.py[i];
          const d = Math.sqrt(dx * dx + dy * dy) || 0.001;
          const diff = (d - b.edgeRest[i]) / d * edgeStiffness;
          b.px[i] += dx * diff * 0.5; b.py[i] += dy * diff * 0.5;
          b.px[j] -= dx * diff * 0.5; b.py[j] -= dy * diff * 0.5;
        }
      }

      // Bending constraints
      if (p.bend > 0) {
        const bendStiffness = (p.bend / 30) * 0.3;
        for (let i = 0; i < N; i++) {
          const j = (i + 2) % N;
          const dx = b.px[j] - b.px[i], dy = b.py[j] - b.py[i];
          const d = Math.sqrt(dx * dx + dy * dy) || 0.001;
          const diff = (d - b.bendRest[i]) / d * bendStiffness;
          b.px[i] += dx * diff * 0.5; b.py[i] += dy * diff * 0.5;
          b.px[j] -= dx * diff * 0.5; b.py[j] -= dy * diff * 0.5;
        }
      }

      // Pressure — explicit CW outward normals, clamped magnitude
      const currentArea = Math.abs(blobSignedArea(b));
      const breathe = Math.sin(b._breathPhase) * 0.025;  // ±2.5% area pulse → subtle life
      const targetArea = b.restArea * (0.6 + (p.pres / 100) * 0.9 + breathe);
      const pressureMag = Math.max(-0.5, Math.min(2.0,
        (targetArea - currentArea) / (b.restArea || 1) * 1.8));
      for (let i = 0; i < N; i++) {
        const j = (i + 1) % N;
        const ex = b.px[j] - b.px[i], ey = b.py[j] - b.py[i];
        const len = Math.sqrt(ex * ex + ey * ey) || 0.001;
        // CW polygon outward normal: (-ey, ex) / len
        const nx = -ey / len, ny = ex / len;
        const force = pressureMag * len * 0.5;
        b.px[i] += nx * force; b.py[i] += ny * force;
        b.px[j] += nx * force; b.py[j] += ny * force;
      }

      // Wall collisions with bounce + friction
      // Capture velocity BEFORE clamping position to avoid stale-reference
      for (let i = 0; i < N; i++) {
        const vx = b.px[i] - b.ox[i], vy = b.py[i] - b.oy[i];
        if (b.px[i] < BL)    { b.px[i] = BL;    b.ox[i] = BL    + vx * 0.2; b.oy[i] = b.py[i] - vy * 0.92; }
        if (b.px[i] > BR)    { b.px[i] = BR;    b.ox[i] = BR    + vx * 0.2; b.oy[i] = b.py[i] - vy * 0.92; }
        if (b.py[i] < CEIL)  { b.py[i] = CEIL;  b.oy[i] = CEIL  + vy * 0.2; b.ox[i] = b.px[i] - vx * 0.92; }
        if (b.py[i] > FLOOR) { b.py[i] = FLOOR; b.oy[i] = FLOOR + vy * 0.2; b.ox[i] = b.px[i] - vx * 0.92; }
      }

      // Per-blob rescue check — catch collapse WITHIN the substep loop
      if (blobNeedsRescue(b)) { rescueBlob(bi); }
    }

    // ── Cache centroid + radius for collision ──
    cachePerBlobState();

    // ── Blob-blob collision (two-layer: centroid safety + vertex-vertex surface) ──
    for (let ai = 0; ai < blobs.length; ai++) {
      for (let bi2 = ai + 1; bi2 < blobs.length; bi2++) {
        const bA = blobs[ai], bB = blobs[bi2];
        const cA = _cachedCen[ai], cB = _cachedCen[bi2];
        const cdx = cB.x - cA.x, cdy = cB.y - cA.y;
        const cenDist = Math.sqrt(cdx * cdx + cdy * cdy) || 0.001;

        // Early-out for distant pairs
        if (cenDist > (bA.restR + bB.restR) * 2.5) continue;

        const rA = _cachedR[ai], rB = _cachedR[bi2];
        const sumR = rA + rB;

        // Layer 1: centroid-based deep-overlap safety net
        // Only activates when blobs are severely overlapping (centroids closer than 65% of sumR)
        // Moves px AND ox together → pure position correction, zero velocity injection
        const deepOverlap = sumR * 0.65 - cenDist;
        if (deepOverlap > 0) {
          const nx = cdx / cenDist, ny = cdy / cenDist;
          const push = deepOverlap * 0.2;
          for (let i = 0; i < N; i++) {
            bA.px[i] -= nx * push * 0.5; bA.py[i] -= ny * push * 0.5;
            bA.ox[i] -= nx * push * 0.5; bA.oy[i] -= ny * push * 0.5;
            bB.px[i] += nx * push * 0.5; bB.py[i] += ny * push * 0.5;
            bB.ox[i] += nx * push * 0.5; bB.oy[i] += ny * push * 0.5;
          }
        }

        // Layer 2: vertex-vertex surface repulsion (creates squishy contact deformation)
        // Collision distance scaled to edge length so vertices can't slip through
        const avgEdgeLen = sumR * Math.PI / N;
        const colDist = Math.max(4, avgEdgeLen * 1.1);
        const colDist2 = colDist * colDist;
        for (let i = 0; i < N; i++) {
          for (let j = 0; j < N; j++) {
            const dx = bB.px[j] - bA.px[i], dy = bB.py[j] - bA.py[i];
            const d2 = dx * dx + dy * dy;
            if (d2 < colDist2) {
              const d = Math.sqrt(d2) || 0.001;
              const push = (colDist - d) / d * 0.25;
              bA.px[i] -= dx * push * 0.5; bA.py[i] -= dy * push * 0.5;
              bB.px[j] += dx * push * 0.5; bB.py[j] += dy * push * 0.5;
            }
          }
        }
      }
    }

    // ── Snap joints ──
    for (const j of snapJoints) {
      if (j.a >= blobs.length || j.b >= blobs.length) continue;
      const bA = blobs[j.a], bB = blobs[j.b];
      const dx = bB.px[j.bi] - bA.px[j.ai], dy = bB.py[j.bi] - bA.py[j.ai];
      const d = Math.sqrt(dx * dx + dy * dy) || 0.001;
      const diff = (d - j.rest) / d * 0.35;
      bA.px[j.ai] += dx * diff * 0.5; bA.py[j.ai] += dy * diff * 0.5;
      bB.px[j.bi] -= dx * diff * 0.5; bB.py[j.bi] -= dy * diff * 0.5;
    }

    // ── Post-collision wall clamp ──
    for (const b of blobs) {
      for (let i = 0; i < N; i++) {
        if (b.px[i] < BL)    { b.px[i] = BL;    b.ox[i] = BL; }
        if (b.px[i] > BR)    { b.px[i] = BR;    b.ox[i] = BR; }
        if (b.py[i] < CEIL)  { b.py[i] = CEIL;  b.oy[i] = CEIL; }
        if (b.py[i] > FLOOR) { b.py[i] = FLOOR; b.oy[i] = FLOOR; }
      }
    }
  }

  // ── End-of-frame velocity clamp ──
  for (const b of blobs) {
    for (let i = 0; i < N; i++) {
      const vx = b.px[i] - b.ox[i], vy = b.py[i] - b.oy[i];
      const spd = Math.sqrt(vx * vx + vy * vy);
      if (spd > 10) {
        b.ox[i] = b.px[i] - vx / spd * 10;
        b.oy[i] = b.py[i] - vy / spd * 10;
      }
    }
  }
}

// ── Rendering ────────────────────────────────────────────────────────

// Face rendering — eyebrows, eyes, mouth.
// Aesthetic matches the MoundProject: solid filled eye shapes (no sclera/pupil),
// arc-based happy/sad eyes, horizontal-bar sleepy eyes, angled angry ellipses,
// arched surprised brows, neutral mouth = straight line.
// All positions derive from live centroid + bounding span so the face deforms
// naturally with the blob's physics.
function drawFace(b, cen, spanX, spanY) {
  const faceInk  = 'rgba(20,15,10,0.88)';
  const faceExpr = b._faceExpr || 'auto';
  const eyeStyle = b._eyeStyle || 'normal';

  // ── Sizing — tall ellipses like MoundProject (eyeH > eyeW) ───────
  const eyeW = Math.max(3,   b.restR * 0.115);  // horizontal radius
  const eyeH = Math.max(5,   b.restR * 0.21);   // vertical radius
  const sw   = Math.max(1.5, b.restR * 0.044);  // stroke weight

  const eyeOffX = spanX * 0.18;
  const eyeOffY = spanY * 0.15;
  const lx = cen.x - eyeOffX, ly = cen.y - eyeOffY;
  const rx = cen.x + eyeOffX, ry = cen.y - eyeOffY;

  // ── Expression mapping ───────────────────────────────────────────
  // moodCurve: -1=deep frown, 0=neutral straight line, +1=big smile
  // browSlant: +ve=inner-DOWN (angry \ /), -ve=inner-UP (sad/worried / \)
  // exprEyes:  eye shape override from expression (null = defer to _eyeStyle)
  let moodCurve, browSlant, exprEyes;
  if (faceExpr === 'auto') {
    const aspect = Math.max(0.4, Math.min(3.0, spanX / spanY));
    moodCurve = Math.max(-0.9, Math.min(0.85, 0.2 + (1.0 - aspect) * 0.65));
    browSlant = Math.max(-eyeW * 0.5, Math.min(eyeW * 1.0, (aspect - 1.0) * eyeW * 1.1));
    exprEyes  = null;
  } else {
    const p = FACE_MODES[faceExpr] || FACE_MODES.neutral;
    moodCurve = p.mood;
    browSlant = p.slant * eyeW;
    exprEyes  = p.eyes;
  }

  // Expression eye override takes priority; wink only if no expression override
  const finalEyes = exprEyes || eyeStyle;
  const isWink    = (eyeStyle === 'wink') && (exprEyes === null);

  ctx.save();
  ctx.lineCap = 'round';

  // ── Blush (behind everything) ─────────────────────────────────────
  if (b._showBlush) {
    const bx = eyeOffX * 1.55, by = eyeOffY * 0.3;
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#ff8888';
    ctx.beginPath(); ctx.ellipse(cen.x - bx, ly + by, eyeW * 1.5, eyeW * 0.65, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cen.x + bx, ry + by, eyeW * 1.5, eyeW * 0.65, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // ── Eyebrows ──────────────────────────────────────────────────────
  if (b._showBrows !== false) {
    const browY   = ly - eyeH * 1.25;
    const browLen = eyeW * 1.55;
    ctx.strokeStyle = faceInk;
    ctx.lineWidth   = Math.max(1.2, sw * 0.85);

    if (faceExpr === 'surprised') {
      // Arched brows — like MoundProject's surprised browType
      ctx.beginPath();
      ctx.ellipse(lx, browY + sw, browLen * 0.55, sw * 2.8, 0, Math.PI * 1.12, Math.PI * 1.88);
      ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(rx, browY + sw, browLen * 0.55, sw * 2.8, 0, Math.PI * 1.12, Math.PI * 1.88);
      ctx.stroke();
    } else {
      // Angled straight lines
      // Left brow: outer=(lx-browLen/2), inner=(lx+browLen/2)
      // browSlant>0 → outer higher / inner lower = angry;  <0 → inner higher = sad/happy
      ctx.beginPath();
      ctx.moveTo(lx - browLen * 0.5, browY - browSlant * 0.5);
      ctx.lineTo(lx + browLen * 0.5, browY + browSlant * 0.5);
      ctx.stroke();
      // Right brow: inner=(rx-browLen/2), outer=(rx+browLen/2)
      ctx.beginPath();
      ctx.moveTo(rx - browLen * 0.5, browY + browSlant * 0.5);
      ctx.lineTo(rx + browLen * 0.5, browY - browSlant * 0.5);
      ctx.stroke();
    }
  }

  // ── Eyes ──────────────────────────────────────────────────────────
  if (b._showEyes !== false) {
    // Blink: sin curve 0→1→0 over progress 0..1 squishes eye height
    const bp = b._blinkProgress;
    const blinkClose = (bp >= 0) ? Math.sin(Math.PI * bp) : 0;

    ctx.fillStyle   = faceInk;
    ctx.strokeStyle = faceInk;
    ctx.lineWidth   = sw;

    function drawOneEye(ex, ey, wink) {
      if (wink) {
        // Wink: upward arc (squinted closed eye) — never blinks further
        ctx.beginPath();
        ctx.ellipse(ex, ey, eyeW * 0.85, eyeH * 0.55, 0, Math.PI, Math.PI * 2);
        ctx.stroke();
        return;
      }
      // Squish vertical height for blink animation
      const eH = eyeH * (1 - blinkClose * 0.92);
      if (blinkClose > 0.82) {
        // Fully closed: single horizontal dash
        ctx.strokeStyle = faceInk;
        ctx.lineWidth = Math.max(1.2, sw * 0.9);
        ctx.beginPath(); ctx.moveTo(ex - eyeW, ey); ctx.lineTo(ex + eyeW, ey); ctx.stroke();
        return;
      }
      switch (finalEyes) {
        case 'happy':
          // Upward arc = happy squint (MoundProject joyful)
          ctx.beginPath();
          ctx.ellipse(ex, ey, eyeW, eH * 0.8, 0, Math.PI, Math.PI * 2);
          ctx.stroke();
          break;
        case 'sad':
          // Downward arc = droopy eye (MoundProject sad)
          ctx.beginPath();
          ctx.ellipse(ex, ey, eyeW, eH * 0.5, 0, 0, Math.PI);
          ctx.stroke();
          break;
        case 'sleepy':
          // Horizontal filled bar — MoundProject sleepy faceType (no blink needed)
          const barH = Math.max(2, eyeH * 0.22);
          ctx.beginPath();
          ctx.roundRect(ex - eyeW, ey - barH * 0.5, eyeW * 2, barH, barH * 0.5);
          ctx.fill();
          break;
        case 'surprised':
          // Large ellipse + white highlight (MoundProject surprised faceType)
          ctx.fillStyle = faceInk;
          ctx.beginPath(); ctx.ellipse(ex, ey, eyeW * 1.35, eH * 1.35, 0, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = 'rgba(255,255,255,0.92)';
          ctx.beginPath(); ctx.ellipse(ex - eyeW * 0.28, ey - eH * 0.28, eyeW * 0.38, eH * 0.38, 0, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = faceInk;
          break;
        case 'angry':
          // Tilted ellipse — inner-top edge raised (MoundProject angry faceType)
          ctx.save();
          ctx.translate(ex, ey);
          ctx.rotate(ex < cen.x ? -0.22 : 0.22);
          ctx.fillStyle = faceInk;
          ctx.beginPath(); ctx.ellipse(0, 0, eyeW, eH, 0, 0, Math.PI * 2); ctx.fill();
          ctx.restore();
          break;
        case 'wide':
          // Sclera + pupil + shine — wide eyes (MoundProject wideEyes faceType)
          ctx.fillStyle = 'rgba(255,255,255,0.92)';
          ctx.beginPath(); ctx.ellipse(ex, ey, eyeW * 1.55, eH * 1.08, 0, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = faceInk;
          ctx.beginPath(); ctx.ellipse(ex, ey, eyeW * 0.88, eH * 0.72, 0, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = 'rgba(255,255,255,0.88)';
          ctx.beginPath(); ctx.arc(ex - eyeW * 0.38, ey - eH * 0.24, Math.max(1, eyeW * 0.22), 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = faceInk;
          break;
        default: // 'normal' — sclera + pupil + shine (MoundProject classic)
          ctx.fillStyle = 'rgba(255,255,255,0.92)';
          ctx.beginPath(); ctx.ellipse(ex, ey, eyeW * 1.08, eH * 1.06, 0, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = faceInk;
          ctx.beginPath(); ctx.ellipse(ex, ey, eyeW * 0.62, eH * 0.7, 0, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = 'rgba(255,255,255,0.88)';
          ctx.beginPath(); ctx.arc(ex - eyeW * 0.25, ey - eH * 0.24, Math.max(1, eyeW * 0.21), 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = faceInk;
          break;
      }
    }

    drawOneEye(lx, ly, false);
    drawOneEye(rx, ry, isWink);
  }

  // ── Mouth ─────────────────────────────────────────────────────────
  if (b._showMouth !== false) {
    const mY     = cen.y + spanY * 0.22;
    const mHalfW = spanX * 0.13;

    if (faceExpr === 'surprised') {
      // Open "O" mouth — MoundProject surprised faceType
      const ow = mHalfW * 0.72;
      const oh = ow * 0.8;
      ctx.fillStyle = 'rgba(20,15,10,0.80)';
      ctx.beginPath(); ctx.ellipse(cen.x, mY - oh * 0.25, ow, oh, 0, 0, Math.PI * 2); ctx.fill();
    } else {
      const maxCH  = mHalfW * 0.55;
      const curveH = moodCurve * maxCH;  // +ve lifts ctrl point = smile; -ve drops = frown
      ctx.strokeStyle = 'rgba(20,15,10,0.75)';
      ctx.lineWidth   = Math.max(1.5, sw * 0.95);
      ctx.beginPath();
      ctx.moveTo(cen.x - mHalfW, mY);
      if (Math.abs(curveH) < maxCH * 0.07) {
        ctx.lineTo(cen.x + mHalfW, mY);                               // neutral straight line
      } else {
        ctx.quadraticCurveTo(cen.x, mY + curveH, cen.x + mHalfW, mY);  // smile / frown
      }
      ctx.stroke();
    }
  }

  ctx.restore();
}

function drawBlobPattern(ctx, b, minX, minY, maxX, maxY) {
  if (!b.pattern) return;
  const spanX = maxX - minX;
  const spanY = maxY - minY;
  const cen = blobCentroid(b);
  const patternColor = darkenColor(b.color, 0.2);
  const blobIdx = blobs.indexOf(b); // for seeded randomization

  ctx.fillStyle = patternColor;

  switch (b.pattern) {
    case 'spots': {
      const seed = 12345 + blobIdx * 789; // deterministic seed per blob
      let rng = seed;
      const nextRand = () => {
        rng = (rng * 9301 + 49297) % 233280;
        return rng / 233280;
      };
      const spotCount = Math.max(3, Math.floor(Math.sqrt(spanX * spanY) / 30));
      for (let i = 0; i < spotCount; i++) {
        const x = minX + nextRand() * spanX;
        const y = minY + nextRand() * spanY;
        const r = 2 + nextRand() * 4;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
    case 'stripes': {
      const stripeWidth = 8;
      const spacing = 14;
      const seed = 12345 + blobIdx * 789;
      let rng = seed;
      const nextRand = () => {
        rng = (rng * 9301 + 49297) % 233280;
        return rng / 233280;
      };
      const angle = nextRand() * Math.PI; // random stripe angle per blob
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);
      let pos = -spanX - spanY;
      while (pos < spanX + spanY) {
        const x1 = cen.x + pos * cos - (spanY * 0.5) * sin;
        const y1 = cen.y + pos * sin + (spanY * 0.5) * cos;
        const x2 = cen.x + (pos + stripeWidth) * cos - (spanY * 0.5) * sin;
        const y2 = cen.y + (pos + stripeWidth) * sin + (spanY * 0.5) * cos;
        const x3 = cen.x + (pos + stripeWidth) * cos + (spanY * 0.5) * sin;
        const y3 = cen.y + (pos + stripeWidth) * sin - (spanY * 0.5) * cos;
        const x4 = cen.x + pos * cos + (spanY * 0.5) * sin;
        const y4 = cen.y + pos * sin - (spanY * 0.5) * cos;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.lineTo(x3, y3);
        ctx.lineTo(x4, y4);
        ctx.closePath();
        ctx.fill();
        pos += spacing;
      }
      break;
    }
    case 'dots': {
      const dotSpacing = 12;
      const dotRadius = 1.5;
      for (let x = minX; x < maxX; x += dotSpacing) {
        for (let y = minY; y < maxY; y += dotSpacing) {
          ctx.beginPath();
          ctx.arc(x, y, dotRadius, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      break;
    }
  }
}

function drawBlob(b, isSelected) {
  const cen = blobCentroid(b);
  let minY = 1e9, maxY = -1e9, minX = 1e9, maxX = -1e9;
  for (let i = 0; i < N; i++) {
    if (b.py[i] < minY) minY = b.py[i];
    if (b.py[i] > maxY) maxY = b.py[i];
    if (b.px[i] < minX) minX = b.px[i];
    if (b.px[i] > maxX) maxX = b.px[i];
  }
  const spanX = Math.max(maxX - minX, 1);
  const spanY = Math.max(maxY - minY, 1);

  // Drop shadow
  const floorDist = Math.max(0, FLOOR - maxY);
  const shadowAlpha = Math.max(0, 0.18 - floorDist * 0.0015);
  if (shadowAlpha > 0.002) {
    const sw = Math.max(spanX * 0.45, 10);
    const sg = ctx.createRadialGradient(cen.x, FLOOR, 0, cen.x, FLOOR, sw);
    sg.addColorStop(0, `rgba(0,0,0,${shadowAlpha})`);
    sg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.ellipse(cen.x, FLOOR, sw, 6 + shadowAlpha * 20, 0, 0, Math.PI * 2);
    ctx.fillStyle = sg; ctx.fill();
  }

  // Smooth path
  ctx.beginPath();
  const midX = i => (b.px[i] + b.px[(i + 1) % N]) * 0.5;
  const midY = i => (b.py[i] + b.py[(i + 1) % N]) * 0.5;
  ctx.moveTo(midX(0), midY(0));
  for (let i = 0; i < N; i++) {
    const ni = (i + 1) % N;
    ctx.quadraticCurveTo(b.px[ni], b.py[ni], midX(ni), midY(ni));
  }
  ctx.closePath();

  // Selection glow
  if (isSelected) {
    ctx.save();
    ctx.strokeStyle = lightenColor(b.color, 0.5);
    ctx.lineWidth = 5;
    ctx.globalAlpha = 0.45;
    ctx.stroke();
    ctx.restore();
  }

  // Gradient fill
  const gx = cen.x - spanX * 0.15, gy = minY + spanY * 0.25;
  const grad = ctx.createRadialGradient(gx, gy, b.restR * 0.05, cen.x, cen.y, b.restR * 1.2);
  grad.addColorStop(0, lightenColor(b.color, 0.35));
  grad.addColorStop(0.6, b.color);
  grad.addColorStop(1, darkenColor(b.color, 0.3));
  ctx.fillStyle = grad; ctx.fill();

  // Outline
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Surface patterns — below face
  if (b.pattern) {
    ctx.save();
    ctx.beginPath();
    const midX = i => (b.px[i] + b.px[(i + 1) % N]) * 0.5;
    const midY = i => (b.py[i] + b.py[(i + 1) % N]) * 0.5;
    ctx.moveTo(midX(0), midY(0));
    for (let i = 0; i < N; i++) {
      const ni = (i + 1) % N;
      ctx.quadraticCurveTo(b.px[ni], b.py[ni], midX(ni), midY(ni));
    }
    ctx.closePath();
    ctx.clip();
    drawBlobPattern(ctx, b, minX, minY, maxX, maxY);
    ctx.restore();
  }

  // Face (terrarium mode only, when toggle is on) — above pattern
  if (currentMode === 'terrarium' && showEyes) drawFace(b, cen, spanX, spanY);

  // Specular highlight
  const hlX = cen.x - spanX * 0.12, hlY = minY + spanY * 0.2;
  const hlRx = Math.max(spanX * 0.18, 2), hlRy = Math.max(spanY * 0.09, 1);
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(hlX, hlY, hlRx, hlRy, -0.3, 0, Math.PI * 2);
  const hlGrad = ctx.createRadialGradient(hlX, hlY, 0, hlX, hlY, hlRx);
  hlGrad.addColorStop(0, 'rgba(255,255,255,0.22)');
  hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hlGrad; ctx.fill();
  ctx.restore();

  // Label rendering (Terrarium mode)
  if (b.label && currentMode === 'terrarium') {
    ctx.save();
    const fontSize = Math.max(9, Math.min(13, b.restR * 0.28));
    ctx.font = `600 ${fontSize}px system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    const labelY = maxY + 4;
    // Background pill
    const textW = ctx.measureText(b.label).width;
    const pillW = textW + 10, pillH = fontSize + 6;
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath();
    ctx.roundRect(cen.x - pillW / 2, labelY, pillW, pillH, 3);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    // Text
    ctx.fillStyle = darkenColor(b.color, 0.2);
    ctx.fillText(b.label, cen.x, labelY + 3);
    ctx.restore();
  }
}

function drawDebug() {
  const N = 32;

  // ── Per-blob overlays ──────────────────────────────────────────────
  for (let bi = 0; bi < blobs.length; bi++) {
    const b = blobs[bi];

    // Centroid + bounding box pass
    let cx = 0, cy = 0;
    let minX = b.px[0], maxX = b.px[0], minY = b.py[0], maxY = b.py[0];
    for (let i = 0; i < N; i++) {
      cx += b.px[i]; cy += b.py[i];
      if (b.px[i] < minX) minX = b.px[i];
      if (b.px[i] > maxX) maxX = b.px[i];
      if (b.py[i] < minY) minY = b.py[i];
      if (b.py[i] > maxY) maxY = b.py[i];
    }
    cx /= N; cy /= N;
    const spanX = maxX - minX, spanY = maxY - minY;
    const aspect = spanY > 0 ? (spanX / spanY).toFixed(2) : '?';

    // Dashed bounding box
    ctx.save();
    ctx.setLineDash([3, 3]);
    ctx.strokeStyle = 'rgba(255,255,0,0.5)';
    ctx.lineWidth = 1;
    ctx.strokeRect(minX, minY, spanX, spanY);
    ctx.restore();

    // Centroid crosshair
    ctx.save();
    ctx.strokeStyle = 'rgba(255,80,80,0.9)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx - 7, cy); ctx.lineTo(cx + 7, cy);
    ctx.moveTo(cx, cy - 7); ctx.lineTo(cx, cy + 7);
    ctx.stroke();
    ctx.restore();

    // Average velocity arrow (cyan)
    let avgVx = 0, avgVy = 0;
    for (let i = 0; i < N; i++) { avgVx += b.px[i] - b.ox[i]; avgVy += b.py[i] - b.oy[i]; }
    avgVx /= N; avgVy /= N;
    const spd = Math.sqrt(avgVx * avgVx + avgVy * avgVy);
    if (spd > 0.02) {
      const sc = 10;
      const ex = cx + avgVx * sc, ey = cy + avgVy * sc;
      const ang = Math.atan2(avgVy, avgVx);
      ctx.save();
      ctx.strokeStyle = 'rgba(80,220,255,0.9)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy); ctx.lineTo(ex, ey);
      ctx.moveTo(ex, ey); ctx.lineTo(ex - 6 * Math.cos(ang - 0.4), ey - 6 * Math.sin(ang - 0.4));
      ctx.moveTo(ex, ey); ctx.lineTo(ex - 6 * Math.cos(ang + 0.4), ey - 6 * Math.sin(ang + 0.4));
      ctx.stroke();
      ctx.restore();
    }

    // Vertex dots — color-coded by per-vertex speed (cyan = slow → red = fast)
    for (let i = 0; i < N; i++) {
      const vx = b.px[i] - b.ox[i], vy = b.py[i] - b.oy[i];
      const vs = Math.sqrt(vx * vx + vy * vy);
      const t = Math.min(1, vs / 4);
      const r = Math.round(40 + t * 215);
      const g = Math.round(200 * (1 - t));
      const bl = Math.round(255 * (1 - t * 0.85));
      ctx.beginPath();
      ctx.arc(b.px[i], b.py[i], 2, 0, Math.PI * 2);
      ctx.fillStyle = `rgb(${r},${g},${bl})`;
      ctx.fill();
    }

    // Per-blob info tag (floats above bounding box)
    const area = Math.abs(blobSignedArea(b));
    const areaPct = Math.round(area / b.restArea * 100);
    const tag = `B${bi}  ${areaPct}%  asp:${aspect}`;
    ctx.save();
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    const tw = ctx.measureText(tag).width + 8;
    const ty = minY - 4;
    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fillRect(cx - tw / 2, ty - 11, tw, 13);
    ctx.fillStyle = '#ffe080';
    ctx.fillText(tag, cx, ty);
    ctx.restore();
  }

  // ── Snap joint distance labels ─────────────────────────────────────
  for (const j of snapJoints) {
    const a = blobs[j.a], bb2 = blobs[j.b];
    if (!a || !bb2) continue;
    let acx = 0, acy = 0, bcx = 0, bcy = 0;
    for (let i = 0; i < N; i++) { acx += a.px[i]; acy += a.py[i]; bcx += bb2.px[i]; bcy += bb2.py[i]; }
    acx /= N; acy /= N; bcx /= N; bcy /= N;
    const jd = Math.sqrt((bcx - acx) ** 2 + (bcy - acy) ** 2).toFixed(1);
    ctx.save();
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,200,60,0.9)';
    ctx.fillText(`j${j.a}↔${j.b}  d:${jd}px`, (acx + bcx) / 2, Math.min(acy, bcy) - 8);
    ctx.restore();
  }

  // ── Global HUD (top-left corner) ───────────────────────────────────
  const lines = [
    `FPS   ${_dbFPS} / ${targetFPS}`,
    `step  ${_dbStepMs.toFixed(2)} ms`,
    `draw  ${_dbDrawMs.toFixed(2)} ms`,
    `blobs ${blobs.length}   joints ${snapJoints.length}`,
    `N=${N}   sub=${SUBSTEPS}`,
  ];
  const lh = 14, padX = 8, padY = 6;
  const hudW = 148, hudH = padY * 2 + lh * lines.length;
  const hx = WALL + 4, hy = CEIL + 4;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(hx, hy, hudW, hudH);
  ctx.font = '11px monospace';
  for (let i = 0; i < lines.length; i++) {
    ctx.fillStyle = i === 0 ? '#7fff7f' : '#ccffcc';
    ctx.fillText(lines[i], hx + padX, hy + padY + lh * (i + 1) - 2);
  }
  ctx.restore();
}

function drawSnapLines() {
  if (snapJoints.length === 0) return;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,200,50,0.35)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([3, 3]);
  const drawn = new Set();
  for (const j of snapJoints) {
    if (j.a >= blobs.length || j.b >= blobs.length) continue;
    const key = j.a < j.b ? `${j.a}-${j.b}` : `${j.b}-${j.a}`;
    if (drawn.has(key)) continue;
    drawn.add(key);
    const cA = blobCentroid(blobs[j.a]), cB = blobCentroid(blobs[j.b]);
    ctx.beginPath(); ctx.moveTo(cA.x, cA.y); ctx.lineTo(cB.x, cB.y); ctx.stroke();
  }
  ctx.restore();
}

let targetFPS = 30;
let lastFrameTime = 0;
let physicsAccumulator = 0;
const PHYSICS_DT = 1000 / 60; // Physics always runs at 60Hz internally
const MAX_ACCUMULATED = PHYSICS_DT * 4; // Cap to prevent spiral of death

document.getElementById('fpsSelect').addEventListener('change', e => {
  targetFPS = +e.target.value;
});

function draw(timestamp) {
  requestAnimationFrame(draw);
  const minInterval = 1000 / targetFPS;
  if (timestamp - lastFrameTime < minInterval) return;

  // Accumulate real elapsed time, capped to prevent death spiral
  const elapsed = Math.min(timestamp - lastFrameTime, MAX_ACCUMULATED);
  lastFrameTime = timestamp;

  // FPS tracking (sampled every 500ms)
  _dbFrameCount++;
  _dbFPSAccum += elapsed;
  if (_dbFPSAccum >= 500) {
    _dbFPS = Math.round(_dbFrameCount / _dbFPSAccum * 1000);
    _dbFrameCount = 0;
    _dbFPSAccum = 0;
  }

  // Step physics at fixed 60Hz regardless of render FPS
  physicsAccumulator += elapsed;
  const _t0 = performance.now();
  while (physicsAccumulator >= PHYSICS_DT) {
    step();
    physicsAccumulator -= PHYSICS_DT;
  }
  _dbStepMs = performance.now() - _t0;

  // Advance breath phase and blink timers each render frame
  for (let i = 0; i < blobs.length; i++) {
    const b = blobs[i];
    b._breathPhase += 0.07;  // ~3s cycle at 30fps, staggered by random init
    // Blink animation: progress 0→1 over 180ms, then idle until next blink
    if (b._blinkProgress >= 0) {
      b._blinkProgress = Math.min(1.0, b._blinkProgress + elapsed / 180);
      if (b._blinkProgress >= 1.0) b._blinkProgress = -1;
    } else {
      b._blinkTimer += elapsed;
      if (b._blinkTimer >= b._nextBlink) {
        b._blinkTimer = 0;
        const fm = FACE_MODES[b._faceExpr];
        b._nextBlink = (fm ? fm.blinkMin : 2000) + Math.random() * (fm ? fm.blinkRange : 4000);
        b._blinkProgress = 0;
      }
    }
  }

  // Update background animation phase
  if (currentBackground === 'waves' || currentBackground === 'stormy') {
    backgroundAnimPhase += 0.02; // Adjust speed as needed
  }

  const _t1 = performance.now();

  // Draw background
  drawBackground();

  // Draw walls and floor (on top of background)
  ctx.fillStyle = '#222';
  ctx.fillRect(0, 0, WALL, H);
  ctx.fillRect(W - WALL, 0, WALL, H);
  ctx.fillRect(0, FLOOR, W, WALL);
  ctx.fillStyle = '#ccc';
  ctx.fillRect(WALL, CEIL, W - WALL * 2, 1);

  for (let i = 0; i < blobs.length; i++) drawBlob(blobs[i], isSelected(i));
  drawSnapLines();
  if (debugMode) drawDebug();
  _dbDrawMs = performance.now() - _t1;
}

// ── Go ───────────────────────────────────────────────────────────────
hardReset();
renderStaticBackground('solid');  // Initialize default background
requestAnimationFrame(draw);
</script>
