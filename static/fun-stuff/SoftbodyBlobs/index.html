<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soft-Body Blobs v18 — Modes + Synthograsizer Integration</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: system-ui, sans-serif; padding-top: 1rem; }
  .slider-grid { padding: 0.4rem 1.5rem 1.4rem; max-width: 560px; margin: 0 auto;
                 display: grid; grid-template-columns: 1fr 1fr; gap: 9px 28px; }
  .slider-grid label { font-size: 12px; color: #666; display: block; margin-bottom: 2px; }
  .slider-grid label span.val { font-weight: 500; color: #111; }
  .slider-grid input.val-input { width: 48px; font-size: 12px; font-weight: 500; color: #111;
    border: 1px solid #ccc; border-radius: 3px; padding: 0 3px; text-align: right;
    font-family: system-ui, sans-serif; background: #fafafa; margin-left: 2px; }
  .slider-grid input[type=range] { width: 100%; }
  .toolbar { padding: 0.4rem 1.5rem 0.2rem; max-width: 560px; margin: 0 auto;
             display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .toolbar button { font-size: 11px; padding: 3px 10px; border: 0.5px solid #aaa;
                    border-radius: 4px; background: #fff; cursor: pointer; color: #333; }
  .toolbar button:hover { background: #f0f0f0; }
  .toolbar button.active { background: #333; color: #fff; border-color: #333; }
  .color-swatch { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #ccc;
                  cursor: pointer; position: relative; overflow: hidden; flex-shrink: 0; }
  .color-swatch input { position: absolute; inset: -6px; width: 38px; height: 38px;
                        cursor: pointer; opacity: 0; }
  .hint { font-size: 10px; color: #999; margin-left: auto; }
  #selectionBar { padding: 0.3rem 1.5rem 0; max-width: 560px; margin: 0 auto;
                  display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  #selLabel { font-size: 11px; font-weight: 600; color: #444; }
  #selDot { width: 10px; height: 10px; border-radius: 50%; display: inline-block;
            border: 1.5px solid rgba(0,0,0,0.15); flex-shrink: 0; }
  #selectionBar button { font-size: 10px; padding: 2px 8px; border: 0.5px solid #bbb;
                         border-radius: 4px; background: #fff; cursor: pointer; color: #555; }
  #selectionBar button:hover { background: #f0f0f0; }
  #masterBtn.active { background: #333; color: #fff; border-color: #333; }
  #modePanel { padding: 0.3rem 1.5rem 0; max-width: 560px; margin: 0 auto; display: none; }
  #modePanel .panel-content { font-size: 11px; color: #666; padding: 6px 10px; background: #fafafa;
    border-radius: 6px; border: 0.5px solid #e0e0e0; line-height: 1.6; }
  #pictionaryUI { display: none; padding: 0.3rem 1.5rem 0; max-width: 560px; margin: 0 auto; }
  .pict-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .pict-row .timer { font-size: 20px; font-weight: 700; color: #d63031; font-family: 'Courier New', monospace;
    min-width: 48px; text-align: center; }
  .pict-row .guess-input { font-size: 12px; padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px;
    width: 180px; font-family: system-ui, sans-serif; }
  .pict-row .guess-btn { font-size: 11px; padding: 4px 10px; border: 0.5px solid #aaa; border-radius: 4px;
    background: #fff; cursor: pointer; color: #333; }
  .pict-row .guess-btn:hover { background: #f0f0f0; }
  .pict-row .score { font-size: 12px; font-weight: 600; color: #2d3436; }
  .pict-row .reveal { font-size: 12px; font-weight: 700; color: #6c5ce7; }
  .pict-row .new-round-btn { font-size: 11px; padding: 3px 10px; border: 0.5px solid #aaa; border-radius: 4px;
    background: #fff; cursor: pointer; color: #333; }
  .pict-row .new-round-btn:hover { background: #f0f0f0; }
  #labelInput { font-size: 11px; padding: 2px 8px; border: 1px solid #ccc; border-radius: 4px;
    width: 130px; font-family: system-ui, sans-serif; display: none; }
  #facePanelWrap { display: none; padding: 0.3rem 1.5rem 0; max-width: 560px; margin: 0 auto; }
  #facePanelWrap .face-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    font-size: 11px; color: #555; background: #fafafa; border: 0.5px solid #e0e0e0;
    border-radius: 6px; padding: 6px 10px; }
  #facePanelWrap label { display: flex; align-items: center; gap: 4px; cursor: pointer; color: #555; }
  #facePanelWrap select { font-size: 10px; padding: 1px 4px; border: 0.5px solid #bbb;
    border-radius: 4px; background: #fff; color: #444; cursor: pointer; font-family: system-ui, sans-serif; }
  .face-heading { font-weight: 600; color: #333; margin-right: 2px; }
</style>
</head>
<body>
<canvas id="c" style="display:block;margin:0 auto;background:#f4f4f4;border-radius:8px;border:0.5px solid #e0e0e0;cursor:grab;"></canvas>

<div class="toolbar">
  <button id="resetBtn">&#8634; reset</button>
  <button id="resetAllBtn">&#8634; reset all</button>
  <div class="color-swatch" id="swatchWrap">
    <input type="color" id="colorPicker" value="#1a1a1a" title="Blob color">
  </div>
  <label style="font-size:12px;color:#666;">Blobs <span id="v-count" style="font-weight:500;color:#111;">1</span></label>
  <input type="range" id="count" min="1" max="8" value="1" step="1" style="width:100px;accent-color:#111;">
  <button id="snapBtn" title="Click two blobs to snap them together">&#128279; snap mode</button>
  <button id="unsnapBtn" title="Remove all snap joints">&#10005; unsnap all</button>
  <select id="fpsSelect" style="font-size:11px;padding:3px 6px;border:0.5px solid #aaa;border-radius:4px;background:#fff;color:#333;cursor:pointer;">
    <option value="15">15 fps</option>
    <option value="24">24 fps</option>
    <option value="30" selected>30 fps</option>
    <option value="60">60 fps</option>
  </select>
  <button id="exportBtn" title="Export all settings as JSON">&#128229; export</button>
  <button id="importBtn" title="Import settings from JSON">&#128228; import</button>
  <input type="file" id="importFile" accept=".json" style="display:none;">
  <button id="captureBtn" title="Capture canvas and send to Synthograsizer as reference image">&#128247; capture</button>
  <select id="modeSelect" style="font-size:11px;padding:3px 6px;border:0.5px solid #aaa;border-radius:4px;background:#fff;color:#333;cursor:pointer;" title="Game mode">
    <option value="sandbox">Sandbox</option>
    <option value="terrarium">Terrarium</option>
    <option value="pictionary">Pictionary</option>
  </select>
  <select id="backgroundSelect" style="font-size:11px;padding:3px 6px;border:0.5px solid #aaa;border-radius:4px;background:#fff;color:#333;cursor:pointer;" title="Background style">
    <option value="empty" selected>empty</option>
    <option value="solid">solid bg</option>
    <option value="gradient">gradient</option>
    <option value="grid">grid</option>
    <option value="stars">stars</option>
    <option value="dots">dots</option>
    <option value="underwater">underwater</option>
    <option value="candy">candy</option>
    <option value="sunny_day">sunny day</option>
    <option value="candy_land">candy land</option>
    <option value="quiet_library">library</option>
    <option value="forest">forest</option>
    <option value="misty_mountains">mountains</option>
    <option value="cityscape">cityscape</option>
    <option value="waves">waves</option>
    <option value="stormy">stormy</option>
  </select>
  <label id="eyesToggleWrap" style="display:none;font-size:12px;color:#666;cursor:pointer;user-select:none;" title="Show/hide blob faces">
    <input type="checkbox" id="eyesToggle" checked style="accent-color:#111;cursor:pointer;"> faces
  </label>
  <button id="debugBtn" title="Toggle debug overlay — vertices, velocity, timings, physics stats">🐛 debug</button>
  <span class="hint" id="hintText"></span>
</div>

<div id="selectionBar">
  <span id="selDot"></span>
  <span id="selLabel">Blob 1 properties</span>
  <button id="randBtn" title="Randomize this blob's properties">&#127922; randomize</button>
  <button id="masterBtn" title="Edit all blobs at once">&#9776; master</button>
  <input id="labelInput" placeholder="Label this blob..." title="Terrarium label">
</div>

<div id="modePanel">
  <div class="panel-content" id="modePanelContent"></div>
</div>

<div id="facePanelWrap">
  <div class="face-row">
    <span class="face-heading">😊 Face:</span>
    <label>Mood
      <select id="faceExprSelect">
        <option value="auto">auto</option>
        <option value="happy">happy</option>
        <option value="excited">excited</option>
        <option value="curious">curious</option>
        <option value="shy">shy</option>
        <option value="sleepy">sleepy</option>
        <option value="grumpy">grumpy</option>
        <option value="sad">sad</option>
        <option value="surprised">surprised</option>
        <option value="neutral">neutral</option>
      </select>
    </label>
    <label>Eyes
      <select id="eyeStyleSelect">
        <option value="normal">normal</option>
        <option value="wide">wide</option>
        <option value="sleepy">sleepy</option>
        <option value="wink">wink</option>
      </select>
    </label>
    <label><input type="checkbox" id="showEyesToggle" checked> eyes</label>
    <label><input type="checkbox" id="showBrowsToggle" checked> brows</label>
    <label><input type="checkbox" id="showMouthToggle" checked> mouth</label>
    <label><input type="checkbox" id="showBlushToggle"> blush</label>
  </div>
  <div class="face-row">
    <span class="face-heading">🎨 Pattern:</span>
    <label>Style
      <select id="patternSelect">
        <option value="">none</option>
        <option value="spots">spots</option>
        <option value="stripes">stripes</option>
        <option value="dots">dots</option>
      </select>
    </label>
  </div>
</div>

<div id="pictionaryUI">
  <div class="pict-row">
    <span class="timer" id="pictTimer">--</span>
    <input class="guess-input" id="pictGuess" placeholder="What are the blobs making?" disabled>
    <button class="guess-btn" id="pictGuessBtn" disabled>Guess</button>
    <span class="score" id="pictScore"></span>
    <span class="reveal" id="pictReveal"></span>
    <button class="new-round-btn" id="pictNewRound" style="display:none;">New Round</button>
  </div>
</div>

<div class="slider-grid">
  <div><label>Size <input class="val-input" id="v-size" type="number" value="50"></label><input type="range" id="size" min="1" max="125" value="50" step="1"></div>
  <div><label>Inflation <input class="val-input" id="v-pres" type="number" value="50"></label><input type="range" id="pres" min="0" max="125" value="50" step="1"></div>
  <div><label>Rubber tension <input class="val-input" id="v-tens" type="number" value="35"></label><input type="range" id="tens" min="5" max="125" value="35" step="1"></div>
  <div><label>Damping <input class="val-input" id="v-damp" type="number" value="20"></label><input type="range" id="damp" min="1" max="50" value="20" step="1"></div>
  <div><label>Fluid mass <input class="val-input" id="v-mass" type="number" value="5"></label><input type="range" id="mass" min="1" max="15" value="5" step="1"></div>
  <div><label>Gravity <input class="val-input" id="v-grav" type="number" value="5"></label><input type="range" id="grav" min="0" max="50" value="5" step="1"></div>
  <div><label>Bending stiffness <input class="val-input" id="v-bend" type="number" value="8"></label><input type="range" id="bend" min="0" max="38" value="8" step="1"></div>
</div>

<script>
/* ── Soft-Body Blobs v18 — Modes + Synthograsizer Integration ────────────────
   - Each blob has its own physics parameters
   - Click a blob to select it; sliders reflect + control that blob
   - Slider ranges expanded +25% (gravity up to 50)
   - Master mode, randomize, color picker, snap-together
   - Simple vertex-vertex collision (stable & lightweight)
   ─────────────────────────────────────────────────────────────────── */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 520, H = 420;
canvas.width = W; canvas.height = H;

// Offscreen canvas for pre-rendered static backgrounds
const bgCanvas = document.createElement('canvas');
const bgCtx = bgCanvas.getContext('2d');
bgCanvas.width = W; bgCanvas.height = H;

const WALL = 14, FLOOR = H - WALL, CEIL = WALL, BL = WALL, BR = W - WALL;
const N = 32;
const SUBSTEPS = 10;
const GRAB_RADIUS = 6;

// ── Physics Presets (text string → parameter bundle) ────────────────

const PHYSICS_PRESETS = {
  "gelatin":        { size: 80, pres: 40, tens: 25, damp: 35, mass: 8, grav: 12, bend: 15 },
  "rubber ball":    { size: 50, pres: 70, tens: 90, damp: 10, mass: 5, grav: 20, bend: 30 },
  "mercury":        { size: 60, pres: 60, tens: 10, damp: 45, mass: 15, grav: 25, bend: 2 },
  "soap bubble":    { size: 100, pres: 100, tens: 5, damp: 5, mass: 1, grav: 2, bend: 1 },
  "molten lava":    { size: 90, pres: 30, tens: 15, damp: 40, mass: 12, grav: 30, bend: 5 },
  "marshmallow":    { size: 70, pres: 50, tens: 40, damp: 30, mass: 6, grav: 15, bend: 20 },
  "water balloon":  { size: 65, pres: 55, tens: 20, damp: 25, mass: 7, grav: 18, bend: 8 },
  "steel ball":     { size: 40, pres: 85, tens: 120, damp: 5, mass: 14, grav: 35, bend: 35 },
  "slime":          { size: 75, pres: 35, tens: 8, damp: 40, mass: 9, grav: 10, bend: 3 },
  "jelly":          { size: 60, pres: 45, tens: 30, damp: 28, mass: 6, grav: 14, bend: 12 },
  "plasma":         { size: 55, pres: 90, tens: 5, damp: 8, mass: 2, grav: 3, bend: 1 },
  "pudding":        { size: 85, pres: 38, tens: 18, damp: 38, mass: 10, grav: 16, bend: 10 },
  "bouncy ball":    { size: 45, pres: 80, tens: 100, damp: 3, mass: 4, grav: 22, bend: 28 },
  "tar":            { size: 95, pres: 20, tens: 12, damp: 48, mass: 14, grav: 28, bend: 4 },
  "cloud":          { size: 110, pres: 95, tens: 3, damp: 2, mass: 1, grav: 1, bend: 0 },
};

// ── Background System ────────────────────────────────────────────────────

let currentBackground = 'empty';
let backgroundAnimPhase = 0;

const BACKGROUND_DEFAULTS = {
  playful: 'candy_land',
  sleepy: 'misty_mountains',
  grumpy: 'stormy',
  shy: 'quiet_library',
  cheerful: 'sunny_day',
  curious: 'forest'
};

function renderStaticBackground(type) {
  // Fill with white background by default (opaque for no trail smearing)
  bgCtx.fillStyle = '#ffffff';
  bgCtx.fillRect(0, 0, W, H);

  switch (type) {
    case 'empty':
      // Dark opaque background
      bgCtx.fillStyle = '#0f0f1e';
      bgCtx.fillRect(0, 0, W, H);
      break;

    case 'solid':
      // Already filled above
      break;

    case 'gradient': {
      // Linear vertical gradient filling entire canvas
      const gr = bgCtx.createLinearGradient(0, 0, 0, H);
      gr.addColorStop(0, '#3d3e5f');
      gr.addColorStop(0.5, '#2a2a4f');
      gr.addColorStop(1, '#0f0f2e');
      bgCtx.fillStyle = gr;
      bgCtx.fillRect(0, 0, W, H);
      break;
    }

    case 'grid': {
      bgCtx.strokeStyle = 'rgba(255,255,255,0.05)';
      bgCtx.lineWidth = 0.5;
      const spacing = 20;
      for (let x = 0; x < W; x += spacing) {
        bgCtx.beginPath();
        bgCtx.moveTo(x, 0);
        bgCtx.lineTo(x, H);
        bgCtx.stroke();
      }
      for (let y = 0; y < H; y += spacing) {
        bgCtx.beginPath();
        bgCtx.moveTo(0, y);
        bgCtx.lineTo(W, y);
        bgCtx.stroke();
      }
      break;
    }

    case 'stars': {
      bgCtx.fillStyle = 'rgba(255,255,200,0.6)';
      const starCount = 40;
      let seed = 98765;
      const nextRand = () => {
        seed = (seed * 9301 + 49297) % 233280;
        return seed / 233280;
      };
      for (let i = 0; i < starCount; i++) {
        const x = nextRand() * W;
        const y = nextRand() * H;
        const r = 0.5 + nextRand() * 1;
        bgCtx.beginPath();
        bgCtx.arc(x, y, r, 0, Math.PI * 2);
        bgCtx.fill();
      }
      break;
    }

    case 'dots': {
      bgCtx.fillStyle = 'rgba(200,200,220,0.15)';
      const spacing = 30;
      for (let x = 0; x < W; x += spacing) {
        for (let y = 0; y < H; y += spacing) {
          bgCtx.beginPath();
          bgCtx.arc(x, y, 2, 0, Math.PI * 2);
          bgCtx.fill();
        }
      }
      break;
    }

    case 'underwater': {
      // Gradient base
      const gr = bgCtx.createLinearGradient(0, 0, 0, H);
      gr.addColorStop(0, '#2a4a6a');
      gr.addColorStop(1, '#1a2a4a');
      bgCtx.fillStyle = gr;
      bgCtx.fillRect(0, 0, W, H);
      // Coral silhouettes at bottom
      bgCtx.fillStyle = 'rgba(150,100,80,0.3)';
      const coralSpacing = 80;
      for (let x = 0; x < W; x += coralSpacing) {
        const h = 40 + Math.sin(x * 0.05) * 20;
        bgCtx.fillRect(x, H - h, 30, h);
      }
      break;
    }

    case 'candy': {
      // Pastel gradient
      const gr = bgCtx.createLinearGradient(0, 0, W, H);
      gr.addColorStop(0, '#ffc0e0');
      gr.addColorStop(0.5, '#e0c0ff');
      gr.addColorStop(1, '#c0e0ff');
      bgCtx.fillStyle = gr;
      bgCtx.fillRect(0, 0, W, H);
      // Scattered shape marks
      bgCtx.fillStyle = 'rgba(255,200,220,0.3)';
      let seed = 54321;
      const nextRand = () => {
        seed = (seed * 9301 + 49297) % 233280;
        return seed / 233280;
      };
      for (let i = 0; i < 12; i++) {
        const x = nextRand() * W;
        const y = nextRand() * H;
        const s = 8 + nextRand() * 12;
        bgCtx.beginPath();
        bgCtx.arc(x, y, s, 0, Math.PI * 2);
        bgCtx.fill();
      }
      break;
    }

    case 'sunny_day': {
      // Sky gradient (warm yellows)
      const gr = bgCtx.createLinearGradient(0, 0, 0, H);
      gr.addColorStop(0, '#ffd89b');
      gr.addColorStop(0.5, '#ffeb99');
      gr.addColorStop(1, '#fff9e6');
      bgCtx.fillStyle = gr;
      bgCtx.fillRect(0, 0, W, H);
      // Sun
      bgCtx.fillStyle = '#ffcc00';
      const sunX = W * 0.75, sunY = H * 0.2;
      bgCtx.beginPath();
      bgCtx.arc(sunX, sunY, W * 0.08, 0, Math.PI * 2);
      bgCtx.fill();
      // Clouds
      bgCtx.fillStyle = 'rgba(255,255,255,0.7)';
      let seed = 12345;
      const rnd = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
      for (let i = 0; i < 5; i++) {
        const cx = rnd() * W, cy = H * (0.15 + rnd() * 0.25);
        const cw = W * (0.08 + rnd() * 0.12), ch = cw * 0.5;
        for (let j = 0; j < 4; j++) {
          bgCtx.beginPath();
          bgCtx.ellipse(cx + (j - 1.5) * cw * 0.4, cy, cw * 0.4, ch, 0, 0, Math.PI * 2);
          bgCtx.fill();
        }
      }
      break;
    }

    case 'candy_land': {
      // Pastel candy colors gradient
      const gr = bgCtx.createLinearGradient(0, 0, W, H);
      gr.addColorStop(0, '#ffe0f0');
      gr.addColorStop(0.5, '#e0f0ff');
      gr.addColorStop(1, '#f0ffe0');
      bgCtx.fillStyle = gr;
      bgCtx.fillRect(0, 0, W, H);
      // Ground
      bgCtx.fillStyle = '#ffd9e6';
      bgCtx.fillRect(0, H * 0.7, W, H * 0.3);
      // Lollipops and gumdrops
      const candyColors = ['#ff69b4', '#ffc0ff', '#87ceeb', '#90ee90', '#ffff99'];
      let seed = 11111;
      const rnd = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
      for (let i = 0; i < 8; i++) {
        const x = rnd() * W, y = H * 0.7 - rnd() * H * 0.4;
        const size = H * (0.06 + rnd() * 0.08);
        bgCtx.fillStyle = candyColors[Math.floor(rnd() * candyColors.length)];
        bgCtx.beginPath();
        bgCtx.arc(x, y, size, 0, Math.PI * 2);
        bgCtx.fill();
      }
      break;
    }

    case 'quiet_library': {
      // Warm wall color
      bgCtx.fillStyle = '#e8dcc8';
      bgCtx.fillRect(0, 0, W, H);
      // Bookshelves
      let seed = 22222;
      const rnd = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
      const shelfH = H / 5;
      const bookColors = ['#8b4513', '#d2691e', '#a0522d', '#4b3621', '#654321', '#8b5a3c'];
      for (let shelf = 0; shelf < 5; shelf++) {
        const sy = shelf * shelfH;
        bgCtx.fillStyle = '#b8a599';
        bgCtx.fillRect(0, sy + shelfH * 0.85, W, shelfH * 0.08);
        // Books
        let bx = 5;
        while (bx < W - 10) {
          const bw = 15 + rnd() * 35;
          const bh = shelfH * 0.8 - rnd() * shelfH * 0.15;
          bgCtx.fillStyle = bookColors[Math.floor(rnd() * bookColors.length)];
          bgCtx.fillRect(bx, sy + shelfH * 0.85 - bh, bw, bh);
          bx += bw + 3;
        }
      }
      break;
    }

    case 'forest': {
      // Sky gradient (green)
      const gr = bgCtx.createLinearGradient(0, 0, 0, H);
      gr.addColorStop(0, '#90ee90');
      gr.addColorStop(1, '#228b22');
      bgCtx.fillStyle = gr;
      bgCtx.fillRect(0, 0, W, H);
      // Wavy tree silhouettes
      let seed = 33333;
      const rnd = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
      const treeColors = ['#006400', '#228b22', '#2e8b57', '#3cb371'];
      for (let t = 0; t < 4; t++) {
        bgCtx.fillStyle = treeColors[t];
        bgCtx.beginPath();
        const tx = W * (0.1 + t * 0.25);
        bgCtx.moveTo(tx, H);
        for (let x = tx - W * 0.15; x <= tx + W * 0.15; x += 10) {
          const y = H * 0.5 + Math.sin((x - tx) * 0.02) * H * 0.3 - Math.random() * H * 0.1;
          if (x === tx - W * 0.15) bgCtx.moveTo(x, y);
          else bgCtx.lineTo(x, y);
        }
        bgCtx.lineTo(tx + W * 0.15, H);
        bgCtx.fill();
      }
      break;
    }

    case 'misty_mountains': {
      // Sky gradient (blues with mist effect)
      const gr = bgCtx.createLinearGradient(0, 0, 0, H);
      gr.addColorStop(0, '#87ceeb');
      gr.addColorStop(0.5, '#add8e6');
      gr.addColorStop(1, '#b0e0e6');
      bgCtx.fillStyle = gr;
      bgCtx.fillRect(0, 0, W, H);
      // Mountain layers using sine waves
      let seed = 44444;
      const rnd = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
      const mountainColors = ['rgba(100,100,120,0.4)', 'rgba(80,80,100,0.5)', 'rgba(60,60,80,0.6)'];
      for (let layer = 0; layer < 3; layer++) {
        bgCtx.fillStyle = mountainColors[layer];
        bgCtx.beginPath();
        const baseY = H * (0.4 + layer * 0.2);
        const freq = 0.008 + layer * 0.002;
        const amp = H * (0.15 - layer * 0.03);
        bgCtx.moveTo(0, baseY);
        for (let x = 0; x <= W; x += 10) {
          const y = baseY - Math.sin(x * freq) * amp - layer * H * 0.05;
          bgCtx.lineTo(x, y);
        }
        bgCtx.lineTo(W, H);
        bgCtx.lineTo(0, H);
        bgCtx.fill();
      }
      break;
    }

    case 'cityscape': {
      // Night/dusk sky gradient
      const gr = bgCtx.createLinearGradient(0, 0, 0, H);
      gr.addColorStop(0, '#2a3f5f');
      gr.addColorStop(0.5, '#1a2a3f');
      gr.addColorStop(1, '#0a1a2f');
      bgCtx.fillStyle = gr;
      bgCtx.fillRect(0, 0, W, H);
      // Stars
      bgCtx.fillStyle = 'rgba(255,255,255,0.6)';
      let seed = 55555;
      const rnd = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
      for (let i = 0; i < 30; i++) {
        const sx = rnd() * W, sy = rnd() * H * 0.4;
        bgCtx.beginPath();
        bgCtx.arc(sx, sy, 0.5 + rnd() * 0.5, 0, Math.PI * 2);
        bgCtx.fill();
      }
      // Buildings with varying heights
      const buildingW = W / 8;
      for (let b = 0; b < 8; b++) {
        const bx = b * buildingW;
        const bh = H * (0.4 + rnd() * 0.4);
        const by = H - bh;
        // Building body
        bgCtx.fillStyle = `rgb(${30 + rnd() * 40}, ${20 + rnd() * 30}, ${10 + rnd() * 20})`;
        bgCtx.fillRect(bx, by, buildingW - 2, bh);
        // Building outline
        bgCtx.strokeStyle = 'rgba(0,0,0,0.5)';
        bgCtx.lineWidth = 1;
        bgCtx.strokeRect(bx, by, buildingW - 2, bh);
        // Windows
        bgCtx.fillStyle = '#ffff99';
        const windowRows = Math.floor(bh / 25);
        const windowCols = 2;
        const windowSize = 8;
        const windowGap = 4;
        const startX = bx + (buildingW - windowCols * (windowSize + windowGap)) / 2;
        const startY = by + 15;
        for (let row = 0; row < windowRows; row++) {
          for (let col = 0; col < windowCols; col++) {
            const wx = startX + col * (windowSize + windowGap);
            const wy = startY + row * (windowSize + windowGap);
            // Window lit or dark (random)
            if (rnd() > 0.3) {
              bgCtx.fillStyle = '#ffff99';
              bgCtx.fillRect(wx, wy, windowSize, windowSize);
            } else {
              bgCtx.fillStyle = '#1a1a2a';
              bgCtx.fillRect(wx, wy, windowSize, windowSize);
            }
          }
        }
      }
      break;
    }
  }
}

function drawBackground() {
  if (currentBackground === 'waves') {
    // Animated waves
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(200,200,255,0.15)';
    ctx.lineWidth = 1;
    const waveCount = 3;
    for (let i = 0; i < waveCount; i++) {
      const yOff = H * 0.25 + i * (H * 0.25);
      const phase = backgroundAnimPhase * (0.5 + i * 0.3);
      ctx.beginPath();
      for (let x = 0; x <= W; x += 10) {
        const y = yOff + Math.sin((x * 0.02 + phase) * Math.PI * 2) * 15;
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  } else if (currentBackground === 'stormy') {
    // Static cloud silhouettes + rare lightning
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);
    // Cloud silhouettes
    ctx.fillStyle = 'rgba(100,100,120,0.4)';
    ctx.beginPath();
    ctx.ellipse(W * 0.2, H * 0.2, 80, 40, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(W * 0.7, H * 0.3, 100, 50, 0, 0, Math.PI * 2);
    ctx.fill();
    // Rare lightning flash
    if (Math.sin(backgroundAnimPhase * 4) > 0.95) {
      ctx.globalAlpha = 0.8;
      ctx.strokeStyle = '#ffff99';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(W * 0.5, 0);
      ctx.lineTo(W * 0.45, H * 0.3);
      ctx.lineTo(W * 0.55, H * 0.5);
      ctx.lineTo(W * 0.48, H * 0.8);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  } else {
    // Static background from offscreen canvas
    ctx.drawImage(bgCanvas, 0, 0);
  }
}

// ── BroadcastChannel Integration ────────────────────────────────────

const blobChannel = new BroadcastChannel('synthograsizer-blob-v1');

blobChannel.onmessage = (e) => {
  const msg = e.data;
  if (!msg || !msg.type) return;

  switch (msg.type) {
    case 'set-mode':
      if (['sandbox', 'terrarium', 'pictionary'].includes(msg.mode)) {
        setGameMode(msg.mode);
        document.getElementById('modeSelect').value = msg.mode;
      }
      break;

    case 'terrarium-spawn':
      // Receives: { type, creatures: [{ label, preset, color }, ...] }
      handleTerrariumSpawn(msg.creatures || []);
      break;

    case 'apply-preset':
      // Receives: { type, preset: "gelatin", blobIndex?: number }
      applyPresetByName(msg.preset, msg.blobIndex);
      break;

    case 'set-labels':
      // Receives: { type, labels: ["cat", "dog", ...] }
      if (Array.isArray(msg.labels)) {
        msg.labels.forEach((lbl, i) => {
          if (i < blobs.length) blobs[i].label = lbl;
        });
      }
      break;

    case 'pictionary-start':
      // Receives: { type, prompt: "a snowman", duration?: 60 }
      startPictionaryRound(msg.prompt, msg.duration || 60);
      break;

    case 'set-colors':
      // Receives: { type, theme: "fire" } or { type, colors: ["#fff", ...] }
      if (msg.theme && COLOR_THEMES[msg.theme]) {
        const theme = COLOR_THEMES[msg.theme];
        blobs.forEach((b, i) => { b.color = theme[i % theme.length]; });
        syncSlidersToBlob(selectedBlobIdx);
      } else if (Array.isArray(msg.colors)) {
        msg.colors.forEach((c, i) => { if (i < blobs.length) blobs[i].color = c; });
        syncSlidersToBlob(selectedBlobIdx);
      }
      break;

    case 'set-params':
      // Receives: { type, params: { size?, pres?, tens?, damp?, mass?, grav?, bend? }, blobIndex? }
      // Applies only the provided keys; omitted keys are left unchanged.
      if (msg.params) {
        const indices = (msg.blobIndex !== undefined && msg.blobIndex >= 0 && msg.blobIndex < blobs.length)
          ? [msg.blobIndex]
          : blobs.map((_, i) => i);
        for (const bi of indices) {
          const p = blobs[bi].pr;
          for (const key of ['size', 'pres', 'tens', 'damp', 'mass', 'grav', 'bend']) {
            if (msg.params[key] !== undefined) p[key] = Number(msg.params[key]);
          }
        }
        syncSlidersToBlob(selectedBlobIdx);
      }
      break;

    case 'set-blob-count':
      // Receives: { type, count: 1-8 }
      if (typeof msg.count === 'number' && msg.count >= 1 && msg.count <= 8) {
        targetCount = msg.count;
        document.getElementById('count').value = targetCount;
        document.getElementById('v-count').textContent = targetCount;
        syncBlobCount();
      }
      break;

    case 'set-background':
      // Receives: { type, background: 'solid'|'gradient'|'grid'|'stars'|'dots'|'underwater'|'candy'|'waves'|'stormy' }
      if (msg.background && ['solid', 'gradient', 'grid', 'stars', 'dots', 'underwater', 'candy', 'waves', 'stormy'].includes(msg.background)) {
        currentBackground = msg.background;
        document.getElementById('backgroundSelect').value = msg.background;
        if (msg.background !== 'waves' && msg.background !== 'stormy') {
          renderStaticBackground(msg.background);
        }
      }
      break;

    case 'ping':
      blobChannel.postMessage({ type: 'pong', mode: currentMode });
      break;
  }
};

function applyPresetByName(presetName, blobIndex) {
  const key = presetName?.toLowerCase().trim();
  const preset = PHYSICS_PRESETS[key];
  if (!preset) return;

  if (blobIndex !== undefined && blobIndex >= 0 && blobIndex < blobs.length) {
    applyPrToBlob(blobIndex, { ...preset });
  } else {
    // Apply to all blobs
    for (let i = 0; i < blobs.length; i++) applyPrToBlob(i, { ...preset });
  }
  syncSlidersToBlob(selectedBlobIdx);
}

function handleTerrariumSpawn(creatures) {
  if (creatures.length === 0) return;
  setGameMode('terrarium');

  // Set blob count to match creatures
  targetCount = Math.min(creatures.length, 8);
  document.getElementById('count').value = targetCount;
  document.getElementById('v-count').textContent = targetCount;

  // Reset blobs
  blobs = [];
  snapJoints.length = 0;
  const positions = spawnPositions(targetCount, 50);

  for (let i = 0; i < targetCount; i++) {
    const c = creatures[i];
    const presetKey = c.preset?.toLowerCase().trim();
    const pr = PHYSICS_PRESETS[presetKey] ? { ...PHYSICS_PRESETS[presetKey] } : defaultPr();
    const r = sliderToRadius(pr.size);
    const color = c.color || palette[i % palette.length];
    const blob = createBlob(positions[i].x, positions[i].y, r, color, pr);
    blob.label = c.label || '';
    blob.pattern = c.pattern || null;
    // Map legacy personality names from external messages to unified mood
    const PERSONALITY_MAP = { playful: 'excited', cheerful: 'happy', grumpy: 'grumpy',
                               shy: 'shy', sleepy: 'sleepy', curious: 'curious' };
    if (c.personality) blob._faceExpr = PERSONALITY_MAP[c.personality] || c.personality;
    blobs.push(blob);
  }
  selectedBlobIdx = 0;
  selectedBlobs.clear();
  selectedBlobs.add(0);
  syncSlidersToBlob(0);
}

// ── Game Mode UI Logic ──────────────────────────────────────────────

function setGameMode(mode) {
  currentMode = mode;
  const modePanel = document.getElementById('modePanel');
  const modePanelContent = document.getElementById('modePanelContent');
  const pictionaryUI = document.getElementById('pictionaryUI');
  const labelInput = document.getElementById('labelInput');

  // Clean up any active pictionary
  if (mode !== 'pictionary' && pictState.timerInterval) {
    clearInterval(pictState.timerInterval);
    pictState.active = false;
  }

  switch (mode) {
    case 'sandbox':
      modePanel.style.display = 'none';
      pictionaryUI.style.display = 'none';
      labelInput.style.display = 'none';
      document.getElementById('eyesToggleWrap').style.display = 'none';
      document.getElementById('facePanelWrap').style.display = 'none';
      break;

    case 'terrarium':
      modePanel.style.display = 'block';
      modePanelContent.innerHTML = '<b>Terrarium Mode</b> — Label your blobs! Each blob is a creature with its own name and personality. ' +
        'Select a blob and type a name below, or receive creatures from the Synthograsizer.';
      pictionaryUI.style.display = 'none';
      labelInput.style.display = 'inline-block';
      document.getElementById('eyesToggleWrap').style.display = 'inline-flex';
      document.getElementById('facePanelWrap').style.display = 'block';
      // Ensure all blobs have a label property
      blobs.forEach(b => { if (!b.label) b.label = ''; });
      updateLabelInput();
      if (selectedBlobIdx >= 0) syncFacePanel(selectedBlobIdx);
      break;

    case 'pictionary':
      modePanel.style.display = 'block';
      modePanelContent.innerHTML = '<b>Pictionary Mode</b> — Arrange the blobs to match the secret prompt! ' +
        'Drag, resize, and color them. When time runs out, guess what was being depicted. ' +
        'Or receive prompts from the Synthograsizer.';
      pictionaryUI.style.display = 'block';
      labelInput.style.display = 'none';
      document.getElementById('eyesToggleWrap').style.display = 'none';
      document.getElementById('facePanelWrap').style.display = 'none';
      // Clear labels in pictionary mode
      blobs.forEach(b => { b.label = ''; });
      break;
  }

  // Broadcast mode change
  blobChannel.postMessage({ type: 'mode-changed', mode: currentMode });
}

function updateLabelInput() {
  const labelInput = document.getElementById('labelInput');
  if (currentMode !== 'terrarium') return;
  if (selectedBlobIdx >= 0 && selectedBlobIdx < blobs.length) {
    labelInput.value = blobs[selectedBlobIdx].label || '';
    labelInput.placeholder = `Label blob ${selectedBlobIdx + 1}...`;
  }
}

document.getElementById('modeSelect').addEventListener('change', e => {
  setGameMode(e.target.value);
});

document.getElementById('backgroundSelect').addEventListener('change', e => {
  currentBackground = e.target.value;
  if (currentBackground !== 'waves' && currentBackground !== 'stormy') {
    renderStaticBackground(currentBackground);
  }
});

document.getElementById('labelInput').addEventListener('input', e => {
  if (currentMode === 'terrarium' && selectedBlobIdx >= 0 && selectedBlobIdx < blobs.length) {
    blobs[selectedBlobIdx].label = e.target.value;
  }
});

// ── Pictionary Game Logic ───────────────────────────────────────────

function startPictionaryRound(prompt, duration) {
  setGameMode('pictionary');
  document.getElementById('modeSelect').value = 'pictionary';

  pictState.prompt = prompt || PICTIONARY_PROMPTS[Math.floor(Math.random() * PICTIONARY_PROMPTS.length)];
  pictState.roundDuration = duration || 60;
  pictState.timeLeft = pictState.roundDuration;
  pictState.active = true;
  pictState.revealed = false;
  pictState.totalRounds++;

  // Reset UI
  const timerEl = document.getElementById('pictTimer');
  const guessInput = document.getElementById('pictGuess');
  const guessBtn = document.getElementById('pictGuessBtn');
  const revealEl = document.getElementById('pictReveal');
  const newRoundBtn = document.getElementById('pictNewRound');
  const scoreEl = document.getElementById('pictScore');

  timerEl.textContent = pictState.timeLeft;
  timerEl.style.color = '#d63031';
  guessInput.value = '';
  guessInput.disabled = false;
  guessBtn.disabled = false;
  revealEl.textContent = '';
  newRoundBtn.style.display = 'none';
  scoreEl.textContent = pictState.totalRounds > 1 ? `Score: ${pictState.score}/${pictState.totalRounds - 1}` : '';

  // Start countdown
  if (pictState.timerInterval) clearInterval(pictState.timerInterval);
  pictState.timerInterval = setInterval(() => {
    pictState.timeLeft--;
    timerEl.textContent = Math.max(0, pictState.timeLeft);
    if (pictState.timeLeft <= 10) timerEl.style.color = '#e74c3c';
    if (pictState.timeLeft <= 0) {
      endPictionaryRound(false);
    }
  }, 1000);
}

function endPictionaryRound(guessedCorrectly) {
  if (pictState.timerInterval) clearInterval(pictState.timerInterval);
  pictState.active = false;

  const guessInput = document.getElementById('pictGuess');
  const guessBtn = document.getElementById('pictGuessBtn');
  const revealEl = document.getElementById('pictReveal');
  const newRoundBtn = document.getElementById('pictNewRound');
  const scoreEl = document.getElementById('pictScore');
  const timerEl = document.getElementById('pictTimer');

  guessInput.disabled = true;
  guessBtn.disabled = true;
  newRoundBtn.style.display = 'inline-block';

  if (guessedCorrectly) {
    pictState.score++;
    revealEl.textContent = `Correct! It was "${pictState.prompt}"`;
    revealEl.style.color = '#00b894';
    timerEl.style.color = '#00b894';
  } else {
    pictState.revealed = true;
    revealEl.textContent = `It was "${pictState.prompt}"`;
    revealEl.style.color = '#d63031';
  }
  scoreEl.textContent = `Score: ${pictState.score}/${pictState.totalRounds}`;

  blobChannel.postMessage({
    type: 'pictionary-result',
    correct: guessedCorrectly,
    prompt: pictState.prompt,
    score: pictState.score,
    total: pictState.totalRounds
  });
}

function checkPictionaryGuess() {
  const guessInput = document.getElementById('pictGuess');
  const guess = guessInput.value.trim().toLowerCase();
  if (!guess) return;

  const target = pictState.prompt.toLowerCase();
  // Fuzzy match: remove articles and check inclusion
  const cleanGuess = guess.replace(/^(a |an |the )/i, '').trim();
  const cleanTarget = target.replace(/^(a |an |the )/i, '').trim();

  const correct = cleanGuess === cleanTarget ||
                  cleanTarget.includes(cleanGuess) ||
                  cleanGuess.includes(cleanTarget);

  endPictionaryRound(correct);
}

document.getElementById('pictGuessBtn').addEventListener('click', checkPictionaryGuess);
document.getElementById('pictGuess').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPictionaryGuess();
});
document.getElementById('pictNewRound').addEventListener('click', () => {
  startPictionaryRound(null, pictState.roundDuration);
});

// ── Canvas Capture → Synthograsizer Reference Image ─────────────────

function captureCanvas() {
  // Re-render current state without advancing physics
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#222';
  ctx.fillRect(0, 0, WALL, H);
  ctx.fillRect(W - WALL, 0, WALL, H);
  ctx.fillRect(0, FLOOR, W, WALL);
  ctx.fillStyle = '#ccc';
  ctx.fillRect(WALL, CEIL, W - WALL * 2, 1);
  for (let i = 0; i < blobs.length; i++) drawBlob(blobs[i], false);
  drawSnapLines();

  const imageData = canvas.toDataURL('image/png');

  // Build context metadata for the Synthograsizer prompt
  const labels = blobs.map(b => b.label).filter(Boolean);
  const presetNames = [...new Set(blobs.map(b => {
    for (const [name, pr] of Object.entries(PHYSICS_PRESETS)) {
      if (pr.pres === b.pr.pres && pr.tens === b.pr.tens) return name;
    }
    return null;
  }).filter(Boolean))];

  const captureMsg = {
    type: 'canvas-capture',
    imageData,
    mode: currentMode,
    blobCount: blobs.length,
    labels: labels.length > 0 ? labels : null,
    prompt: currentMode === 'pictionary' && pictState.prompt ? pictState.prompt : null,
    presets: presetNames.length > 0 ? presetNames : null,
    timestamp: Date.now()
  };

  blobChannel.postMessage(captureMsg);

  hintText.textContent = '📷 Sent to Synthograsizer!';
  setTimeout(() => { hintText.textContent = ''; }, 2000);

  // Also flash the capture button
  const btn = document.getElementById('captureBtn');
  btn.textContent = '✓ captured';
  btn.style.background = '#27ae60';
  btn.style.color = '#fff';
  btn.style.borderColor = '#27ae60';
  setTimeout(() => {
    btn.textContent = '📷 capture';
    btn.style.background = '';
    btn.style.color = '';
    btn.style.borderColor = '';
  }, 1500);
}

document.getElementById('captureBtn').addEventListener('click', captureCanvas);

// ── Default physics params ───────────────────────────────────────────

const DEFAULTS = { size: 50, pres: 50, tens: 35, damp: 20, mass: 5, grav: 5, bend: 8 };
function defaultPr() { return { ...DEFAULTS }; }

// ── Selected blob + multi-select + master mode ─────────────────────

let selectedBlobIdx = 0;       // "primary" selection — drives slider display
let selectedBlobs = new Set([0]); // all currently selected blobs
let masterMode = false;
const SLIDER_IDS = Object.keys(DEFAULTS);

/** Returns the array of blob objects that controls should target */
function getTargetBlobs() {
  if (masterMode) return blobs;
  if (selectedBlobs.size > 1) return [...selectedBlobs].filter(i => i < blobs.length).map(i => blobs[i]);
  if (selectedBlobIdx >= 0 && selectedBlobIdx < blobs.length) return [blobs[selectedBlobIdx]];
  return [];
}

/** Returns the set of selected indices (for rendering glow) */
function isSelected(bi) {
  if (masterMode) return true;
  return selectedBlobs.has(bi);
}

/** Set a single blob as the only selection */
function selectSingle(bi) {
  selectedBlobs.clear();
  selectedBlobs.add(bi);
  selectedBlobIdx = bi;
  masterMode = false;
  document.getElementById('masterBtn').classList.remove('active');
  syncSlidersToBlob(bi);
}

/** Toggle a blob in/out of multi-selection (Ctrl-click) */
function toggleMultiSelect(bi) {
  if (masterMode) {
    // Exit master mode into just this blob
    masterMode = false;
    document.getElementById('masterBtn').classList.remove('active');
    selectedBlobs.clear();
    selectedBlobs.add(bi);
    selectedBlobIdx = bi;
  } else if (selectedBlobs.has(bi)) {
    // Deselect it (unless it's the only one)
    if (selectedBlobs.size > 1) {
      selectedBlobs.delete(bi);
      // If we removed the primary, pick the first remaining
      if (selectedBlobIdx === bi) {
        selectedBlobIdx = [...selectedBlobs][0];
      }
    }
  } else {
    // Add to selection
    selectedBlobs.add(bi);
    selectedBlobIdx = bi; // make the newly-added one the primary
  }
  syncSlidersToBlob(selectedBlobIdx);
}

function syncSlidersToBlob(bi) {
  if (bi < 0 || bi >= blobs.length) return;
  const p = blobs[bi].pr;
  for (const id of SLIDER_IDS) {
    document.getElementById(id).value = p[id];
    document.getElementById('v-' + id).value = p[id];

  if (currentMode === 'terrarium') syncFacePanel(bi);

    el.style.accentColor = col;

    const nums = [...selectedBlobs].sort((a, b) => a - b).map(i => i + 1).join(', ');
    selText = `Blobs ${nums} selected`;

    dotBorder = '2px solid rgba(0,0,0,0.25)';

  colorPicker.value = /^#[0-9a-f]{6}$/i.test(col) ? col : '#1a1a1a';

  updateLabelInput();

// ── Randomize ────────────────────────────────────────────────────────

const RAND_RANGES = {
  size: [10, 100], pres: [10, 110], tens: [5, 110],
  damp: [1, 45],   mass: [1, 13],   grav: [0, 20], bend: [0, 35]
};

// Physics randomization ranges keyed by mood
const MOOD_PR_RANGES = {
  happy:     { size: [45, 85], pres: [50, 80], damp: [10, 22], grav: [12, 22], tens: [30, 55], bend: [8, 22]  },
  excited:   { size: [40, 90], pres: [55, 90], damp: [5, 18],  grav: [8, 18],  tens: [25, 50], bend: [5, 20]  },
  curious:   { size: [25, 85], pres: [40, 70], damp: [12, 25], grav: [5, 15],  tens: [15, 35], bend: [2, 10]  },
  shy:       { size: [35, 75], pres: [25, 50], damp: [25, 40], grav: [3, 12],  tens: [25, 45], bend: [5, 18]  },
  sleepy:    { size: [30, 70], pres: [20, 45], damp: [30, 50], grav: [2, 8],   tens: [20, 40], bend: [5, 15]  },
  grumpy:    { size: [20, 80], pres: [30, 55], damp: [15, 30], grav: [10, 25], tens: [60, 90], bend: [20, 35] },
  sad:       { size: [30, 70], pres: [25, 50], damp: [25, 40], grav: [3, 12],  tens: [25, 45], bend: [5, 18]  },
  surprised: { size: [25, 85], pres: [40, 70], damp: [12, 25], grav: [5, 15],  tens: [15, 35], bend: [2, 10]  },
  neutral:   { size: [30, 80], pres: [35, 65], damp: [15, 30], grav: [5, 15],  tens: [25, 50], bend: [5, 20]  },
};

// Face config keyed by mood — used by drawFace and blink timing
const FACE_MODES = {
  happy:     { mood:  0.70, slant: -0.12, eyes: 'happy',     blinkMin: 2000, blinkRange: 3000 },
  excited:   { mood:  0.90, slant: -0.25, eyes: 'happy',     blinkMin: 1000, blinkRange: 2000 },
  curious:   { mood:  0.05, slant: -0.10, eyes: 'surprised', blinkMin: 800,  blinkRange: 1500 },
  shy:       { mood: -0.05, slant: -0.20, eyes: null,        blinkMin: 3000, blinkRange: 5000 },
  sleepy:    { mood:  0.05, slant:  0.00, eyes: 'sleepy',    blinkMin: 5000, blinkRange: 8000 },
  grumpy:    { mood: -0.55, slant:  0.75, eyes: 'angry',     blinkMin: 3000, blinkRange: 5000 },
  sad:       { mood: -0.55, slant: -0.60, eyes: 'sad',       blinkMin: 3000, blinkRange: 4000 },
  surprised: { mood:  0.10, slant: -0.45, eyes: 'surprised', blinkMin: 2000, blinkRange: 3000 },
  neutral:   { mood:  0.05, slant:  0.00, eyes: null,        blinkMin: 2500, blinkRange: 3500 },
};

function randomPr(mood) {
  const ranges = mood && MOOD_PR_RANGES[mood] ? MOOD_PR_RANGES[mood] : RAND_RANGES;
  const p = {};
  for (const [id, [lo, hi]] of Object.entries(ranges))
    p[id] = Math.round(lo + Math.random() * (hi - lo));
  return p;
}

function applyPrToBlob(bi, p) {
  const sizeChanged = blobs[bi].pr.size !== p.size;
  blobs[bi].pr = { ...p };
  if (sizeChanged) rebuildBlob(bi);
}

function randomizeSelected() {
  if (blobs.length === 0) return;
  const targets = getTargetBlobs();
  const p = randomPr(masterMode ? (targets[0]?._faceExpr || 'auto') : undefined);
  for (const b of targets) {
    applyPrToBlob(blobs.indexOf(b), masterMode ? p : randomPr(b._faceExpr || 'auto'));
  }
  syncSlidersToBlob(selectedBlobIdx);
}
