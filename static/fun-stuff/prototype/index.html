/* ═══════════════════════════════════════════
   AUDIO ENGINE
═══════════════════════════════════════════ */
class ScratchAudio {
  constructor() { this.ctx = null; this.enabled = true; }
  init() {
    if (this.ctx) return;
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { this.enabled = false; }
  }
  play(type, opts = {}) {
    if (!this.ctx || !this.enabled) return;
    const now = this.ctx.currentTime;
    const g = this.ctx.createGain();
    g.connect(this.ctx.destination);
    g.gain.setValueAtTime(opts.vol || 0.08, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + (opts.dur || 0.1));
    if (type === "scratch") {
      const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.06, this.ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
      const s = this.ctx.createBufferSource(); s.buffer = buf;
      const f = this.ctx.createBiquadFilter();
      f.type = opts.filterType || "bandpass";
      f.frequency.value = opts.freq || 3000;
      f.Q.value = opts.Q || 0.5;
      s.connect(f); f.connect(g); s.start(now);
    } else if (type === "reveal") {
      const o = this.ctx.createOscillator();
      o.type = opts.wave || "sine";
      o.frequency.setValueAtTime(opts.freq || 600, now);
      o.frequency.exponentialRampToValueAtTime((opts.freq || 600) * 1.5, now + 0.08);
      o.connect(g);
      g.gain.setValueAtTime(opts.vol || 0.06, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      o.start(now); o.stop(now + 0.15);
    } else if (type === "rare") {
      const notes = opts.notes || [500, 700, 900, 1100];
      notes.forEach((freq, i) => {
        const t = i * 0.06;
        const o = this.ctx.createOscillator();
        const gn = this.ctx.createGain();
        o.type = opts.wave || "sine";
        o.frequency.value = freq;
        gn.gain.setValueAtTime(0.05, now + t);
        gn.gain.exponentialRampToValueAtTime(0.001, now + t + 0.12);
        o.connect(gn); gn.connect(this.ctx.destination);
        o.start(now + t); o.stop(now + t + 0.12);
      });
    } else if (type === "purchase") {
      const o = this.ctx.createOscillator();
      o.type = "triangle";
      o.frequency.setValueAtTime(300, now);
      o.frequency.exponentialRampToValueAtTime(800, now + 0.1);
      o.connect(g);
      g.gain.setValueAtTime(0.07, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      o.start(now); o.stop(now + 0.15);
    } else if (type === "combo") {
      const o = this.ctx.createOscillator();
      o.type = "sine";
      o.frequency.value = 400 + (opts.combo || 1) * 80;
      o.connect(g);
      g.gain.setValueAtTime(0.04, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      o.start(now); o.stop(now + 0.08);
    }
  }
}

/* ═══════════════════════════════════════════
   ENGINE (mode-agnostic)
═══════════════════════════════════════════ */
const BASE_VAL = 5;
const upgCost = (upg, lvl) => Math.floor(upg.baseCost * Math.pow(upg.costScale, lvl));

function generateClaim(mode, typeKey, luckMult = 1) {
  const type = mode.claimTypes[typeKey];
  const { cols, rows } = type.grid;
  const entries = Object.entries(type.geology);
  const tiles = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      let roll = Math.random(), mineral = entries[0], cum = 0;
      for (const entry of entries) {
        let ch = entry[1].chance;
        if (entry[1].valueMult > 10) ch = Math.min(ch * luckMult, ch * 3);
        cum += ch;
        if (roll <= cum) { mineral = entry; break; }
      }
      const isHazard = type.hazard?.type === "gas_pocket" && Math.random() < (type.hazard.chance || 0) && mineral[1].valueMult === 0;
      tiles.push({ id: `${r}-${c}`, row: r, col: c, mineralKey: mineral[0], mineral: mineral[1], damage: 0, revealed: false, justRevealed: false, revealTime: 0, isHazard });
    }
  }
  return { typeKey, type, tiles, cols, rows, completed: false, startTime: Date.now() };
}

function makeInit(mode) {
  const firstClaim = Object.keys(mode.claimTypes)[0];
  return {
    gold: 0, displayGold: 0, totalGold: 0,
    upgrades: { power: 0, radius: 0, luck: 0, speed: 0 },
    claim: null, claimTypeKey: firstClaim,
    journal: {}, recentFinds: [], claimsCompleted: 0,
    combo: 0, comboTimer: 0, maxCombo: 0,
    prestigeCount: 0, prestigePicks: 0, permanentMult: 1,
    unlockedClaims: [firstClaim],
    particles: [], sparkles: [],
    notification: null, shake: 0,
    totalScratches: 0, sessionBest: 0,
  };
}

function makeReducer(mode) {
  return function reducer(state, action) {
    switch (action.type) {
      case "NEW_CLAIM": {
        const lm = mode.upgrades.luck.effect(state.upgrades.luck);
        return { ...state, claim: generateClaim(mode, action.claimType || state.claimTypeKey, lm), claimTypeKey: action.claimType || state.claimTypeKey, combo: 0 };
      }
      case "SCRATCH": {
        if (!state.claim || state.claim.completed) return state;
        const { tileId, power, sx, sy } = action;
        let gold = state.gold, totalGold = state.totalGold, journal = { ...state.journal };
        let recentFinds = [...state.recentFinds], particles = [...state.particles], sparkles = [...state.sparkles];
        let notification = state.notification, shake = 0, combo = state.combo, maxCombo = state.maxCombo, sessionBest = state.sessionBest;

        const tiles = state.claim.tiles.map(t => {
          if (t.id !== tileId || t.revealed) return t;
          const nd = t.damage + power;
          if (nd >= state.claim.type.hardness) return { ...t, damage: state.claim.type.hardness, revealed: true, justRevealed: true, revealTime: Date.now() };
          return { ...t, damage: nd };
        });
        const justR = tiles.find(t => t.id === tileId && t.justRevealed && !state.claim.tiles.find(o => o.id === tileId)?.revealed);
        if (justR) {
          let val = Math.floor(justR.mineral.valueMult * BASE_VAL * state.permanentMult);
          if (justR.isHazard) val = Math.floor(val * 0.5);
          if (val > 0) {
            combo++;
            const comboMult = 1 + Math.min(combo, 20) * 0.05;
            val = Math.floor(val * comboMult);
            if (combo > maxCombo) maxCombo = combo;
            gold += val; totalGold += val;
            if (val > sessionBest) sessionBest = val;
            journal[justR.mineral.label] = (journal[justR.mineral.label] || 0) + 1;
            particles.push({ id: Date.now() + Math.random(), x: sx, y: sy, text: `+${val}`, color: justR.mineral.color, big: val > 100, combo: combo > 3 ? combo : 0 });
            if (justR.mineral.glow) {
              for (let i = 0; i < (justR.mineral.valueMult >= 50 ? 8 : 4); i++) {
                sparkles.push({ id: Date.now() + Math.random() + i, x: sx + (Math.random() - 0.5) * 80, y: sy + (Math.random() - 0.5) * 80, color: justR.mineral.color, size: 2 + Math.random() * 4 });
              }
            }
            if (justR.mineral.valueMult >= 15) {
              recentFinds = [{ label: justR.mineral.label, color: justR.mineral.color, value: val, time: Date.now() }, ...recentFinds].slice(0, 6);
            }
            if (justR.mineral.valueMult >= 50) {
              notification = { text: `${justR.mineral.label}!`, sub: `+${val}${combo > 3 ? ` · ${combo}× combo` : ""}`, color: justR.mineral.color, id: Date.now() };
              shake = justR.mineral.valueMult >= 200 ? 3 : 2;
            }
            if (justR.mineral.valueMult >= 200) {
              for (let i = 0; i < 16; i++) {
                sparkles.push({ id: Date.now() + Math.random() + i + 100, x: sx + (Math.random() - 0.5) * 160, y: sy + (Math.random() - 0.5) * 160, color: justR.mineral.color, size: 3 + Math.random() * 5 });
              }
            }
          } else { combo = 0; }
          if (justR.isHazard) {
            notification = { text: "Hazard!", sub: "Values halved", color: "#6B7B8D", id: Date.now() }; shake = 1;
          }
        }
        const completed = tiles.every(t => t.revealed);
        let claimsCompleted = state.claimsCompleted;
        if (completed && !state.claim.completed) {
          claimsCompleted++;
          const bonus = Math.floor(tiles.reduce((s, t) => s + t.mineral.valueMult, 0) * BASE_VAL * state.permanentMult * 0.2);
          gold += bonus; totalGold += bonus;
          particles.push({ id: Date.now() + 999, x: sx, y: sy - 30, text: `+${bonus} bonus`, color: mode.theme.currencyColor, big: true, combo: 0 });
        }
        return { ...state, gold, totalGold, journal, recentFinds, particles, sparkles, notification, shake, combo, maxCombo, claimsCompleted, sessionBest, totalScratches: state.totalScratches + 1, claim: { ...state.claim, tiles, completed } };
      }
      case "BUY_UPGRADE": {
        const upg = mode.upgrades[action.key];
        const lvl = state.upgrades[action.key];
        const cost = upgCost(upg, lvl);
        if (state.gold < cost || lvl >= upg.maxLevel) return state;
        return { ...state, gold: state.gold - cost, upgrades: { ...state.upgrades, [action.key]: lvl + 1 } };
      }
      case "PRESTIGE": {
        if (state.totalGold < mode.prestige.minCurrency) return state;
        const picks = mode.prestige.calcPicks(state.totalGold);
        const ul = [...state.unlockedClaims];
        mode.prestige.unlockSequence.forEach((key, i) => {
          if (state.prestigeCount >= i && !ul.includes(key)) ul.push(key);
        });
        return {
          ...makeInit(mode), journal: state.journal, recentFinds: [],
          prestigeCount: state.prestigeCount + 1,
          prestigePicks: state.prestigePicks + picks,
          permanentMult: state.permanentMult + picks * mode.prestige.pickMultiplier,
          unlockedClaims: ul, maxCombo: state.maxCombo, claimsCompleted: state.claimsCompleted,
        };
      }
      case "TICK_GOLD": return { ...state, displayGold: state.displayGold + Math.ceil((state.gold - state.displayGold) * 0.2) };
      case "CLEAR_P": return { ...state, particles: state.particles.filter(p => p.id !== action.id) };
      case "CLEAR_S": return { ...state, sparkles: state.sparkles.filter(s => s.id !== action.id) };
      case "CLEAR_N": return { ...state, notification: null };
      case "SELECT_CLAIM": return { ...state, claimTypeKey: action.key };
      case "DECAY_COMBO": return { ...state, combo: Math.max(0, state.combo - 1) };
      case "ADD_IDLE": return { ...state, gold: state.gold + (action.gold || 0), totalGold: state.totalGold + (action.gold || 0) };
      default: return state;
    }
  };
}

═══════════════════════════════════════════ */
function Tile({ tile, theme, hardness, crackStyle, onScratch }) {
  const pct = Math.min(tile.damage / hardness, 1);
  const isGlow = tile.revealed && tile.mineral.glow;
  const worth = tile.mineral.valueMult;
  return (
    <div
      onMouseDown={e => { e.preventDefault(); onScratch(tile.id, e); }}
      onMouseEnter={e => { if (e.buttons === 1) onScratch(tile.id, e); }}
      onTouchStart={e => { e.preventDefault(); const t = e.touches[0]; onScratch(tile.id, t); }}
      onTouchMove={e => { const t = e.touches[0]; const el = document.elementFromPoint(t.clientX, t.clientY); if (el) { const tid = el.getAttribute("data-tid"); if (tid) onScratch(tid, t); }}}
      data-tid={tile.id}
      style={{
        width: "100%", aspectRatio: "1", borderRadius: 5, position: "relative", overflow: "hidden",
        cursor: tile.revealed ? "default" : "crosshair",
        transform: tile.revealed ? "scale(0.94)" : pct > 0 ? `scale(${1 - pct * 0.02})` : "scale(1)",
        transition: tile.revealed ? "transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1)" : "transform 0.05s",
        userSelect: "none", WebkitUserSelect: "none",
      }}
    >
      {/* Mineral layer */}
      <div style={{
        position: "absolute", inset: 0, borderRadius: 5, background: tile.mineral.color,
        opacity: tile.revealed ? 1 : Math.pow(pct, 0.6) * 0.9,
        transition: tile.revealed ? "opacity 0.3s, box-shadow 0.5s" : "opacity 0.05s",
        display: "flex", alignItems: "center", justifyContent: "center",
        boxShadow: isGlow ? `inset 0 0 12px ${tile.mineral.color}80, 0 0 16px ${tile.mineral.color}60` : "none",
      }}>
        {tile.revealed && worth > 0 && (
          <span style={{ fontSize: worth >= 50 ? 11 : 9, fontWeight: 700, color: "#fff", textShadow: "0 1px 3px rgba(0,0,0,0.7)", animation: tile.justRevealed ? "revealPop 0.3s ease-out" : "none", letterSpacing: 0.3 }}>{tile.mineral.label}</span>
        )}
        {tile.revealed && worth === 0 && !tile.isHazard && (
          <span style={{ fontSize: 8, color: "rgba(255,255,255,0.3)" }}>{tile.mineral.label}</span>
        )}
        {tile.isHazard && tile.revealed && (
          <span style={{ fontSize: 14, filter: "drop-shadow(0 0 4px rgba(107,123,141,0.6))" }}>💨</span>
        )}
      </div>
      {/* Surface */}
      <div style={{
        position: "absolute", inset: 0, borderRadius: 5, pointerEvents: "none",
        background: `linear-gradient(145deg, ${theme.surface}F0 0%, ${theme.bg}E8 60%, ${theme.surface}D0 100%)`,
        opacity: 1 - pct, transition: tile.revealed ? "opacity 0.25s ease-in" : "opacity 0.03s",
      }} />
      {/* Groove */}
      {pct > 0 && !tile.revealed && (
        <div style={{ position: "absolute", inset: "15%", borderRadius: 3, pointerEvents: "none", background: "rgba(0,0,0,0.25)", opacity: pct * 0.7, filter: `blur(${2 - pct}px)` }} />
      )}
      {/* Cracks */}
      {pct > 0.2 && !tile.revealed && <CrackPattern style={crackStyle} pct={pct} />}
      {/* Shimmer */}
      {pct > 0.7 && !tile.revealed && (
        <div style={{ position: "absolute", inset: 0, borderRadius: 5, pointerEvents: "none", border: `1px solid ${tile.mineral.color}40`, animation: "shimmer 1.5s ease-in-out infinite" }} />
      )}
    </div>
  );
}

const SAVE_PREFIX = "pp_";
function saveMode(modeId, state) {
  try {
    const s = { ...state, particles: [], sparkles: [], notification: null, shake: 0, claim: null };
    localStorage.setItem(SAVE_PREFIX + "mode_" + modeId, JSON.stringify(s));
  } catch(e) {}

function loadMode(modeId, mode) {
  try {
    const raw = localStorage.getItem(SAVE_PREFIX + "mode_" + modeId);
    if (!raw) return null;
    const s = JSON.parse(raw);
    s.particles = []; s.sparkles = []; s.notification = null; s.shake = 0; s.displayGold = s.gold;
    return s;
  } catch(e) { return null; }
}
function saveWorkshop(ws) {
  try { localStorage.setItem(SAVE_PREFIX + "workshop", JSON.stringify(ws)); } catch(e) {}
}
function loadWorkshop() {
  try {
    const raw = localStorage.getItem(SAVE_PREFIX + "workshop");
    return raw ? JSON.parse(raw) : null;

}

function checkRevelations(wall, found) {
  const newRevs = [];
  const wallLabels = {};
  wall.forEach(s => { if (!wallLabels[s.mode]) wallLabels[s.mode] = new Set(); wallLabels[s.mode].add(s.label); });
  REVELATIONS.forEach(r => {
    if (found.includes(r.id)) return;
    const met = r.req.every(([mode, label]) => wallLabels[mode]?.has(label));
    if (met) newRevs.push(r);
  });
  return newRevs;
}

const IDLE_FLAVOR = {

  patissier: "The oven kept the kitchen warm while you were away...",
  archaeologist: "Interns carefully dusted the excavation site...",
  frost: "The frost crept back across the glass...",
  beekeeper: "The bees kept busy in the hive...",
  letterbreaker: "Candles flickered over unopened correspondence...",
  hatchling: "The egg rocked gently in its nest...",
};

function calcIdleEarnings(modeId, modeState, elapsedSec) {
  if (!modeState || elapsedSec < 60) return null; // minimum 1 minute
  const capped = Math.min(elapsedSec, IDLE_CAP);
  const mode = MODE_DEFINITIONS[modeId];
  const basePer = (modeState.totalGold || 0) / Math.max(modeState.totalScratches || 1, 1);
  const rate = basePer * IDLE_RATE;
  const earned = Math.floor(rate * capped);
  const essence = Math.floor(capped / 60); // 1 essence per minute
  if (earned < 1 && essence < 1) return null;
  return { earned, essence, seconds: capped, flavor: IDLE_FLAVOR[modeId] || "Time passed..." };
}

                  <span style={{ fontSize: 24 }}>{m.icon}</span>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 800 }}>{m.name}</div>
                    <div style={{ fontSize: 10, color: m.theme.textMuted, lineHeight: 1.3 }}>{m.sub}</div>
                  </div>
                </div>

                <div style={{ display: "flex", gap: 3, marginBottom: 8 }}>
                  {m.colors.slice(0, 6).map((c, j) => (
                    <div key={j} style={{ width: 14, height: 14, borderRadius: 3, background: c }} />
                  ))}
                </div>

                {/* Progress bar if has save data */}
                {hasProgress ? (
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <div style={{ fontSize: 9, fontFamily: "'JetBrains Mono', monospace", color: m.theme.currencyColor }}>
                      {savedState.totalGold >= 1e6 ? `${(savedState.totalGold/1e6).toFixed(1)}M` : savedState.totalGold >= 1e3 ? `${(savedState.totalGold/1e3).toFixed(1)}K` : savedState.totalGold} {m.labels.currency.toLowerCase()}
                    </div>
                    {savedState.prestigeCount > 0 && (
                      <div style={{ fontSize: 8, fontFamily: "'JetBrains Mono', monospace", color: m.theme.textMuted }}>
                        T{savedState.prestigeCount + 1}
                      </div>
                    )}
                    <div style={{ fontSize: 8, fontFamily: "'JetBrains Mono', monospace", color: m.theme.textFaint }}>
                      {savedState.claimsCompleted}✓
                    </div>
                  </div>
                ) : (
                  <div style={{ fontSize: 9, color: m.theme.textMuted, fontFamily: "'JetBrains Mono', monospace" }}>
                    {m.labels.verb} · {m.labels.currency} · {m.tiers.length} tiers
                  </div>
                )}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   MAIN GAME
═══════════════════════════════════════════ */
function Game({ modeId, onBack, workshop, onSpecimen, onEssence, idleReport: pendingIdle }) {
  const mode = MODE_DEFINITIONS[modeId];
  const reducer = useMemo(() => makeReducer(mode), [modeId]);
  const saved = useMemo(() => loadMode(modeId, mode), [modeId]);
  const initState = useMemo(() => saved || makeInit(mode), [modeId]);
  const [state, dispatch] = useReducer(reducer, initState);
  const benchRef = useRef(null);
  const [showJournal, setShowJournal] = useState(false);
  const [showPrestige, setShowPrestige] = useState(false);
  const [showIdleReport, setShowIdleReport] = useState(!!pendingIdle);
  const [muted, setMuted] = useState(false);
  const autoRef = useRef(null);
  const prevJournalRef = useRef(state.journal);
  const saveTimer = useRef(null);
  const L = mode.labels;
  const T = mode.theme;

  // Apply idle earnings on mount
  useEffect(() => {
    if (pendingIdle) {
      dispatch({ type: "ADD_IDLE", gold: pendingIdle.earned });
    }
  }, []);

  // Auto-save every 5 seconds
  useEffect(() => {
    saveTimer.current = setInterval(() => saveMode(modeId, state), 5000);
    return () => clearInterval(saveTimer.current);
  }, [state, modeId]);

  // Save on unmount
  useEffect(() => () => saveMode(modeId, state), []);

  // Detect new specimen-worthy finds (glow items entering journal)
  useEffect(() => {
    const prev = prevJournalRef.current;
    const cur = state.journal;
    Object.keys(cur).forEach(label => {
      if (!prev[label] || cur[label] > prev[label]) {
        // Check if this label is a glow-tier item
        Object.values(mode.claimTypes).forEach(ct => {
          Object.values(ct.geology).forEach(geo => {
            if (geo.label === label && geo.glow && onSpecimen) {
              onSpecimen({ label, color: geo.color, mode: modeId, modeIcon: mode.icon, foundAt: Date.now() });
            }
          });
        });
      }
    });
    prevJournalRef.current = cur;
  }, [state.journal]);

  // Essence generation: 1 per 30 scratches
  useEffect(() => {
    if (state.totalScratches > 0 && state.totalScratches % 30 === 0 && onEssence) {
      onEssence(modeId, 1);
    }
  }, [state.totalScratches]);

  useEffect(() => { dispatch({ type: "NEW_CLAIM", claimType: state.claimTypeKey || Object.keys(mode.claimTypes)[0] }); }, []);

  // Gold counter animation
  useEffect(() => {
    if (state.displayGold !== state.gold) {
      const t = requestAnimationFrame(() => dispatch({ type: "TICK_GOLD" }));
      return () => cancelAnimationFrame(t);
    }
  }, [state.displayGold, state.gold]);

  // Combo decay
  useEffect(() => {
    if (state.combo > 0) {
      const t = setTimeout(() => dispatch({ type: "DECAY_COMBO" }), 2200);
      return () => clearTimeout(t);
    }
  }, [state.combo]);

  // Notification auto-clear
  useEffect(() => {
    if (state.notification) {
      const t = setTimeout(() => dispatch({ type: "CLEAR_N" }), 2800);
      return () => clearTimeout(t);
    }
  }, [state.notification?.id]);

  // Auto-scratch
  useEffect(() => {
    const spd = mode.upgrades.speed.effect(state.upgrades.speed);
    if (spd <= 0 || !state.claim || state.claim.completed) { clearInterval(autoRef.current); return; }
    autoRef.current = setInterval(() => {
      const unr = state.claim?.tiles.filter(t => !t.revealed);
      if (unr && unr.length > 0) {
        const t = unr[Math.floor(Math.random() * unr.length)];
        dispatch({ type: "SCRATCH", tileId: t.id, power: mode.upgrades.power.effect(state.upgrades.power) * 0.4, sx: 300, sy: 300 });
      }
    }, spd);
    return () => clearInterval(autoRef.current);
  }, [state.upgrades.speed, state.upgrades.power, state.claim?.completed, state.claim?.typeKey]);

  const handleScratch = useCallback((tileId, e) => {
    audio.init();
    if (state.claim?.completed) return;
    const rect = benchRef.current?.getBoundingClientRect();
    const cx = e.clientX ?? e.pageX;
    const cy = e.clientY ?? e.pageY;
    const sx = rect ? cx - rect.left : 300;
    const sy = rect ? cy - rect.top : 200;
    const pw = mode.upgrades.power.effect(state.upgrades.power);
    const ct = mode.claimTypes[state.claimTypeKey];

    dispatch({ type: "SCRATCH", tileId, power: pw, sx, sy });
    if (!muted) audio.play("scratch", { freq: ct.theme.scratchFreq + (Math.random() - 0.5) * 400, vol: 0.04 + Math.random() * 0.03, filterType: mode.audio.scratchFilter, Q: mode.audio.scratchQ });

    const tile = state.claim?.tiles.find(t => t.id === tileId);
    if (tile && !tile.revealed && tile.damage + pw >= ct.hardness) {
      if (!muted) {
        if (tile.mineral.valueMult >= 50) audio.play("rare", { notes: mode.audio.rareNotes, wave: mode.audio.rareWave });
        else if (tile.mineral.valueMult > 0) audio.play("reveal", { freq: 400 + tile.mineral.valueMult * 3, wave: mode.audio.revealWave });
      }
    }

    if (state.claim && state.upgrades.radius > 0) {
      const src = state.claim.tiles.find(t => t.id === tileId);
      if (src) {
        state.claim.tiles
          .filter(t => !t.revealed && t.id !== tileId && Math.abs(t.row - src.row) <= 1 && Math.abs(t.col - src.col) <= 1)
          .slice(0, state.upgrades.radius)
          .forEach(t => dispatch({ type: "SCRATCH", tileId: t.id, power: pw * 0.35, sx: sx + (Math.random() - 0.5) * 50, sy: sy + (Math.random() - 0.5) * 50 }));
      }
    }
  }, [state.upgrades.power, state.upgrades.radius, state.claim, state.claimTypeKey, muted, modeId]);

  const ct = state.claim ? mode.claimTypes[state.claimTypeKey] : null;
  const pct = state.claim ? Math.floor(state.claim.tiles.filter(t => t.revealed).length / state.claim.tiles.length * 100) : 0;
  const canPrestige = state.totalGold >= mode.prestige.minCurrency;
  const fmt = g => { if (g >= 1e6) return `${(g/1e6).toFixed(1)}M`; if (g >= 1e3) return `${(g/1e3).toFixed(1)}K`; return `${g}`; };
  const comboColor = state.combo > 10 ? "#F0C040" : state.combo > 5 ? "#E08830" : state.combo > 2 ? "#C07030" : T.textMuted;

  return (
    <div style={{
      width: "100%", height: "100vh", background: "#131010", fontFamily: "'Anybody', sans-serif",
      display: "flex", position: "relative", overflow: "hidden", color: T.textPrimary,
      animation: state.shake > 0 ? `shake${state.shake} 0.3s ease-out` : "none",
    }}>
      {/* ═══ LEFT SIDEBAR ═══ */}
      <div style={{
        width: 210, flexShrink: 0, background: T.sidebarBg,
        borderRight: `1px solid ${T.borderAccent}`,
        display: "flex", flexDirection: "column",
      }}>
        {/* Back button */}
        <button onClick={onBack} style={{
          padding: "8px 14px", background: "transparent", border: "none", borderBottom: `1px solid ${T.borderAccent}`,
          color: T.textMuted, fontSize: 10, cursor: "pointer", textAlign: "left", fontFamily: "'JetBrains Mono', monospace",
          letterSpacing: 1,
        }}>← modes</button>

        {/* Currency */}
        <div style={{ padding: "18px 14px 14px", borderBottom: `1px solid ${T.borderAccent}` }}>
          <div style={{ fontSize: 9, letterSpacing: 2.5, textTransform: "uppercase", color: T.textMuted, fontFamily: "'JetBrains Mono', monospace" }}>{L.currency}</div>
          <div style={{
            fontSize: 34, fontWeight: 900, color: T.currencyColor, lineHeight: 1, marginTop: 2,
            textShadow: state.gold > state.displayGold ? `0 0 12px ${T.currencyColor}66` : "none",
            transition: "text-shadow 0.3s",
          }}>{fmt(state.displayGold)}</div>
          <div style={{ display: "flex", gap: 10, marginTop: 6, fontSize: 9, fontFamily: "'JetBrains Mono', monospace", color: T.textFaint }}>
            <span>Total: {fmt(state.totalGold)}</span>
            <span>Claims: {state.claimsCompleted}</span>
          </div>
        </div>

        {/* Combo */}
        {state.combo > 0 && (
          <div style={{ padding: "6px 14px", borderBottom: `1px solid ${T.borderAccent}`, display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ fontSize: 20, fontWeight: 900, color: comboColor, animation: state.combo > 5 ? "comboGlow 0.8s ease-in-out infinite" : "none", fontFamily: "'Anybody', sans-serif" }}>{state.combo}×</div>
            <div>
              <div style={{ fontSize: 9, color: T.textMuted, fontFamily: "'JetBrains Mono', monospace" }}>Combo</div>
              <div style={{ height: 3, width: 80, background: "rgba(255,255,255,0.06)", borderRadius: 2, marginTop: 2, overflow: "hidden" }}>
                <div style={{ width: `${Math.min(state.combo / 20 * 100, 100)}%`, height: "100%", background: comboColor, borderRadius: 2, transition: "width 0.2s, background 0.3s" }} />
              </div>
            </div>
          </div>
        )}

        {/* Upgrades */}
        <div style={{ padding: "10px 10px 6px", flex: 1, overflow: "auto" }}>
          <div style={{ fontSize: 9, letterSpacing: 2, textTransform: "uppercase", color: T.textMuted, fontFamily: "'JetBrains Mono', monospace", marginBottom: 8, paddingLeft: 2 }}>Upgrades</div>
          {Object.entries(mode.upgrades).map(([key, upg]) => {
            const lvl = state.upgrades[key];
            const cost = upgCost(upg, lvl);
            const ok = state.gold >= cost && lvl < upg.maxLevel;
            return (
              <button key={key} className="upg-btn" disabled={!ok}
                onClick={() => { dispatch({ type: "BUY_UPGRADE", key }); if (!muted) audio.play("purchase"); }}
                style={{
                  display: "block", width: "100%", background: T.cardBg, borderRadius: 7,
                  padding: "9px 10px", marginBottom: 6, cursor: ok ? "pointer" : "not-allowed",
                  textAlign: "left", color: T.textPrimary,
                }}
              >
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                  <span style={{ fontSize: 12, fontWeight: 700 }}>{upg.icon} {upg.name}</span>
                  <span style={{ fontSize: 9, fontFamily: "'JetBrains Mono', monospace", color: ok ? T.currencyColor : T.textFaint }}>
                    {lvl >= upg.maxLevel ? "MAX" : `${fmt(cost)}`}
                  </span>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 2 }}>
                  <span style={{ fontSize: 9, color: T.textMuted }}>{upg.desc}</span>
                  <span style={{ fontSize: 9, fontFamily: "'JetBrains Mono', monospace", color: T.accentColor }}>Lv{lvl} {upg.label(lvl)}</span>
                </div>
                <div style={{ marginTop: 5, height: 2, background: `${T.accentColor}18`, borderRadius: 1, overflow: "hidden" }}>
                  <div style={{ width: `${(lvl/upg.maxLevel)*100}%`, height: "100%", background: `linear-gradient(90deg, ${T.accentColor}, ${T.currencyColor})`, borderRadius: 1, transition: "width 0.3s" }}/>
                </div>
              </button>
            );
          })}
        </div>

        {/* Prestige */}
        <div style={{ padding: "8px 10px 14px", borderTop: `1px solid ${T.borderAccent}` }}>
          <button onClick={() => setShowPrestige(true)} disabled={!canPrestige}
            style={{
              width: "100%", padding: "9px", borderRadius: 7, fontSize: 10, fontWeight: 700,
              letterSpacing: 1.5, textTransform: "uppercase", fontFamily: "'JetBrains Mono', monospace",
              cursor: canPrestige ? "pointer" : "not-allowed",
              background: canPrestige ? T.prestigeBg : T.cardBg,
              border: canPrestige ? `1px solid ${T.prestigeBorder}` : `1px solid ${T.borderAccent}`,
              color: canPrestige ? T.textPrimary : T.textFaint,
              animation: canPrestige ? "breathe 3s ease-in-out infinite" : "none",
            }}
          >{mode.icon} {L.prestigeAction}</button>
          {state.prestigeCount > 0 && (
            <div style={{ textAlign: "center", marginTop: 5, fontSize: 8, color: T.textFaint, fontFamily: "'JetBrains Mono', monospace" }}>
              Tier {state.prestigeCount+1} · {state.permanentMult.toFixed(1)}× mult
            </div>
          )}
        </div>
      </div>

      {/* ═══ CENTER — WORKBENCH ═══ */}
      <div ref={benchRef} style={{
        flex: 1, position: "relative",
        background: ct ? `radial-gradient(ellipse at 50% 40%, ${ct.theme.accent}08 0%, transparent 60%), linear-gradient(180deg, #1E1A14 0%, #151008 100%)` : "#151008",
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
        padding: "16px 24px", overflow: "hidden",
      }}>
        {/* Ambient glow */}
        <div style={{
          position: "absolute", top: 0, left: "50%", transform: "translateX(-50%)",
          width: 300 + state.upgrades.luck * 20, height: 200 + state.upgrades.luck * 10,
          background: `radial-gradient(ellipse, ${T.currencyColor}${Math.round((0.03+state.upgrades.luck*0.006)*255).toString(16).padStart(2,'0')} 0%, transparent 70%)`,
          pointerEvents: "none", transition: "all 1s",
        }}/>

        {/* Notification */}
        {state.notification && (
          <div key={state.notification.id} style={{
            position: "absolute", top: 20, left: "50%",
            background: "rgba(20,16,12,0.92)", backdropFilter: "blur(12px)",
            border: `1.5px solid ${state.notification.color}`,
            borderRadius: 10, padding: "10px 24px", zIndex: 50,
            animation: "notifIn 2.8s ease forwards", textAlign: "center",
            boxShadow: `0 0 30px ${state.notification.color}30`,
          }}>
            <div style={{ fontSize: 16, fontWeight: 800, color: state.notification.color }}>{state.notification.text}</div>
            {state.notification.sub && <div style={{ fontSize: 11, color: T.textMuted, marginTop: 2 }}>{state.notification.sub}</div>}
          </div>
        )}

        {/* Claim type tabs */}
        <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
          {state.unlockedClaims.map(key => {
            const c = mode.claimTypes[key];
            const active = state.claimTypeKey === key;
            return (
              <button key={key} className="cs-btn"
                onClick={() => { dispatch({ type: "SELECT_CLAIM", key }); dispatch({ type: "NEW_CLAIM", claimType: key }); }}
                style={{
                  padding: "5px 14px", borderRadius: 16, fontSize: 11, fontWeight: 600,
                  border: active ? `1.5px solid ${c.theme.accent}` : `1px solid ${T.borderAccent}`,
                  background: active ? `${c.theme.accent}20` : T.cardBgLight,
                  color: active ? T.textPrimary : T.textMuted,
                  cursor: "pointer", fontFamily: "'Anybody', sans-serif",
                  boxShadow: active ? `0 0 16px ${c.theme.accent}20` : "none",
                }}
              >{c.name}</button>
            );
          })}
          <button onClick={() => { setMuted(!muted); audio.init(); }} style={{
            padding: "5px 10px", borderRadius: 16, fontSize: 11, border: `1px solid ${T.borderAccent}`,
            background: T.cardBgLight, color: T.textMuted, cursor: "pointer",
          }}>{muted ? "🔇" : "🔊"}</button>
        </div>

        {/* THE CLAIM */}
        {state.claim && (
          <div style={{
            background: `linear-gradient(150deg, ${ct.theme.bg}F8 0%, ${ct.theme.surface}E0 40%, ${ct.theme.bg}F0 100%)`,
            borderRadius: 10, padding: 10,
            boxShadow: `0 12px 48px rgba(0,0,0,0.55), 0 0 1px rgba(255,255,255,0.05) inset, 0 0 40px ${ct.theme.accent}10`,
            position: "relative", maxWidth: ct.grid.cols <= 5 ? 360 : 430, width: "100%",
          }}>
            <div style={{
              position: "absolute", top: -7, right: 10,
              background: "#16130E", border: `1px solid ${ct.theme.accent}40`, borderRadius: 4,
              padding: "1px 7px", fontSize: 8, fontFamily: "'JetBrains Mono', monospace",
              color: ct.theme.accent, letterSpacing: 0.5,
            }}>H:{ct.hardness}</div>

            <div style={{ display: "grid", gridTemplateColumns: `repeat(${state.claim.cols}, 1fr)`, gap: 3 }}>
              {state.claim.tiles.map(tile => (
                <Tile key={tile.id} tile={tile} theme={ct.theme} hardness={ct.hardness} crackStyle={mode.crackStyle} onScratch={handleScratch} />
              ))}
            </div>

            <div style={{ marginTop: 8, display: "flex", alignItems: "center", gap: 6 }}>
              <div style={{ flex: 1, height: 3, background: "rgba(0,0,0,0.3)", borderRadius: 2, overflow: "hidden" }}>
                <div style={{
                  width: `${pct}%`, height: "100%", borderRadius: 2, transition: "width 0.15s",
                  background: pct === 100 ? T.currencyColor : `linear-gradient(90deg, ${ct.theme.accent}, ${ct.theme.accent}CC)`,
                }}/>
              </div>
              <span style={{ fontSize: 9, fontFamily: "'JetBrains Mono', monospace", color: T.textMuted, minWidth: 28, textAlign: "right" }}>{pct}%</span>
            </div>

            {state.claim.completed && (
              <div style={{
                position: "absolute", inset: 0, borderRadius: 10,
                background: "rgba(18,14,10,0.88)", backdropFilter: "blur(6px)",
                display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                animation: "slideUp 0.25s ease-out",
              }}>
                <div style={{ fontSize: 11, letterSpacing: 3, textTransform: "uppercase", color: ct.theme.accent, fontFamily: "'JetBrains Mono', monospace", marginBottom: 4 }}>Complete</div>
                <div style={{ fontSize: 22, fontWeight: 900, color: T.currencyColor, marginBottom: 4 }}>{L.claimNoun} cleared</div>
                {state.maxCombo > 2 && <div style={{ fontSize: 11, color: comboColor, marginBottom: 10 }}>Best combo: {state.maxCombo}×</div>}
                <button onClick={() => dispatch({ type: "NEW_CLAIM" })}
                  style={{
                    padding: "10px 32px", borderRadius: 8, border: "none", cursor: "pointer",
                    background: `linear-gradient(135deg, ${ct.theme.accent}, ${ct.theme.surface})`,
                    color: T.textPrimary, fontSize: 13, fontWeight: 700, fontFamily: "'Anybody', sans-serif",
                    boxShadow: `0 0 20px ${ct.theme.accent}40`,
                  }}
                >Next {L.claimNoun.toLowerCase()} →</button>
              </div>
            )}
          </div>
        )}

        <div style={{
          marginTop: 16, fontSize: 9, letterSpacing: 3.5, textTransform: "uppercase",
          color: T.textFaint, fontFamily: "'JetBrains Mono', monospace",
        }}>{L.workspace}</div>

        {state.particles.map(p => <GoldPop key={p.id} p={p} onDone={id => dispatch({ type: "CLEAR_P", id })} />)}
        {state.sparkles.map(s => <Sparkle key={s.id} s={s} onDone={id => dispatch({ type: "CLEAR_S", id })} />)}
      </div>

      {/* ═══ RIGHT SIDEBAR ═══ */}
      <div style={{
        width: 190, flexShrink: 0, background: T.sidebarBg,
        borderLeft: `1px solid ${T.borderAccent}`,
        display: "flex", flexDirection: "column",
      }}>
        {/* Recent finds */}
        <div style={{ padding: "18px 12px 10px", borderBottom: `1px solid ${T.borderAccent}` }}>
          <div style={{ fontSize: 9, letterSpacing: 2, textTransform: "uppercase", color: T.textMuted, fontFamily: "'JetBrains Mono', monospace", marginBottom: 8 }}>{L.display}</div>
          {state.recentFinds.length === 0 ? (
            <div style={{ fontSize: 10, color: T.textFaint, fontStyle: "italic" }}>Find rare items...</div>
          ) : state.recentFinds.map((f, i) => (
            <div key={f.time + i} className="find-row" style={{
              display: "flex", alignItems: "center", gap: 7,
              padding: "5px 6px", background: T.cardBgLight, borderRadius: 5, marginBottom: 4,
            }}>
              <div style={{ width: 18, height: 18, borderRadius: 3, background: f.color, flexShrink: 0, boxShadow: `0 0 8px ${f.color}50` }}/>
              <div style={{ minWidth: 0 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: T.textPrimary, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{f.label}</div>
                <div style={{ fontSize: 8, fontFamily: "'JetBrains Mono', monospace", color: T.currencyColor }}>+{f.value}</div>
              </div>
            </div>
          ))}
        </div>

        {/* Journal */}
        <div style={{ padding: "8px 12px" }}>
          <button onClick={() => setShowJournal(!showJournal)} style={{
            width: "100%", padding: "7px", background: showJournal ? `${T.accentColor}18` : T.cardBgLight,
            border: `1px solid ${T.borderAccent}`, borderRadius: 6, color: T.textPrimary,
            fontSize: 10, fontWeight: 600, cursor: "pointer", fontFamily: "'Anybody', sans-serif",
          }}>📓 {L.collection} ({Object.keys(state.journal).length})</button>
        </div>

        <div style={{ flex: 1, overflow: "auto", padding: "4px 12px 12px" }}>
          {showJournal ? (
            Object.entries(state.journal).sort((a,b) => b[1]-a[1]).map(([m, c]) => (
              <div key={m} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", fontSize: 10, borderBottom: `1px solid ${T.borderAccent}` }}>
                <span style={{ color: T.textMuted }}>{m}</span>
                <span style={{ fontFamily: "'JetBrains Mono', monospace", color: T.textFaint }}>×{c}</span>
              </div>
            ))
          ) : ct && (
            <>
              <div style={{ fontSize: 9, letterSpacing: 2, textTransform: "uppercase", color: T.textFaint, fontFamily: "'JetBrains Mono', monospace", marginBottom: 6 }}>Contents</div>
              {Object.entries(ct.geology).map(([k, m]) => (
                <div key={k} style={{ display: "flex", alignItems: "center", gap: 5, padding: "3px 0", borderBottom: `1px solid ${T.borderAccent}` }}>
                  <div style={{ width: 7, height: 7, borderRadius: 2, background: m.color, flexShrink: 0, boxShadow: m.glow ? `0 0 4px ${m.color}60` : "none" }}/>
                  <span style={{ fontSize: 9, color: T.textMuted, flex: 1 }}>{m.label}</span>
                  <span style={{ fontSize: 8, fontFamily: "'JetBrains Mono', monospace", color: T.textFaint }}>{(m.chance*100).toFixed(0)}%</span>
                  <span style={{ fontSize: 8, fontFamily: "'JetBrains Mono', monospace", color: m.valueMult > 0 ? T.currencyColor : T.textFaint, minWidth: 22, textAlign: "right" }}>
                    {m.valueMult > 0 ? `${m.valueMult}×` : "—"}
                  </span>
                </div>
              ))}
              {ct.hazard && (
                <div style={{ marginTop: 6, fontSize: 9, color: "rgba(180,80,60,0.6)", fontStyle: "italic" }}>
                  ⚠ {ct.hazard.type === "gas_pocket" ? `${L.hazardLabel} ${(ct.hazard.chance*100).toFixed(0)}%` : `Timer ${ct.hazard.seconds}s`}
                </div>
              )}
            </>
          )}
        </div>

        {/* Stats */}
        <div style={{ padding: "8px 12px 14px", borderTop: `1px solid ${T.borderAccent}`, fontSize: 8, fontFamily: "'JetBrains Mono', monospace", color: T.textFaint }}>
          <div>{L.verb}s: {state.totalScratches}</div>
          <div>Best find: {state.sessionBest > 0 ? fmt(state.sessionBest) : "—"}</div>
          <div>Max combo: {state.maxCombo > 0 ? `${state.maxCombo}×` : "—"}</div>
        </div>
      </div>

      {/* ═══ PRESTIGE MODAL ═══ */}
      {showPrestige && (
        <div style={{
          position: "absolute", inset: 0, background: "rgba(8,6,4,0.92)", backdropFilter: "blur(12px)",
          display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200,
        }}>
          <div style={{
            background: `linear-gradient(150deg, #2A2015, #1A150D)`, border: `1px solid ${T.prestigeBorder}50`,
            borderRadius: 14, padding: "28px 36px", maxWidth: 360, textAlign: "center",
            animation: "slideUp 0.3s ease-out", boxShadow: `0 0 60px ${T.prestigeGlow}`,
          }}>
            <div style={{ fontSize: 9, letterSpacing: 3, textTransform: "uppercase", color: T.prestigeBorder, fontFamily: "'JetBrains Mono', monospace", marginBottom: 6 }}>Prestige</div>
            <div style={{ fontSize: 22, fontWeight: 900, color: T.textPrimary, marginBottom: 6 }}>{L.prestigeAction}</div>
            <p style={{ fontSize: 12, color: T.textMuted, lineHeight: 1.5, marginBottom: 18 }}>
              Reset {L.currency.toLowerCase()} and upgrades. Your {L.collection.toLowerCase()} and {L.prestigeUnit.toLowerCase()} persist.
            </p>
            <div style={{ display: "flex", gap: 8, justifyContent: "center", marginBottom: 18 }}>
              {[[L.prestigeUnit.split(" ").pop(), mode.prestige.calcPicks(state.totalGold), T.currencyColor],
                ["New mult", `${(state.permanentMult + mode.prestige.calcPicks(state.totalGold)*mode.prestige.pickMultiplier).toFixed(1)}×`, T.accentColor]
              ].map(([l,v,c]) => (
                <div key={l} style={{ background: T.cardBg, borderRadius: 7, padding: "7px 14px" }}>
                  <div style={{ fontSize: 8, color: T.textFaint, fontFamily: "'JetBrains Mono', monospace" }}>{l}</div>
                  <div style={{ fontSize: 18, fontWeight: 800, color: c }}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
              <button onClick={() => setShowPrestige(false)} style={{
                padding: "9px 22px", borderRadius: 7, background: "transparent",
                border: `1px solid ${T.borderAccent}`, color: T.textMuted,
                fontSize: 11, cursor: "pointer", fontFamily: "'Anybody', sans-serif",
              }}>Not yet</button>
              <button onClick={() => { dispatch({ type: "PRESTIGE" }); setShowPrestige(false); dispatch({ type: "NEW_CLAIM", claimType: Object.keys(mode.claimTypes)[0] }); }}
                style={{
                  padding: "9px 22px", borderRadius: 7, border: "none",
                  background: T.prestigeBg, color: T.textPrimary,
                  fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "'Anybody', sans-serif",
                  boxShadow: `0 0 20px ${T.prestigeGlow}`,
                }}
              >{L.prestigeVerb} →</button>
            </div>
          </div>
        </div>
      )}

      {/* Idle Report */}
      {showIdleReport && pendingIdle && (
        <IdleReport report={pendingIdle} mode={modeId} onDismiss={() => setShowIdleReport(false)} />
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   APP ROOT — Workshop State Manager
═══════════════════════════════════════════ */
function App() {
  const [workshop, setWorkshop] = useState(() => loadWorkshop() || makeDefaultWorkshop());
  const [currentMode, setCurrentMode] = useState(null);
  const [idleReport, setIdleReport] = useState(null);
  const [revNotif, setRevNotif] = useState(null);

  // Persist workshop on every change
  useEffect(() => { saveWorkshop(workshop); }, [workshop]);

  // Open a drawer: calculate idle, set timestamp
  const openDrawer = useCallback((modeId) => {
    const ts = workshop.drawerTimestamps[modeId];
    const savedState = loadMode(modeId, MODE_DEFINITIONS[modeId]);
    let report = null;

    if (ts && savedState && savedState.totalScratches > 0) {
      const elapsed = Math.floor((Date.now() - ts) / 1000);
      report = calcIdleEarnings(modeId, savedState, elapsed);
      // Add idle essence to workshop
      if (report?.essence > 0) {
        setWorkshop(w => ({
          ...w,
          essences: { ...w.essences, [modeId]: (w.essences[modeId] || 0) + report.essence },
        }));
      }
    }

    // Update timestamp
    setWorkshop(w => ({
      ...w,
      drawerTimestamps: { ...w.drawerTimestamps, [modeId]: Date.now() },
    }));

    setIdleReport(report);
    setCurrentMode(modeId);
  }, [workshop]);

  // Close drawer: save timestamp
  const closeDrawer = useCallback(() => {
    if (currentMode) {
      setWorkshop(w => ({
        ...w,
        drawerTimestamps: { ...w.drawerTimestamps, [currentMode]: Date.now() },
      }));
    }
    setCurrentMode(null);
    setIdleReport(null);
  }, [currentMode]);

  // Specimen found callback — dedupe by label+mode
  const handleSpecimen = useCallback((specimen) => {
    setWorkshop(w => {
      const exists = w.specimenWall.some(s => s.label === specimen.label && s.mode === specimen.mode);
      if (exists) return w;
      const newWall = [...w.specimenWall, specimen];
      // Check for new revelations
      const newRevs = checkRevelations(newWall, w.revelationsFound);
      if (newRevs.length > 0) {
        setTimeout(() => { setRevNotif(newRevs[0]); setTimeout(() => setRevNotif(null), 4000); }, 500);
      }
      return {
        ...w,
        specimenWall: newWall,
        revelationsFound: [...w.revelationsFound, ...newRevs.map(r => r.id)],
      };
    });
  }, []);

  // Essence earned callback
  const handleEssence = useCallback((modeId, amount) => {
    setWorkshop(w => ({
      ...w,
      essences: { ...w.essences, [modeId]: (w.essences[modeId] || 0) + amount },
    }));
  }, []);

  if (!currentMode) {
    return <WorkshopCabinet workshop={workshop} onOpenDrawer={openDrawer} onWorkshopUpdate={setWorkshop} />;
  }

  return (
    <div style={{ position: "relative", width: "100%", height: "100vh" }}>
      <Game
        key={currentMode}
        modeId={currentMode}
        onBack={closeDrawer}
        workshop={workshop}
        onSpecimen={handleSpecimen}
        onEssence={handleEssence}
        idleReport={idleReport}
      />
      {/* Revelation notification */}
      {revNotif && (
        <div style={{
          position: "fixed", top: 20, left: "50%", transform: "translateX(-50%)", zIndex: 500,
          background: "rgba(12,10,8,0.95)", backdropFilter: "blur(16px)",
          border: `1.5px solid ${revNotif.tier === "tetrad" ? "#E0C060" : revNotif.tier === "triad" ? "#A080E0" : "#80B0A0"}`,
          borderRadius: 12, padding: "14px 28px", textAlign: "center",
          animation: "notifIn 4s ease forwards",
          boxShadow: `0 0 40px ${revNotif.tier === "tetrad" ? "rgba(224,192,96,0.3)" : "rgba(128,176,160,0.2)"}`,
        }}>
          <div style={{ fontSize: 9, letterSpacing: 3, textTransform: "uppercase", color: "rgba(245,240,232,0.4)", fontFamily: "'JetBrains Mono', monospace", marginBottom: 4 }}>Revelation Discovered</div>
          <div style={{ fontSize: 18, fontWeight: 800, color: revNotif.tier === "tetrad" ? "#E0C060" : revNotif.tier === "triad" ? "#A080E0" : "#80B0A0" }}>{revNotif.name}</div>
          <div style={{ fontSize: 11, color: "rgba(245,240,232,0.4)", marginTop: 4, fontStyle: "italic" }}>{revNotif.flavor}</div>
          <div style={{ fontSize: 10, color: "rgba(245,240,232,0.3)", marginTop: 4, fontFamily: "'JetBrains Mono', monospace" }}>{revNotif.bonus}</div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
